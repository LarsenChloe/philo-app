  const EYE='#1a1020', MOUTH_N='#a06040', MOUTH_H='#d06040', MOUTH_S='#804020';
  const HAIR='#c89040', SANDAL='#d4a030', SANDAL2='#b08020', SHIN='#c09060';
  const TOGAS='#a8a090', BELT='#c8a040', RED='#c03020';
  const SHADOW='rgba(0,0,0,0.3)';

  // ===== CADUCEUS (left side, x=1..4) =====
  // Staff
  for(let y=8;y<=48;y++) D(2, y, y%2===0?STAFF:STAFF2);
  // Tip (spear point)
  D(2,6,GOLD); D(2,5,GOLD2); D(1,7,GOLD2); D(3,7,GOLD2);
  // Wings on caduceus top
  D(0,9,WING_L); D(0,8,WING_L); D(-1,8,WING_D);
  D(4,9,WING_L); D(4,8,WING_L); D(5,8,WING_D);
  D(0,10,WING_D); D(4,10,WING_D);
  // Snakes winding around staff
  // Snake 1 (green)
  D(3,12,SNAKE_G); D(4,13,SNAKE_G); D(4,14,SNAKE_G); D(3,15,SNAKE_G);
  D(1,16,SNAKE_G); D(0,17,SNAKE_G); D(0,18,SNAKE_G); D(1,19,SNAKE_G);
  D(3,20,SNAKE_G); D(4,21,SNAKE_G); D(4,22,SNAKE_G); D(3,23,SNAKE_G);
  D(1,24,SNAKE_G); D(0,25,SNAKE_G); D(0,26,SNAKE_G); D(1,27,SNAKE_G);
  // Snake heads
  D(4,11,SNAKE_D); D(5,11,SNAKE_D); D(4,10,SNAKE_D);
  D(0,28,SNAKE_D); D(-1,28,SNAKE_D); D(0,29,SNAKE_D);
  // Snake eyes (tiny)
  D(5,10,EYE); D(-1,27,EYE);

  // ===== PÉTASE / HELMET (floating, detailed) =====
  // Wide brim
  R(4,1, 18,2, GOLD2);
  D(3,2,GOLD2); D(19,2,GOLD2);
  // Dome
  R(6,0, 16,1, GOLD);
  D(5,1,GOLD); D(17,1,GOLD);
  // Interior shadow
  R(7,2, 15,2, GOLD2);
  // Helmet crest decoration
  D(11,0,RED); D(12,0,RED);
  // Large wings on sides of helmet
  // Left wing
  D(2,2,WING_L); D(1,1,WING_L); D(0,2,WING_L); D(1,3,WING_L);
  D(2,3,WING_L); D(0,3,WING_D); D(-1,2,WING_D); D(1,0,WING_D);
  D(2,1,WING_D); D(0,1,WING_D);
  // Right wing  
  D(20,2,WING_L); D(21,1,WING_L); D(22,2,WING_L); D(21,3,WING_L);
  D(20,3,WING_L); D(22,3,WING_D); D(23,2,WING_D); D(21,0,WING_D);
  D(20,1,WING_D); D(22,1,WING_D);

  // ===== FACE =====
  // Head shape
  R(7,3, 15,9, SKIN);
  D(6,4,SKIN); D(6,5,SKIN); D(6,6,SKIN); D(6,7,SKIN);
  D(16,4,SKIN); D(16,5,SKIN); D(16,6,SKIN); D(16,7,SKIN);
  D(7,10,SKIN); D(8,10,SKIN); D(9,10,SKIN); D(10,10,SKIN);
  D(11,10,SKIN); D(12,10,SKIN); D(13,10,SKIN); D(14,10,SKIN); D(15,10,SKIN);
  // Ear
  D(6,6,SKIN2); D(5,6,SKIN2); D(5,7,SKIN2); D(6,7,SKIN2);
  D(16,6,SKIN2); D(17,6,SKIN2); D(17,7,SKIN2); D(16,7,SKIN2);
  // Chin
  D(8,11,SKIN); D(9,11,SKIN); D(10,11,SKIN); D(11,11,SKIN); D(12,11,SKIN); D(13,11,SKIN); D(14,11,SKIN);
  D(9,12,SKIN); D(10,12,SKIN); D(11,12,SKIN); D(12,12,SKIN); D(13,12,SKIN);
  // Hair locks at side
  D(7,3,HAIR); D(6,3,HAIR); D(8,3,HAIR);
  D(15,3,HAIR); D(16,3,HAIR); D(14,3,HAIR);
  // EYES
  const eyeState = state==='sad'?1:0;
  D(9,6+eyeState,EYE); D(10,6+eyeState,EYE);
  D(13,6+eyeState,EYE); D(14,6+eyeState,EYE);
  // Eyebrow
  D(9,5,HAIR); D(10,5,HAIR); D(11,5,HAIR);
  D(12,5,HAIR); D(13,5,HAIR); D(14,5,HAIR);
  if(state==='sad'){D(9,5,SKIN2); D(13,5,SKIN2);}
  // Eye whites
  D(9,6,WING_L); D(10,6,WING_L); D(13,6,WING_L); D(14,6,WING_L);
  D(9,6+eyeState,EYE); D(10,6+eyeState,EYE); D(13,6+eyeState,EYE); D(14,6+eyeState,EYE);
  // Nose
  D(11,8,SKIN2); D(12,8,SKIN2); D(10,9,SKIN2); D(13,9,SKIN2);
  // MOUTH
  if(state==='happy'){
    D(9,10,MOUTH_H); D(10,10,MOUTH_H); D(11,10,MOUTH_H); D(12,10,MOUTH_H); D(13,10,MOUTH_H);
    D(8,9,MOUTH_H); D(14,9,MOUTH_H);
    D(9,11,SKIN); D(13,11,SKIN); // dimples
    // teeth
    D(10,10,WING_L); D(11,10,WING_L); D(12,10,WING_L);
  } else if(state==='sad'){
    D(9,11,MOUTH_S); D(10,11,MOUTH_S); D(11,11,MOUTH_S); D(12,11,MOUTH_S); D(13,11,MOUTH_S);
    D(8,10,MOUTH_S); D(14,10,MOUTH_S);
    D(9,12,SKIN2); D(13,12,SKIN2);
  } else {
    D(9,10,MOUTH_N); D(10,10,MOUTH_N); D(11,10,MOUTH_N); D(12,10,MOUTH_N); D(13,10,MOUTH_N);
    D(8,10,SKIN2); D(14,10,SKIN2);
  }

  // ===== TOGA / BODY =====
  // Neck
  D(10,13,SKIN); D(11,13,SKIN); D(12,13,SKIN);
  D(10,14,SKIN); D(11,14,SKIN); D(12,14,SKIN);
  // Shoulders
  R(7,15, 15,15, TOGA);
  D(6,15,TOGA_S); D(16,15,TOGA_S);
  // Toga collar/drape detail
  D(9,14,TOGA); D(13,14,TOGA);
  D(8,15,TOGAS); D(14,15,TOGAS);
  // Body toga
  R(7,16, 15,26, TOGA);
  D(6,16,TOGA_S); D(6,17,TOGA_S); D(6,18,TOGA_S);
  D(16,16,TOGA_S); D(16,17,TOGA_S); D(16,18,TOGA_S);
  // Toga folds (darker lines for detail)
  for(let y=16;y<=26;y+=3){
    D(9,y,TOGA_S); D(12,y,TOGA_S);
  }
  // Toga drape left
  D(5,17,TOGA); D(4,18,TOGA); D(5,18,TOGA);
  D(5,19,TOGA); D(4,19,TOGA_S);
  // Toga drape right
  D(17,17,TOGA); D(18,18,TOGA); D(17,18,TOGA);
  D(17,19,TOGA); D(18,19,TOGA_S);
  // Belt
  R(7,24, 15,25, BELT);
  D(11,24,GOLD3); D(11,25,GOLD3); // buckle
  // Lower toga / skirt
  R(6,26, 16,32, TOGA);
  D(5,26,TOGA_S); D(17,26,TOGA_S);
  D(5,27,TOGA_S); D(17,27,TOGA_S);
  // Toga hem detail
  for(let x=6;x<=16;x++) D(x,32,TOGAS);

  // ===== ARMS =====
  // Left arm (holding caduceus)
  D(5,16,SKIN); D(4,17,SKIN); D(3,18,SKIN); D(3,19,SKIN);
  D(3,20,SKIN); D(4,21,SKIN); D(4,22,SKIN);
  D(5,16,TOGA_S); // sleeve start
  // Left hand
  D(3,23,SKIN); D(4,23,SKIN); D(3,24,SKIN); D(4,24,SKIN);
  D(2,23,SKIN); // thumb

  // Right arm
  if(state==='happy'){
    // Arm raised for thumb up
    D(17,16,SKIN); D(18,15,SKIN); D(19,14,SKIN); D(19,13,SKIN);
    D(19,12,SKIN); D(19,11,SKIN);
    // Fist
    D(19,15,SKIN); D(20,15,SKIN); D(20,16,SKIN); D(19,16,SKIN);
    // THUMB UP (golden!)
    D(20,11,GOLD3); D(20,10,GOLD3); D(20,9,GOLD3); D(20,8,GOLD3);
    D(21,10,GOLD3); D(21,9,GOLD3);
    D(20,12,SKIN); // knuckle
    // Glow
    ctx.shadowColor='#f0c030'; ctx.shadowBlur=8;
    D(20,9,GOLD3);
    ctx.shadowBlur=0;
  } else if(state==='sad'){
    // Both hands on head/face
    D(17,16,SKIN); D(18,15,SKIN); D(19,14,SKIN); D(19,13,SKIN);
    D(18,12,SKIN); D(17,11,SKIN); D(16,10,SKIN); D(15,9,SKIN);
    D(18,13,SKIN); D(17,12,SKIN); D(16,11,SKIN);
    // fingers splayed on face
    D(15,8,SKIN); D(16,8,SKIN); D(14,8,SKIN);
  } else {
    D(17,16,SKIN); D(18,17,SKIN); D(18,18,SKIN);
    D(18,19,SKIN); D(17,20,SKIN); D(17,21,SKIN);
    D(17,22,SKIN);
  }

  // ===== LEGS =====
  // Leg left
  D(8,33,SHIN); D(9,33,SHIN); D(8,34,SHIN); D(9,34,SHIN);
  D(8,35,SHIN); D(9,35,SHIN); D(8,36,SHIN); D(9,36,SHIN);
  D(8,37,SHIN); D(9,37,SHIN); D(8,38,SHIN); D(9,38,SHIN);
  // Leg right
  D(12,33,SHIN); D(13,33,SHIN); D(12,34,SHIN); D(13,34,SHIN);
  D(12,35,SHIN); D(13,35,SHIN); D(12,36,SHIN); D(13,36,SHIN);
  D(12,37,SHIN); D(13,37,SHIN); D(12,38,SHIN); D(13,38,SHIN);
  // Knee detail
  D(8,36,SKIN2); D(9,36,SKIN2); D(12,36,SKIN2); D(13,36,SKIN2);

  // ===== WINGED SANDALS =====
  // Left foot + sandal
  R(6,39, 11,40, SANDAL);
  D(5,39,SANDAL2); D(5,40,SANDAL2);
  D(12,39,SANDAL2);
  // Sandal straps
  D(7,39,SANDAL2); D(9,39,SANDAL2);
  D(8,38,SANDAL2); D(10,38,SANDAL2);
  // Left ankle wings
  D(4,38,WING_L); D(3,37,WING_L); D(3,38,WING_L); D(2,37,WING_D);
  D(4,37,WING_L); D(3,36,WING_D); D(2,38,WING_D);
  D(4,39,WING_D); D(3,39,WING_D);

  // Right foot + sandal
  R(11,39, 16,40, SANDAL);
  D(10,39,SANDAL2);
  D(17,39,SANDAL2); D(17,40,SANDAL2);
  // Sandal straps
  D(12,39,SANDAL2); D(14,39,SANDAL2);
  D(13,38,SANDAL2); D(15,38,SANDAL2);
  // Right ankle wings
  D(18,38,WING_L); D(19,37,WING_L); D(19,38,WING_L); D(20,37,WING_D);
  D(18,37,WING_L); D(19,36,WING_D); D(20,38,WING_D);
  D(18,39,WING_D); D(19,39,WING_D);

  // FLOATING GLOW effect on whole figure
  if(state==='idle' || state==='happy'){
    // Subtle golden outline glow
    ctx.shadowColor = state==='happy'?'#f0c030':'#c8a030';
    ctx.shadowBlur = state==='happy'?12:6;
    D(11,24,GOLD3); // re-draw belt buckle to apply glow
    ctx.shadowBlur=0;
  }
}


function drawPhilo(canvas, state) {
  const ctx = canvas.getContext('2d');
  const s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const D = (x, y, c) => { ctx.fillStyle=c; ctx.fillRect(x*s, y*s, s, s); };
  const R = (x1,y1,x2,y2,c) => { ctx.fillStyle=c; ctx.fillRect(x1*s,y1*s,(x2-x1+1)*s,(y2-y1+1)*s); };

  // PALETTE
  const SKIN='#d0b898', SKIN2='#b09070', SKIN3='#c0a888';
  const HAIR='#1a1010', COAT='#14141e', COAT_L='#1e1e2e', COAT_S='#0a0a12';
  const SHIRT='#f0ece0', SHIRT_S='#d0ccb8', PANTS='#10101a', PANTS_L='#181820';
  const GLASS='#6878c0', GLASS_L='#8898e0', GLASS_F='#c0c8f0';
  const BEARD='#2a2010', BEARD_L='#3a3020', MOUTH_N='#a08060', MOUTH_H='#c06040', MOUTH_S='#6a4020';
  const SHOE='#0a0810', SHOE_L='#1a1820', GOLD='#e8c050', EYE='#0a0818';
  const BUTTON='#8898c0', TIE='#4050a0';

  // ===== HAIR (detailed) =====
  R(7,1, 15,3, HAIR);

  for(let x=6;x<=17;x++) D(x,50,COAT_S);

  // ===== ARMS =====

    D(17,22,COAT); D(18,21,COAT); D(19,20,COAT); D(19,19,SKIN);

    // BOTH HANDS ON HEAD

    D(5,25,COAT); D(4,26,COAT); D(4,27,SKIN); D(5,28,SKIN);

    D(6,20,SHIRT); D(17,20,SHIRT);

  // ===== TROUSERS =====

  R(8,51, 10,57, PANTS_L);

const VULGA_DICT = {
  "maïeutique": "L'art de faire accoucher les esprits — Socrate pose des questions pour que son interlocuteur trouve lui-même la vérité qu'il portait en lui sans le savoir.",
  "arché": "Le principe premier de toutes choses — ce dont tout est fait à l'origine. Les présocratiques cherchaient l'arché : eau pour Thalès, feu pour Héraclite, atomes pour Démocrite.",
  "logos": "La raison universelle qui ordonne le monde. Chez Héraclite, le logos est la loi cachée derrière le changement apparent des choses.",
  "eudaimonia": "Le bonheur au sens aristotélicien — non pas le plaisir, mais la vie accomplie, l'épanouissement de ce qu'on est vraiment. Littéralement : avoir un bon démon, être en accord avec son meilleur soi.",
  "catharsis": "La purification des émotions par le spectacle tragique. En voyant souffrir Œdipe, on pleure — et on sort soulagé, purgé de nos propres angoisses.",
  "ataraxie": "La tranquillité de l'âme, l'absence de trouble — idéal des épicuriens et des stoïciens. Ce n'est pas l'ennui, c'est la paix profonde qui vient quand on ne désire plus ce qu'on ne peut pas avoir.",
  "épochè": "La suspension du jugement — refuser de trancher, ni oui ni non, quand on ne peut pas être sûr. La stratégie du sceptique pour éviter l'erreur.",
  "mimèsis": "L'imitation — pour Platon, l'art imite la réalité qui elle-même imite les Idées. Pour Aristote, la mimèsis est positive : elle permet d'apprendre en représentant.",
  "agora": "La place publique d'Athènes — lieu de la politique, du commerce, du débat. Symbole de l'espace démocratique où les citoyens se rencontrent et délibèrent ensemble.",
  "cogito": "Le raisonnement de Descartes : 'Je doute → Je pense → J'existe.' La seule certitude absolue est celle de ma propre pensée — même le doute prouve que je suis là pour douter.",
  "tabula rasa": "L'ardoise vierge — l'idée de Locke que l'esprit naît entièrement vide, sans idées innées. Tout vient de l'expérience : on apprend en vivant, pas en naissant.",
  "noumène": "La chose en soi — la réalité telle qu'elle est indépendamment de notre perception. Pour Kant, on ne peut jamais la connaître directement : on ne connaît que les phénomènes (ce que nos sens et notre esprit construisent).",
  "phénomène": "Ce qui apparaît à notre conscience — non pas la réalité brute, mais la réalité telle que nous la percevons et que notre esprit la structure. Kant : on ne connaît que des phénomènes, jamais les choses en soi.",
  "dialectique": "La progression par oppositions : une thèse rencontre son contraire (antithèse), et leur conflit produit quelque chose de nouveau (synthèse). Hegel voit l'Histoire entière comme un grand mouvement dialectique.",
  "impératif catégorique": "La règle morale absolue de Kant : agis seulement selon une maxime que tu pourrais vouloir voir devenir une loi universelle. Pas 'd'accord si ça m'arrange' — mais 'est-ce que tout le monde pourrait agir comme moi ?'",
  "aliénation": "Devenir étranger à soi-même. Chez Marx, l'ouvrier est aliéné car il ne possède pas le produit de son travail, ne contrôle pas son activité, et se retrouve en compétition avec ses semblables. Il est réduit à un rouage.",
  "plus-value": "La valeur que l'ouvrier crée au-delà de son salaire, et que le capitaliste s'approprie. Si tu travailles 8h et que tu es payé pour 5h de valeur produite, les 3h restantes vont au patron.",
  "volonté de puissance": "Chez Nietzsche, ce n'est pas le désir de dominer les autres — c'est la force créatrice qui pousse à se dépasser, à donner forme à sa vie. L'artiste qui crée, le philosophe qui pense au-delà des conventions : voilà la volonté de puissance.",
  "éternel retour": "L'hypothèse la plus vertigineuse de Nietzsche : et si ta vie devait se répéter identiquement, à l'infini ? Ce test radical te force à ne vivre que des moments que tu voudrais revivre éternellement.",
  "surhomme": "L'Übermensch de Nietzsche — non pas un super-héros ou un conquérant, mais celui qui a créé ses propres valeurs après la mort de Dieu, sans se réfugier dans le ressentiment ni le nihilisme.",
  "dasein": "L'être-là — la façon dont Heidegger nomme l'existence humaine. L'homme n'est pas d'abord un sujet pensant (Descartes) : il est jeté dans le monde, il habite un espace, une époque, une langue.",
  "intentionnalité": "La propriété fondamentale de la conscience selon Husserl : la conscience est toujours conscience de quelque chose. Il n'y a pas de conscience vide — penser, c'est toujours penser à quelque chose.",
  "mauvaise foi": "Le mensonge à soi-même selon Sartre — se convaincre qu'on n'a pas le choix, qu'on est conditionné, qu'on 'est comme ça'. C'est fuir la liberté radicale en se traitant comme une chose.",
  "en-soi / pour-soi": "La distinction centrale de Sartre. L'en-soi, c'est les choses (une pierre, une table) — elles sont ce qu'elles sont, sans conscience. Le pour-soi, c'est la conscience humaine — elle n'est jamais fixe, elle se projette toujours vers ce qu'elle n'est pas encore.",
  "chair du monde": "Le concept clé de Merleau-Ponty — notre corps et le monde sont faits de la même substance perceptive. On ne perçoit pas le monde de l'extérieur : on est tissé dedans, comme une main qui touche peut aussi être touchée.",
  "habitus": "Chez Bourdieu, l'ensemble des dispositions qu'on incorpore sans s'en rendre compte — façons de parler, de se tenir, de juger. L'habitus de classe fait qu'on se sent 'à sa place' ou 'déplacé' dans certains contextes, sans même y réfléchir.",
  "biopolitique": "Le pouvoir qui gère les corps et les populations — Foucault montre que le pouvoir moderne ne tue pas (pouvoir de mort) mais administre la vie : naissances, santé, sexualité, normes. Le biopouvoir vous fait vivre d'une certaine façon.",
  "déconstruction": "La méthode de Derrida — non pas détruire un texte, mais le démonter pour montrer les contradictions qu'il cache. Toute opposition binaire (raison/folie, homme/femme, présence/absence) cache une hiérarchie arbitraire.",
  "rhizome": "L'image de Deleuze et Guattari pour penser autrement que 'en arbre' (racine → tronc → branches). Un rhizome (comme le gingembre) pousse dans tous les sens, sans centre, sans hiérarchie — c'est une multiplicité sans origine.",
  "performativité": "Le genre n'est pas ce qu'on est mais ce qu'on fait — selon Butler, la féminité est une série d'actes répétés (gestes, vêtements, attitudes) qui créent l'illusion d'une essence. On ne révèle pas son genre : on le performe.",
  "différance": "Le néologisme de Derrida (avec un 'a') — jeu sur 'différer' (être différent) et 'différer' (remettre à plus tard). Le sens d'un mot n'est jamais là, présent : il est toujours renvoyé à d'autres mots, indéfiniment.",
  "simulacre": "Chez Baudrillard, une copie sans original — une image qui ne représente plus rien de réel. Disneyland est un simulacre : il ressemble à l'Amérique de manière plus vraie que la vraie Amérique.",
  "résonance": "Le concept de Rosa — l'expérience d'être touché par le monde, transformé par lui, de sentir que le monde répond à vos gestes. Le contraire de l'indifférence et de la maîtrise totale.",
  "umwelt": "Le monde propre d'un organisme — non pas l'environnement objectif (Umgebung), mais la portion du monde qui a une signification pour lui. La tique ne 'voit' que la chaleur et l'odeur du sang. L'humain découpe le monde selon ses perceptions.",
  "kulturarbeit": "Le travail culturel — chez Benslama, le travail de représentation, de symbolisation, d'élaboration artistique que font les sociétés pour digérer les ruptures. Sans Kulturarbeit, la rupture devient traumatisme.",
  "weltanschauung": "La vision du monde — l'ensemble des représentations, croyances et valeurs à travers lesquelles un individu ou une culture interprète et perçoit la réalité. Chaque Weltanschauung découpe le monde différemment.",
  "bovarysme": "Se croire autre que l'on est, vivre dans l'illusion romantique. Emma Bovary se croit l'héroïne d'un roman sentimental alors qu'elle est une bourgeoise de province — cette inadéquation entre le rêve et le réel la détruira.",
  "stream of consciousness": "Le flux de conscience — technique narrative qui restitue le mouvement continu des pensées, sans ponctuation ni ordre logique. Woolf et Joyce plongent le lecteur dans l'intérieur d'un esprit en train de penser.",
  "réalisme magique": "Style littéraire où le surnaturel s'intègre au quotidien sans surprise — Garcia Márquez peut faire monter quelqu'un au ciel en pliant du linge sans que personne ne s'étonne. La magie est aussi normale que la pluie.",
  "négritude": "Mouvement littéraire et politique fondé par Césaire et Senghor — revendiquer et valoriser l'identité noire comme source de fierté, contre l'assimilation coloniale qui demandait aux Africains de devenir 'français'.''",
  "dialogisme": "Chez Bakhtine, tout texte est habité par d'autres voix — quand tu parles, tu reprends, tu tords, tu combats les mots de ceux qui parlaient avant toi. Il n'y a pas de discours pur, monologique.",
  "tenebrisme": "La technique picturale de Caravage — contraste radical entre zones très éclairées et ombres profondes, quasi totales. La lumière semble jaillir de nulle part sur les personnages, les arrachant à l'obscurité.",
  "sfumato": "La technique de Léonard de Vinci — les contours ne sont pas nets mais fondus, vaporeux. La Joconde n'a pas de sourcils dessinés : ils se dissolvent dans la peau. Cela crée une ambiguïté, une vie.",
  "pointillisme": "Peindre non pas en mélangeant les couleurs sur la palette, mais en posant des points de couleurs pures côte à côte. L'œil du spectateur les mélange optiquement — Seurat a basé cette technique sur la théorie des couleurs.",
  "gesamtkunstwerk": "L'œuvre d'art totale selon Wagner — une fusion de la musique, du texte, de la mise en scène, de l'architecture, de la lumière en une expérience unique et indissociable. Bayreuth a été conçu pour ça.",
  "aura": "Chez Benjamin, la présence unique de l'œuvre originale — son hic et nunc, son ici et maintenant. Une photo de la Joconde n'a pas d'aura : la Joconde elle-même, oui. La reproduction détruit l'aura.",
  "vanité": "Genre pictural baroque — nature morte avec crâne, bougie qui s'éteint, sablier. Rappel de la mort (memento mori) et de la futilité des richesses terrestres. Tout passe, même vous.",
  "hubris": "La démesure, l'orgueil qui pousse les mortels à défier les dieux. Icare vole trop haut, Prométhée vole le feu, Sisyphe trompe la mort. L'hubris appelle toujours la némésis — la punition divine.",
  "nemesis": "La justice divine, la punition qui s'abat sur ceux qui ont commis l'hubris. La Némésis est personnifiée comme déesse de la vengeance équitable — elle rétablit l'ordre cosmique.",
  "psychopompe": "Celui qui guide les âmes des morts — Hermès est le psychopompe de la mythologie grecque. Il conduit les défunts aux Enfers sans s'y perdre lui-même.",
  "cosmogonie": "Le récit de la création du monde — chaque culture a le sien. La Genèse, l'Enuma Elish babylonien, la Théogonie d'Hésiode : des façons de répondre à 'pourquoi y a-t-il quelque chose plutôt que rien ?'",
  "théogonie": "Le récit de la naissance et de la généalogie des dieux. La Théogonie d'Hésiode raconte comment du Chaos initial émergent Gaïa, puis les Titans, puis les Olympiens — l'arbre généalogique divin.",
  "caducée": "Le bâton d'Hermès entouré de deux serpents entrelacés et surmonté d'ailes. Attribut du messager divin, symbole de la médiation et du commerce. (Attention : le caducée est souvent confondu avec le bâton d'Asclépios — un seul serpent — symbole de la médecine.)"
};


function findVulgaDef(card) {
  const text = (card.titre + ' ' + card.contenu).toLowerCase();
  const theme = card.theme.toLowerCase();
  const domaine = card.domaine.toLowerCase();

  // Try to match concepts in order of relevance
  for(const [concept, def] of Object.entries(VULGA_DICT)) {
    const c = concept.toLowerCase();
    // Check if the concept appears in the card text
    if(text.includes(c)) {
      return { concept, def };
    }
  }

  // Theme-level fallbacks
  if(theme.includes('antique') && domaine === 'Philosophie')
    return { concept: 'eudaimonia', def: VULGA_DICT['eudaimonia'] };
  if(theme.includes('moderne') && text.includes('kant'))
    return { concept: 'impératif catégorique', def: VULGA_DICT['impératif catégorique'] };
  if(theme.includes('contemporaine') && text.includes('foucault'))
    return { concept: 'biopolitique', def: VULGA_DICT['biopolitique'] };

  return null;
}


function buildProse(card) {
  const facts = card.contenu.split(' | ').map(f => f.trim()).filter(f => f.length > 3);
  const title = card.titre;
  const theme = card.theme;

  const dashIdx = title.indexOf(' \u2014 ');
  const author = dashIdx > 0 ? title.substring(0, dashIdx).trim() : title;
  const oeuvre = dashIdx > 0 ? title.substring(dashIdx + 3).trim() : '';

  // Date fact: starts with digit, ~ or roman numeral century
  const dateFact = facts.find(f =>
    /^[~\d]/.test(f) || /^(XIVe|XVe|XVIe|XVIIe|XVIIIe|XIXe|XXe|XXIe|IVe|Ve|IIIe|IIe|Ier|VIe|VIIe|VIIIe|IXe|Xe|XIe|XIIe|XIIIe)/.test(f)
  );
  const nonDate = facts.filter(f => f !== dateFact);

  // A fact is "quoted" if it starts AND ends with a quote char — it is a standalone citation
  // All other facts are plain explanatory content — keep them intact
  const isStandaloneQuote = f => {
    const s = f.trim();
    return (s.startsWith('\u00ab') && s.endsWith('\u00bb')) ||
           (s.startsWith("'") && s.endsWith("'")) ||
           (s.startsWith('\u2018') && s.endsWith('\u2019')) ||
           (s.startsWith('"') && s.endsWith('"'));
  };

  const standaloneQuotes = nonDate.filter(isStandaloneQuote);
  const plainFacts = nonDate.filter(f => !isStandaloneQuote(f));

  const paras = [];

  // P1 — Context: who, when, what work
  let p1 = '';
  if (oeuvre && dateFact) {
    p1 = author + ' d\u00e9veloppe ces id\u00e9es dans ' + oeuvre + ' (' + dateFact + ').';
  } else if (oeuvre) {
    p1 = oeuvre + ' est l\u2019une des \u0153uvres majeures de ' + author + '.';
  } else if (dateFact) {
    p1 = author + ' (' + dateFact + ') est une figure centrale de la ' + theme + '.';
  } else {
    p1 = author + ' est une figure essentielle de la ' + theme + '.';
  }
  paras.push(p1);

  // P2 — Plain facts as flowing prose (kept verbatim, just joined)
  const substantial = plainFacts.filter(f => f.length > 12);
  if (substantial.length >= 1) {
    // First fact starts a sentence, rest follow naturally
    let p = substantial[0];
    if (!p.endsWith('.') && !p.endsWith('!') && !p.endsWith('?')) p += '.';
    for (let i = 1; i < substantial.length; i++) {
      const f = substantial[i];
      const connector = i === 1 ? ' Cela implique que ' : ' Par ailleurs, ';
      const fLower = f.charAt(0).toLowerCase() + f.slice(1);
      p += connector + fLower + (fLower.endsWith('.') || fLower.endsWith('!') || fLower.endsWith('?') ? '' : '.');
    }
    paras.push(p);
  }

  // P3 — Standalone citations: display as-is (they are complete in the data)
  standaloneQuotes.forEach(q => {
    // Normalise to guillemets if using apostrophes
    let norm = q.trim();
    if ((norm.startsWith("'") && norm.endsWith("'"))) {
      norm = '\u00ab\u00a0' + norm.slice(1, -1).trim() + '\u00a0\u00bb';
    }
    if (!norm.endsWith('.') && !norm.endsWith('\u00bb') && !norm.endsWith('!') && !norm.endsWith('?')) {
      norm += '.';
    }
    // Add a short gloss if we recognize this citation
    const gloss = glossQuote(norm, author);
    paras.push(norm);
    if (gloss) paras.push(gloss);
  });

  // P4 — Significance: why this author matters
  const sig = buildSignificance(author);
  if (sig) paras.push(sig);

  return paras
    .filter(p => p.trim().length > 5)
    .map(p => '<p style="margin-bottom:12px;line-height:1.85">' + p + '</p>')
    .join('');
}


function glossQuote(text, author) {
  const t = text.toLowerCase();
  if (t.includes('je pense donc je suis') || (t.includes('cogito') && t.includes('ergo')))
    return 'Autrement dit\u00a0: la seule chose dont on ne peut douter, c\u2019est l\u2019acte m\u00eame de douter \u2014 et donc d\u2019exister en tant que pens\u00e9e.';
  if (t.includes('existence pr\u00e9c\u00e8de') && t.includes('essence'))
    return 'L\u2019homme n\u2019a pas de nature fix\u00e9e \u00e0 la naissance\u00a0: il se d\u00e9finit enti\u00e8rement par ce qu\u2019il fait de sa vie. Aucun dieu ni aucune nature ne d\u00e9cide \u00e0 sa place.';
  if (t.includes('enfer') && t.includes('les autres'))
    return 'Non pas que les autres soient mauvais, mais que leur regard nous fige dans une image de nous-m\u00eames que nous ne contr\u00f4lons pas.';
  if (t.includes('dieu est mort'))
    return 'Nietzsche ne se r\u00e9jouit pas\u00a0: il constate que l\u2019Europe a perdu le socle moral sur lequel elle s\u2019appuyait depuis des si\u00e8cles, sans avoir encore trouv\u00e9 quoi y substituer.';
  if (t.includes('sisyphe heureux'))
    return 'Face \u00e0 l\u2019absurdit\u00e9, Camus choisit la r\u00e9volte plut\u00f4t que le d\u00e9sespoir\u00a0: accepter l\u2019absurde sans le fuir, et y trouver une forme de libert\u00e9.';
  if (t.includes('on ne na\u00eet pas femme'))
    return 'Beauvoir distingue le sexe biologique de la f\u00e9minit\u00e9 sociale construite. La femme n\u2019est pas une essence naturelle\u00a0: c\u2019est un r\u00f4le impos\u00e9 par la soci\u00e9t\u00e9.';
  if (t.includes('ne peut rien concevoir de plus grand'))
    return 'Argument d\u2019Anselme\u00a0: si Dieu n\u2019existait que dans notre esprit, on pourrait imaginer un Dieu encore plus grand (qui existerait aussi dans la r\u00e9alit\u00e9) \u2014 donc Dieu doit n\u00e9cessairement exister en r\u00e9alit\u00e9.';
  if (t.includes('condamn') && t.includes('libre'))
    return 'La libert\u00e9 selon Sartre n\u2019est pas un cadeau\u00a0: on ne peut pas ne pas choisir. M\u00eame ne rien faire est un choix dont on est enti\u00e8rement responsable.';
  if (t.includes('imaginer c') && t.includes('hausser le r'))
    return 'Pour Bachelard, imaginer n\u2019est pas fuir le r\u00e9el mais l\u2019enrichir\u00a0: l\u2019imagination po\u00e9tique r\u00e9v\u00e8le des dimensions du monde que la perception ordinaire ne peut atteindre.';
  if (t.includes('ne s\u2019agit plus d\u2019interpr\u00e9ter'))
    return 'Nancy reprend Marx\u00a0: la philosophie ne doit plus se contenter d\u2019expliquer le monde, elle doit contribuer \u00e0 le transformer par l\u2019action r\u00e9fl\u00e9chie.';
  if (t.includes('peut parler') && t.includes('se taire'))
    return 'Les grandes questions (Dieu, le sens de la vie) ne sont pas fausses \u2014 elles sont insens\u00e9es, car elles d\u00e9passent ce que le langage peut exprimer sans se contredire.';
  if (t.includes('raison est esclave des passions'))
    return 'Hume renverse la philosophie classique\u00a0: ce ne sont pas nos d\u00e9sirs qui ob\u00e9issent \u00e0 la raison, mais la raison qui calcule comment satisfaire nos d\u00e9sirs.';
  if (t.includes('l\u2019\u00e9tranger') && t.includes('fronti\u00e8re'))
    return 'Sans fronti\u00e8res, il n\u2019y aurait pas d\u2019\u00e9trangers \u2014 seulement des humains. La figure de l\u2019\u00e9tranger est une construction politique, non une donn\u00e9e naturelle.';
  if (t.includes('chair du monde'))
    return 'Notre corps et le monde sont faits de la m\u00eame \u00e9toffe\u00a0: on ne per\u00e7oit pas le monde de l\u2019ext\u00e9rieur, on est tiss\u00e9 dedans.';
  if (t.includes('zoom politikon') || (t.includes('animal') && t.includes('politique')))
    return 'L\u2019\u00eatre humain ne peut se r\u00e9aliser pleinement qu\u2019au sein d\u2019une communaut\u00e9 politique\u00a0: vivre seul, c\u2019est \u00eatre soit une b\u00eate soit un dieu.';
  return '';
}


function buildSignificance(author) {
  const a = author.toLowerCase();
  if (a.includes('kant'))
    return 'Kant est incontournable\u00a0: apr\u00e8s lui, on ne peut plus poser na\u00efvement la question de la connaissance sans se demander comment l\u2019esprit structure ce qu\u2019il per\u00e7oit.';
  if (a.includes('nietzsche'))
    return 'Nietzsche ne propose pas un syst\u00e8me \u2014 il dynamite toutes les certitudes morales et invite \u00e0 cr\u00e9er ses propres valeurs \u00e0 partir de rien.';
  if (a.includes('hegel'))
    return 'Hegel est difficile mais fondateur\u00a0: Marx, Sartre, Koj\u00e8ve \u2014 une grande partie de la pens\u00e9e du XXe si\u00e8cle est une r\u00e9ponse \u00e0 Hegel.';
  if (a.includes('platon'))
    return 'Platon pose les questions que la philosophie n\u2019a jamais cess\u00e9 de d\u00e9battre\u00a0: justice, v\u00e9rit\u00e9, beaut\u00e9. Son influence sur l\u2019Occident est sans \u00e9gale.';
  if (a.includes('aristote'))
    return 'Aristote revient au concret l\u00e0 o\u00f9 Platon s\u2019envole\u00a0: \u00e9thique pratique, politique r\u00e9elle, observation de la nature.';
  if (a.includes('marx'))
    return 'M\u00eame ceux qui rejettent Marx utilisent ses concepts (ali\u00e9nation, id\u00e9ologie, lutte des classes) sans toujours le savoir.';
  if (a.includes('foucault'))
    return 'Foucault nous apprend \u00e0 voir le pouvoir l\u00e0 o\u00f9 on ne le cherchait pas\u00a0: dans les h\u00f4pitaux, les prisons, les discours m\u00e9dicaux.';
  if (a.includes('sartre'))
    return 'Sartre radicalise la libert\u00e9\u00a0: nous sommes enti\u00e8rement responsables de ce que nous sommes, sans excuses possibles.';
  if (a.includes('camus'))
    return 'Camus offre une r\u00e9ponse \u00e0 l\u2019absurde qui n\u2019est ni religieuse ni nihiliste\u00a0: rester debout, lucide, r\u00e9volt\u00e9.';
  if (a.includes('heidegger'))
    return 'Heidegger renouvelle la question de l\u2019existence, mais son engagement nazi reste une ombre indissociable de son \u0153uvre.';
  if (a.includes('beauvoir') || a.includes('de beauvoir'))
    return 'Le Deuxi\u00e8me Sexe a fond\u00e9 le f\u00e9minisme philosophique en montrant que la condition f\u00e9minine est construite, non naturelle.';
  if (a.includes('bourdieu'))
    return 'Bourdieu explique pourquoi les in\u00e9galit\u00e9s sociales se reproduisent si bien\u00a0: les domin\u00e9s les int\u00e9riorisent sans en avoir conscience.';
  if (a.includes('wittgenstein'))
    return 'Wittgenstein montre que beaucoup de probl\u00e8mes philosophiques sont des confusions de langage \u2014 les dissoudre, c\u2019est d\u00e9j\u00e0 philosopher.';
  if (a.includes('arendt'))
    return 'Arendt est essentielle pour penser le totalitarisme\u00a0: le mal peut \u00eatre banal, et la libert\u00e9 ne survit que dans l\u2019espace public partag\u00e9.';
  if (a.includes('anselme'))
    return 'La preuve ontologique a fascin\u00e9 et agac\u00e9 les philosophes pendant 900 ans \u2014 Descartes la reprend, Kant la d\u00e9truit, les d\u00e9bats continuent.';
  if (a.includes('descartes'))
    return 'Descartes fonde la philosophie moderne sur la certitude du sujet pensant \u2014 un point de d\u00e9part qui structure encore notre fa\u00e7on de penser.';
  if (a.includes('spinoza'))
    return 'Spinoza est le philosophe de l\u2019immanence absolue\u00a0: pas de Dieu ext\u00e9rieur au monde, pas de libre arbitre \u2014 et pourtant une \u00e9thique exigeante.';
  if (a.includes('bachelard'))
    return 'Bachelard r\u00e9concilie la science et la po\u00e9sie\u00a0: l\u2019imagination n\u2019est pas l\u2019ennemie de la connaissance mais une fa\u00e7on diff\u00e9rente d\u2019appr\u00e9hender le r\u00e9el.';
  if (a.includes('rosa'))
    return 'Rosa diagnostique un probl\u00e8me central de nos soci\u00e9t\u00e9s\u00a0: \u00e0 vouloir tout contr\u00f4ler et rendre disponible, on se prive des exp\u00e9riences les plus pr\u00e9cieuses.';
  return '';
}
