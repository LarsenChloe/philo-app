<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Philosophie — Chloé</title>
<link rel="apple-touch-icon" href="icon_philo.png">
<meta name="apple-mobile-web-app-title" content="Philo Chloé">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0a0c14;--bg2:#12151f;--bg3:#1a1e2c;--bg4:#222838;
  --txt:#e8e4d8;--txt2:#8880a0;--txt3:#3a3650;
  --gold:#d4a843;--gold2:#f0c060;--purple:#7060c0;--indigo:#4040a0;
  --green:#40c070;--red:#c04040;--blue:#4080d0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;user-select:none}

/* NAV */
.nav-bar{display:flex;background:var(--bg2);border-bottom:2px solid var(--indigo);position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:14px 4px 10px;text-align:center;cursor:pointer;border:none;background:none;color:var(--txt2);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-icon{font-size:18px}
.nav-label{font-size:9px;letter-spacing:.05em;text-transform:uppercase}

.page{display:none;padding:14px 16px;min-height:calc(100vh - 57px)}
.page.active{display:block}

/* STAR BACKGROUND EFFECT */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%, rgba(64,64,160,.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(112,96,192,.05) 0%, transparent 50%);pointer-events:none;z-index:0}

/* COMMON */
select,button{font-family:'Inter',sans-serif}
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;position:relative;z-index:1}
.ctrl-row select,.ctrl-row button{font-size:11px;padding:0 10px;height:34px;border:1px solid var(--bg4);border-radius:4px;background:var(--bg2);color:var(--txt);cursor:pointer}
.save-row{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap;position:relative;z-index:1}
.save-row span{font-size:10px;color:var(--txt3)}
.btn-save{background:#0a1020!important;color:var(--blue)!important;border:1px solid #1a3060!important;font-size:11px;padding:0 10px;height:34px;border-radius:4px;cursor:pointer}
.btn-load{background:#100a20!important;color:var(--purple)!important;border:1px solid #301060!important;font-size:11px;padding:0 10px;height:34px;border-radius:4px;cursor:pointer}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;position:relative;z-index:1}
.stat-box{background:var(--bg2);border-radius:4px;padding:8px 4px;text-align:center;border:1px solid var(--bg4)}
.stat-n{font-size:20px;font-weight:700}
.stat-l{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.ok-c{color:var(--green)}
.ko-c{color:var(--red)}
.pbar{height:2px;background:var(--bg3);margin-bottom:10px;position:relative;z-index:1}
.pfill{height:100%;background:var(--gold);transition:width .3s}
.flt-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;position:relative;z-index:1}
.flt-row label{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.flt-row select{font-size:11px;padding:0 10px;height:32px;border:1px solid var(--bg4);border-radius:4px;background:var(--bg2);color:var(--txt);cursor:pointer}

/* FLASHCARD */
.flashcard{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:20px 16px;cursor:pointer;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:10px;transition:border-color .15s,transform .1s;position:relative;z-index:1}
.flashcard:active{transform:scale(.98)}
.flashcard:hover{border-color:var(--indigo)}
.fc-dom{font-size:9px;color:var(--purple);margin-bottom:2px;letter-spacing:.15em;text-transform:uppercase;font-weight:700}
.fc-th{font-size:9px;color:var(--txt3);margin-bottom:12px;letter-spacing:.05em}
.fc-w{font-size:20px;font-weight:700;text-align:center;line-height:1.3;color:var(--txt)}
.fc-hint{font-size:10px;color:var(--txt3);margin-top:14px;letter-spacing:.1em}
.fc-sep{width:100%;border-top:1px solid var(--bg4);margin-top:14px;padding-top:12px}
.fc-facts{font-size:12px;color:#a09880;text-align:left;line-height:2;width:100%}
.fact-line{display:flex;gap:8px;padding:1px 0;border-bottom:1px solid var(--bg3)}
.fact-line:last-child{border-bottom:none}
.fact-dot{color:var(--gold);font-weight:700;min-width:12px;flex-shrink:0}
.card-nav{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:10px;position:relative;z-index:1}
.card-nav-i{font-size:11px;color:var(--txt2);min-width:80px;text-align:center}
.card-nav button{font-size:12px;padding:0 16px;height:34px;border:1px solid var(--bg4);border-radius:4px;background:var(--bg2);color:var(--txt);cursor:pointer}
.vote-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px;position:relative;z-index:1}
.vote-row button{flex:1;max-width:170px;font-size:12px;height:44px;border-radius:4px;cursor:pointer;font-weight:700;border:1px solid;letter-spacing:.05em}
.btn-ok{background:#0a2014!important;color:var(--green)!important;border-color:#154028!important}
.btn-ko{background:#200a0a!important;color:var(--red)!important;border-color:#401515!important}

/* ===== PAGE 2 : LE DÉFI ===== */
.defi-header{text-align:center;padding:8px 0 0;position:relative;z-index:1}
.defi-title{font-size:11px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
.streak-display{font-size:56px;font-weight:700;color:var(--gold2);text-shadow:0 0 30px rgba(212,168,67,.5);margin:4px 0}
.streak-label{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.record-display{font-size:12px;color:var(--txt2);margin-bottom:8px}
.record-display span{color:var(--gold)}

/* === PIXEL ART GUARDS === */
.guard-arena{display:flex;justify-content:space-between;align-items:flex-end;margin:0 -16px;padding:0;height:300px;position:relative;z-index:1;overflow:hidden}
.guard-wrap{width:130px;height:300px;display:flex;align-items:flex-end;justify-content:center;flex-shrink:0}
.guard-wrap.left{padding-left:4px}
.guard-wrap.right{padding-right:4px}
.guard-canvas{image-rendering:pixelated;image-rendering:crisp-edges}

/* Hermes floats */
@keyframes hermesFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes hermesHappy{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(-14px) rotate(-8deg)}50%{transform:translateY(-10px) rotate(8deg)}75%{transform:translateY(-14px) rotate(-4deg)}100%{transform:translateY(0) rotate(0)}}
@keyframes hermesSad{0%,100%{transform:translateY(0)}20%{transform:translateY(-4px) rotate(-12deg)}40%{transform:translateY(-2px) rotate(12deg)}60%{transform:translateY(-4px) rotate(-6deg)}}
@keyframes philoHappy{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-6px) rotate(-4deg)}60%{transform:translateY(-4px) rotate(4deg)}}
@keyframes philoSad{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg) translateY(3px)}50%{transform:rotate(5deg) translateY(3px)}75%{transform:rotate(-3deg)}}
.hermes-idle{animation:hermesFloat 3s ease-in-out infinite}
.hermes-happy{animation:hermesHappy .6s ease}
.hermes-sad{animation:hermesSad .5s ease}
.philo-happy{animation:philoHappy .5s ease}
.philo-sad{animation:philoSad .6s ease}

.arena-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10px;gap:4px}
.combo-badge{font-size:28px;min-height:36px;text-align:center}

.defi-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:16px 14px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 0 10px;transition:border-color .3s;position:relative;z-index:1}
.defi-card.correct{border-color:var(--green)!important;background:#0a2014}
.defi-card.wrong{border-color:var(--red)!important;background:#200a0a}
.defi-q-dom{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.15em;font-weight:700;margin-bottom:2px}
.defi-q-theme{font-size:9px;color:var(--txt3);margin-bottom:10px;letter-spacing:.05em}
.defi-q-text{font-size:18px;font-weight:700;text-align:center;line-height:1.3}
.defi-reveal{font-size:12px;color:var(--gold);margin-top:10px;text-align:center;font-style:italic;line-height:1.5}

.defi-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;position:relative;z-index:1}
.choice-btn{padding:10px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--bg4);background:var(--bg2);color:var(--txt);text-align:center;line-height:1.4;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Inter',sans-serif}
.choice-btn:active{transform:scale(.97)}
.choice-btn.reveal-correct{background:#0a2014;border-color:var(--green);color:var(--green)}
.choice-btn.wrong-choice{background:#200a0a;border-color:var(--red);color:var(--red)}

.defi-ctrl-btn{width:100%;padding:14px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;margin-bottom:8px;position:relative;z-index:1;transition:transform .1s;font-family:'Inter',sans-serif;letter-spacing:.05em;text-transform:uppercase}
.defi-ctrl-btn:active{transform:scale(.98)}
.btn-start{background:var(--gold);color:#0a0c14;border-color:var(--gold2)}
.btn-next{background:var(--indigo);color:#fff;border-color:var(--purple)}
.btn-restart{background:#400a0a;color:var(--red);border-color:var(--red)}

/* PAGE 3 RÉVISION */
.rev-search{width:100%;padding:10px 14px;border-radius:4px;font-size:12px;border:1px solid var(--bg4);background:var(--bg2);color:var(--txt);margin-bottom:10px;position:relative;z-index:1;font-family:'Inter',sans-serif}
.rev-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;position:relative;z-index:1;overflow-x:auto}
.rev-filter-btn{padding:6px 12px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--bg4);background:var(--bg2);color:var(--txt2);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.rev-filter-btn.active{background:var(--indigo);border-color:var(--purple);color:var(--txt)}
.rev-count{font-size:10px;color:var(--txt3);margin-bottom:8px;position:relative;z-index:1;text-transform:uppercase;letter-spacing:.05em}
.rev-list{position:relative;z-index:1}
.rev-item{background:var(--bg2);border:1px solid var(--bg4);border-radius:6px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.rev-item:hover{border-color:var(--indigo)}
.rev-item-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rev-item-left{flex:1;min-width:0}
.rev-item-dom{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px}
.rev-item-theme{font-size:9px;color:var(--txt3);margin-bottom:6px;letter-spacing:.05em}
.rev-item-title{font-size:14px;font-weight:700;color:var(--txt);line-height:1.3}
.rev-item-arrow{color:var(--txt3);font-size:14px;flex-shrink:0;transition:transform .2s}
.rev-item.open .rev-item-arrow{transform:rotate(90deg)}
.rev-item-body{padding:0 14px 12px;display:none;border-top:1px solid var(--bg3)}
.rev-item.open .rev-item-body{display:block;padding-top:10px}
.rev-fact-line{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--bg3);font-size:12px;color:#9088a0;line-height:1.6}
.rev-fact-line:last-child{border-bottom:none}
.rev-fact-dot{color:var(--gold);font-weight:700;min-width:12px;flex-shrink:0}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);font-size:12px;padding:8px 18px;border-radius:4px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;font-family:'Inter',sans-serif}
.toast.show{opacity:1}

/* PAGE 4 — QUI A DIT ÇA ? */
.qsdc-title{font-size:11px;color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:.2em;text-transform:uppercase;position:relative;z-index:1}
.qsdc-streak{font-size:52px;font-weight:700;color:var(--gold2);text-align:center;margin:4px 0;text-shadow:0 0 24px rgba(212,168,67,.4);position:relative;z-index:1}
.qsdc-sub{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em;text-align:center;margin-bottom:2px;position:relative;z-index:1}
.qsdc-record{font-size:12px;color:var(--txt2);text-align:center;margin-bottom:12px;position:relative;z-index:1}
.qsdc-record span{color:var(--gold)}

.qsdc-quote-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:18px 16px;margin-bottom:12px;position:relative;z-index:1;transition:border-color .3s}
.qsdc-quote-card.correct{border-color:var(--green);background:#0a2014}
.qsdc-quote-card.wrong{border-color:var(--red);background:#200a0a}
.qsdc-dom{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.15em;font-weight:700;margin-bottom:6px}
.qsdc-quote{font-size:15px;line-height:1.7;color:var(--txt);font-style:italic;margin-bottom:8px}
.qsdc-quote::before{content:'"';color:var(--gold);font-size:20px;font-style:normal;margin-right:2px}
.qsdc-quote::after{content:'"';color:var(--gold);font-size:20px;font-style:normal;margin-left:2px}

.qsdc-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;position:relative;z-index:1}
.qsdc-choice{padding:10px 8px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--bg4);background:var(--bg2);color:var(--txt);text-align:center;line-height:1.4;min-height:44px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Inter',sans-serif;font-weight:500}
.qsdc-choice:active{transform:scale(.97)}
.qsdc-choice.correct-ans{background:#0a2014;border-color:var(--green);color:var(--green)}
.qsdc-choice.wrong-ans{background:#200a0a;border-color:var(--red);color:var(--red)}
.qsdc-choice.reveal-ans{background:#0a2014;border-color:var(--green);color:var(--green)}

/* FICHE EXPLICATIVE */
.qsdc-fiche{background:var(--bg2);border:1px solid var(--gold);border-radius:10px;padding:16px;margin-bottom:12px;display:none;position:relative;z-index:1;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qsdc-fiche.show{display:block}
.qsdc-fiche-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bg4)}
.qsdc-author{font-size:18px;font-weight:700;color:var(--gold)}
.qsdc-oeuvre{font-size:11px;color:var(--txt2);margin-top:3px;font-style:italic}
.qsdc-theme-tag{font-size:9px;color:var(--purple);background:rgba(112,96,192,.15);border:1px solid rgba(112,96,192,.3);border-radius:12px;padding:3px 10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
.qsdc-fiche-section{margin-bottom:14px}
.qsdc-fiche-label{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:7px}
.qsdc-fiche-prose{font-size:13px;color:#c8c0dc;line-height:1.9;font-weight:400}
.qsdc-fiche-prose p{margin-bottom:8px}
.qsdc-fiche-prose p:last-child{margin-bottom:0}
.qsdc-mots-cles{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.qsdc-mot{font-size:10px;color:var(--txt2);background:var(--bg3);border-radius:10px;padding:2px 8px;border:1px solid var(--bg4)}

.qsdc-ctrl-btn{width:100%;padding:14px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;margin-bottom:8px;position:relative;z-index:1;transition:transform .1s;font-family:'Inter',sans-serif;letter-spacing:.05em;text-transform:uppercase}
.qsdc-ctrl-btn:active{transform:scale(.98)}
.qsdc-btn-start{background:var(--gold);color:#0a0c14;border-color:var(--gold2)}
.qsdc-btn-next{background:var(--indigo);color:#fff;border-color:var(--purple)}
.qsdc-btn-restart{background:#400a0a;color:var(--red);border-color:var(--red)}

.qsdc-vulga{background:linear-gradient(135deg,rgba(112,96,192,.12),rgba(64,40,140,.08));border:1px solid rgba(112,96,192,.35);border-radius:10px;padding:14px 16px;margin-bottom:12px;display:none;position:relative;z-index:1;animation:fadeIn .4s ease}
.qsdc-vulga.show{display:block}
.qsdc-vulga-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qsdc-vulga-icon{font-size:16px}
.qsdc-vulga-label{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.15em;font-weight:700}
.qsdc-vulga-concept{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:6px;font-style:italic}
.qsdc-vulga-text{font-size:13px;color:#c8c0dc;line-height:1.85}
</style>
</head>
<body>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="showPage('p1')" id="nb1">
    <span class="nav-icon">🃏</span><span class="nav-label">Flashcards</span>
  </button>
  <button class="nav-btn" onclick="showPage('p2')" id="nb2">
    <span class="nav-icon">⚡</span><span class="nav-label">Le Défi</span>
  </button>
  <button class="nav-btn" onclick="showPage('p3')" id="nb3">
    <span class="nav-icon">📚</span><span class="nav-label">Révision</span>
  </button>
  <button class="nav-btn" onclick="showPage('p4')" id="nb4">
    <span class="nav-icon">🎭</span><span class="nav-label">Qui a dit ça ?</span>
  </button>
</nav>

<!-- PAGE 1 : FLASHCARDS -->
<div class="page active" id="p1">
  <div class="ctrl-row">
    <select id="sd"></select>
    <select id="st"></select>
    <button onclick="p1shuffle()">Mélanger</button>
    <button onclick="p1reset()">Reset</button>
  </div>
  <div class="save-row">
    <button class="btn-save" onclick="p1save()">Sauvegarder</button>
    <button class="btn-load" onclick="document.getElementById('fi').click()">Charger</button>
    <input type="file" id="fi" accept=".json" style="display:none" onchange="p1load(event)">
    <span id="si"></span>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-n" id="s-t">—</div><div class="stat-l">total</div></div>
    <div class="stat-box"><div class="stat-n ok-c" id="s-o">0</div><div class="stat-l">sus</div></div>
    <div class="stat-box"><div class="stat-n ko-c" id="s-k">0</div><div class="stat-l">revoir</div></div>
    <div class="stat-box"><div class="stat-n" id="s-p">—</div><div class="stat-l">score</div></div>
  </div>
  <div class="pbar"><div class="pfill" id="pb" style="width:0%"></div></div>
  <div class="flt-row">
    <label>Filtre :</label>
    <select id="sf" onchange="p1build()">
      <option value="all">Toutes</option>
      <option value="todo">À revoir</option>
      <option value="ok">Sus</option>
    </select>
  </div>
  <div class="flashcard" id="fc" onclick="p1flip()">
    <div class="fc-dom" id="fd"></div>
    <div class="fc-th" id="ft"></div>
    <div class="fc-w" id="fw">Prêt, Chloé !</div>
    <div class="fc-hint" id="fh">— toucher pour révéler —</div>
    <div id="fa" style="display:none" class="fc-sep">
      <div class="fc-facts" id="fc2"></div>
    </div>
  </div>
  <div class="card-nav">
    <button onclick="p1go(-1)">◀</button>
    <span class="card-nav-i" id="ni">—</span>
    <button onclick="p1go(1)">▶</button>
  </div>
  <div class="vote-row" id="vr" style="display:none">
    <button class="btn-ko" onclick="p1vote(false)">✗ Je ne savais pas</button>
    <button class="btn-ok" onclick="p1vote(true)">✓ Je savais !</button>
  </div>
</div>

<!-- PAGE 2 : LE DÉFI -->
<div class="page" id="p2">
  <div class="defi-header">
    <div class="defi-title">⚡ Le Défi des Sages ⚡</div>
    <div class="streak-display" id="streak-num">0</div>
    <div class="streak-label">série en cours</div>
    <div class="record-display">Record : <span id="record-num">0</span></div>
  </div>

  <!-- PIXEL ART ARENA -->

upe | 2e travail d'Héraclès | Détruite en cautérisant les moignons | Sang venimeux utilisé pour les flèches d'Héraclès | Symbolise les problèmes qui se multiplient"],["Mythologie","Créatures grecques","Chimère","Lion + chèvre + serpent | Crache du feu | Tuée par Bellérophon sur Pégase | Lycie (Turquie actuelle) | Métaphore : chimère = idée impossible"],["Mythologie","Créatures grecques","Sirènes","Femmes-oiseaux (puis femmes-poissons à la Renaissance) | Chant envoûtant qui attire les marins vers la mort | Ulysse : attaché au mât, oreilles des marins bouchées | Les Argonautes : Orphée chante plus fort | Symbole de la tentation"],["Mythologie","Créatures grecques","Cerbère","Chien à 3 têtes gardant les Enfers | Queue de serpent | 12e travail d'Héraclès : le capturer vivant | Orphée l'endort avec sa lyre | Psyché lui donne du miel"],["Mythologie","Créatures grecques","Pégase","Cheval ailé né du sang de Méduse | Monture de Bellérophon | Source Hippocrène : frappe du sabot → eau jaillit | Devient constellation | Symbole de l'inspiration poétique"],["Mythologie","Créatures grecques","Centaures","Moitié homme, moitié cheval | Chiron : sage précepteur d'Achille | Centauromachie : bataille Lapithes vs Centaures | Symbolisent l'instinct vs la raison | Nessos : cause la mort d'Héraclès"],["Mythologie","Créatures grecques","Satyres et faunes","Compagnons de Dionysos | Moitié homme, moitié bouc (ou cheval) | Pan : dieu des pâturages, flûte de Pan | Lubricité et fête | Équivalent romain : faunes"],["Mythologie","Héros grecs","Héraclès (Hercule)","Plus grand héros grec | 12 travaux imposés par Eurysthée | Lion de Némée, Hydre, Cerbère, Pommes des Hespérides... | Demi-dieu (Zeus + Alcmène) | Apothéose : devient dieu après sa mort"],["Mythologie","Héros grecs","Achille","Héros de l'Iliade | Fils de Pélée et Thétis | Talon d'Achille : seul point vulnérable | Tue Hector ; tué par Pâris (flèche guidée par Apollon) | Choix : courte vie glorieuse vs longue vie obscure"],["Mythologie","Hé ère-fond"],["Art","Musique-philosophie","John Cage — silence","1912–1992 | 4'33 (1952) : 4 minutes 33 secondes de silence | 'Tout son peut être musique' | Aléatoire ; I Ching | 'Le silence n'existe pas' (chambre anéchoïque) | Fondateur de la musique expérimentale"],["Art","Musique-philosophie","Schoenberg — révolution atonale","1874–1951 | Abandon de la tonalité (~1908) | Dodécaphonisme : série de 12 sons | Moses und Aron (opéra) | 'Je n'ai fait qu'obéir à une nécessité intérieure' | Berg et Webern : École de Vienne"],["Philosophie","Philosophie contemporaine","Francis Wolff — Utopie cosmopolitique","Trois Utopies Contemporaines (2017) | 3 utopies : posthumanisme, animalisme, cosmopolitisme | Les deux premières franchissent des barrières naturelles ; le cosmopolitisme franchit une barrière artificielle : les frontières | Thèse : la construction d'un monde commun passe par l'utopie cosmopolitique | Citation : «L'utopie cosmopolitique est révolutionnaire, elle absolutise les principes de l'humanisme pour en réaliser l'idée»"],["Philosophie","Philosophie contemporaine","Francis Wolff — L'étranger et la frontière","Trois Utopies Contemporaines (2017) | Les nations sont une communauté politique imaginaire alimentant la dialectique du «eux» et du «nous» | L'extranéité (le fait d'être étranger) est produite par la frontière, non par la nature ou l'histoire | Citation : «L'étranger n'est pas l'effet de la nature ni même de l'histoire, il est le produit de la frontière» | Dépasse le cosmopolitisme kantien : vise la suppression des États et une citoyenneté mondiale"],["Philosophie","Philosophie contemporaine","Myriam Revault d'Allonnes — Institution et monde commun","Le Pouvoir des commencements (2006) | Thèse : l'intersubjectivité seule ne suffit pas à élaborer un monde commun ; l'institution est nécessaire | L'institution «structure un monde qui préexiste et survit à chaque génération» | S'appuie sur Merleau-Ponty (cours 1954-1955) : l'institution dépose en nous un sens «comme appel à une suite, exigence d'un avenir» | L'école et la famille : institutions par excellence permettant à l'enfant de s'insérer dans un monde qui le précède"],["Littérature","Grandes oeuvres","Balzac — La Comédie Humaine comme monde total","La Comédie Humaine (1829-1850) | 90+ œuvres ; 2000+ personnages récurrents | Rastignac du Père Goriot (1834) réapparaît dans Illusions perdues (1837) et Splendeurs et misères (1838) | Strates sociales : noblesse du Faubourg Saint-Germain, bourgeoisie, demi-monde (artistes, prostitués) | Unité géographique : Paris + province (Alençon, Sancerre…) | Citation : «Mon ouvrage a sa géographie, sa généalogie, ses familles, ses lieux, ses personnages et ses faits»"],["Philosophie","Philosophie contemporaine","Hartmut Rosa — Indisponibilité et résonance","Rendre le monde indisponible (2018) | Thèse paradoxale : à trop vouloir rendre le monde disponible (connaissable, accessible, maîtrisable, utilisable), on le rend indisponible | La résonance : expérience en 4 étapes — contact, efficacité personnelle, assimilation, indisponibilité | La résonance échappe à tout contrôle | Exemple du chat : il a de la valeur car il peut aussi griffer ; un robot ronronnant perdrait toute résonance | La résonance est une solution contre notre rapport d'agression sur le monde"],["Philosophie","Esthétique","Gilles Lipovetsky — Capitalisme artiste et esthétisation du monde","L'esthétisation du monde (2013), avec Jean Serroy | «Capitalisme artiste transesthétique» : création de valeur économique à partir de la valeur esthétique et expérientielle | Design et relooking comme habitudes sociétales : «L'amour de la décoration est devenu une passion individualiste de masse» | Société de l'hyperspectacle : théâtralisation des centres commerciaux | Citation : «Partout le réel se construit comme une image en y intégrant une dimension esthétique-émotionnelle» | Le monde construit autour de nous n'est que la projection de l'image que nous nous faisons de nous-mêmes"],["Philosophie","Philosophie contemporaine","Fethi Benslama — Révocation subjective et Kulturarbeit","La psychanalyse à l'épreuve de l'islam (2002) | Distinction modernité (rupture longue en Occident, accompagnée de productions artistiques) vs modernisme (rupture brève dans le monde arabo-musulman, sans travail culturel) | Le modernisme entraîne une révocation subjective : «formes de destitutions massives lorsque les conditions du monde ne se laissent plus appréhender par les repères de vérité de la subjectivité» | Kulturarbeit (travail culturel) manquant → perte du monde → entrée dans l'immonde | La radicalisation islamiste : «cri de révolte» face aux mutations du monde | L'art peut pallier cette révocation subjective"],["Philosophie","Philosophie contemporaine","Jean-Luc Nancy — Mondialisation et immonde","La création du monde ou la mondialisation (2002) | Paradoxe : la mondialisation, censée faire monde, incarne une désintégration du monde | Citation : «Le monde a perdu sa capacité de faire monde : il semble avoir gagné seulement celle de multiplier à la puissance de ses moyens une prolifération de l'immonde» | Les populations entrent dans une logique de ségrégation plutôt que d'homogénéisation"],["Philosophie","Philosophie contemporaine","Jean-Luc Nancy — Praxis et sens du monde","Le sens du monde (1993) | Face à la perte du monde, reprend la formule marxiste : «Il ne s'agit plus d'interpréter le monde, mais de le transformer» | Cette transformation passe par la praxis (action réflexive) et non la poiesis (production technique) | Travailler à l'idée de sens du monde = se transformer soi-même en tant qu'individu et collectif | Solution : réfléchir à nos pratiques pour trouver un sens de l'existence capable de faire bouger les choses"],["Philosophie","Philosophie contemporaine","Christopher Lasch — Narcissisme et moi assiégé","Le Moi assiégé (1984) ; La Culture du Narcissisme (1979) | L'individu moderne ressemble à Narcisse : non celui d'Ovide, mais un Narcisse vide en constante recherche d'approbation cherchant à «survire» dans un monde hostile | Banalisation du langage extrémiste (massacre, génocide) → «identification par procuration» aux victimes | Le Moi forme un noyau défensif face au monde | La bureaucratie moderne : lieu de développement du narcissisme, où l'autorité disparaît et le Surmoi est livré à lui-même → forte anxiété | Conséquence : rétractation du monde subjectif"],["Philosophie","Philosophie contemporaine","Camus — Le Mythe de Sisyphe (version cours)","Le Mythe de Sisyphe (1942) | Citation : «L'absurde naît de cette confrontation entre l'appel humain et le silence déraisonnable du monde» | Sisyphe : condamné à rouler un rocher indéfiniment, symbole de l'absurdité | 3 réponses possibles : Dieu, suicide, révolte → Camus récuse les deux premières | La révolte : lucidité face à l'absurdité, accepter le non-sens sans le fuir | Citation : «La lutte elle-même vers les sommets suffit à remplir le cœur d'un homme, il faut imaginer Sisyphe heureux»"],["Philosophie","Philosophie contemporaine","Markus Gabriel — Pourquoi le monde n'existe pas","Pourquoi le monde n'existe pas (2013) | Thèse : le monde n'existe pas car il serait «le champ de sens de tous les champs de sens» — or une chose n'existe que si elle apparaît dans une entité totale, ce que le monde ne peut faire en son propre sein | Champ de sens : lieu où quelque chose apparaît | Il y a une scission entre la pensée des faits (conceptions) et les faits en soi | La religion nous déresponsabilise en répondant à toutes nos questions ; la philosophie invite à comprendre par la réflexion | Ne pas chercher de «structure fondamentale englobante» mais comprendre les champs de sens qui se présentent"],["Littérature","Grandes oeuvres","Zola — Germinal et la transformation collective du monde","Germinal (1885) | Étienne Lantier : conscience de l'exploitation → grèves massives → sortir de la résignation | Citation Marx/Engels (Manifeste, 1848) : «Les prolétaires n'ont à perdre que leurs chaînes ; ils ont un monde à gagner» | La grève radicalise le mouvement : réformistes → révolutionnaires | Propagation aux mines voisines ; dimension internationale (Pluchart) | Limite du collectif : se transforme en masse + individualisme anarchiste de Souvarine qui fait sauter la mine | Thèse : plusieurs manières de transformer collectivement le monde"],["Philosophie","Philosophie contemporaine","Hannah Arendt — Désert et oasis politiques","Qu'est-ce que la politique ? (1993, posthume) | L'activité politique suppose la participation active des citoyens dans la sphère publique pour façonner le monde commun | Métaphore : les oasis = espaces communs où la créativité est encore possible ; le désert = destruction des espaces communs | Danger principal : «que nous devenions de véritables habitants du désert et que nous nous sentions bien chez lui» | Le désintérêt pour la politique rend les hommes superflus | L'existence humaine sans la politique se réduit à la seule dimension naturelle du vivre"],["Philosophie","Philosophie contemporaine","Robert Harrison — Jardins comme maquettes de monde","Jardins, une histoire buissonnière (2008) | Les jardins sont des maquettes de monde qui expriment la vision du monde de leur créateur | Jardins de Versailles : volonté de domination de Louis XIV | Jardins de Roberto Rossi (Florence) : lieu des décisions politiques humanistes | Citation du peintre japonais Shonin : «L'œuvre d'un œil qui laissant les preuves de son génie en a emporté à jamais le secret» | Face à l'hostilité du monde : le jardin permet de «réenchanter le présent» | Académie de Platon : loin de la cité, près de la raison → planter les graines de la réflexion"],["Philosophie","Philosophie moderne","Nietzsche — Le Gai Savoir et les arrière-mondes","Le Gai Savoir (1882), aphorismes 344 et 372 | Critique du scientisme : «Voulons-nous vraiment abaisser l'existence à un exercice de calcul, à un petit pensum pour mathématiciens ?» | Chercher la vérité rationnelle, c'est rêver d'un «autre monde», négation du monde sensible | Critique des philosophes idéalistes (Platon) qui, attirés par «le froid royaume des idées», «niaient la musique de la vie» | Celui qui invente l'«autre monde» est dépressif, pas assez vital | Solution : appréhender le monde avec ses sens ; les hommes nouveaux se mettent en quête de la «grande santé»"],["Littérature","Grandes oeuvres","Baudelaire — Spleen et Idéal : le monde comme représentation subjective","Les Fleurs du Mal (1857), section «Spleen et Idéal» | Thèse : notre monde n'est que la représentation que nous nous en faisons | «La Vie antérieure» : monde beau et lumineux → Baudelaire heureux | «Spleen» : «Quand le ciel bas et lourd pèse comme un couvercle / Sur l'esprit gémissant en proie aux longs ennuis» → monde atroce | Même monde physique, représentation radicalement différente selon l'état intérieur | Les sensations et sentiments de l'individu influent sur sa vision du monde"],["Philosophie","Philosophie contemporaine","Heidegger — Bâtir, Habiter, Penser (1951)","Conférence de 1951 | «Buan» (vieil allemand : habiter) = «bin» (je suis) → habiter c'est être | Citation : «La façon dont tu es et dont je suis, la manière dont nous autres hommes sommes sur Terre est l'habitation. Être homme, c'est être sur Terre comme mortel» | Heimatlosigkeit : situation moderne où les hommes confondent logement et habitation | L'homme est Weltbildend (configurateur du monde) : il fait son monde | La crise du logement n'est pas un manque de logements mais une crise de l'habitation | Il faut d'abord penser la façon d'habiter, puis construire"],["Philosophie","Philosophie contemporaine","Merleau-Ponty — Intersubjectivité et chair du monde","Phénoménologie de la perception (1945) ; Le visible et l'invisible (1988, posthume) | L'intersubjectivité : subjectivité à «parts égales» qui prend acte de la subjectivité d'autrui | Dès qu'un signe est exprimé, la communication devient possible ; les consciences sont «inter-pénétrables» | Le corps n'est pas un objet parmi d'autres : il est la condition fondamentale de l'expérience du monde | «Foi perceptive» : l'existence du monde est éprouvée avant toute interrogation | «Chair du monde» : notre peau est aussi la peau du monde ; le corps est fait de la même texture que le monde"],["Philosophie","Philosophie moderne","Bergson — Langage, art et origine du monde","Le Rire (1900) ; La Pensée et le mouvant (1934) | Le langage est un système symbolique qui réduit notre perception à une représentation conventionnelle → prive d'accès à l'essence des choses | L'art offre une alternative : l'artiste saisit l'âme des objets par sensibilité et intuition, transcendant les limites du langage | Lien avec Proust : «la vraie vie, la vie pleinement vécue c'est la littérature» | La Pensée et le mouvant : les problèmes philosophiques de l'origine de l'être et de l'ordre sont des «fantômes de problèmes», des chimères | Citation : «Les deux problèmes de l'origine de l'ordre, de l'être s'évanouissent»"],["Philosophie","Philosophie contemporaine","Sartre — Double néantisation et conscience révolutionnaire","L'Être et le Néant (1943) | Pour changer le monde, il faut d'abord prendre conscience qu'il doit être changé : la double néantisation | 1re néantisation : trouver un référent extérieur (rencontre ou imagination) qui montre un état différent | 2e néantisation : concevoir que sa propre situation puisse être différente | La souffrance banalisée empêche la 2e néantisation : «Il souffre sans considérer sa souffrance et sans lui conférer de valeur : souffrir et être ne font qu'un pour lui» | Exemple : les canuts de Lyon | Changer le monde exige d'abord une attitude critique et réflexive face aux structures de domination"],["Philosophie","Philosophie contemporaine","Jakob von Uexküll — Umwelt et perception du monde","Mondes Animaux et Monde Humain (1956) | Chacun a une Weltanschauung (représentation du monde) différente | Umgebung : environnement extérieur à un organisme | Umwelt : monde propre dessiné par l'action et la perception de chaque être face à l'Umgebung | Exemple du chêne : pour le forestier = stères de bois ; pour la fillette = esprit malfaisant ; pour le renard = toit protecteur ; pour la fourmis = écorce ; pour la chouette = branches | Citation : «Dis-moi comment tu perçois le monde et je te dirai qui tu es» | Problème pour le monde commun : personne ne perçoit le monde de la même manière"],["Philosophie","Philosophie contemporaine","Wittgenstein — Tractatus : le sens du monde hors du monde","Tractatus Logico-philosophicus (1921) | Le véritable sens du monde se trouve hors de lui : «Dans le monde toutes choses sont comme elles sont et se produisent comme elles se produisent : il n'y a pas en lui de valeur» | Tout ce qu'on peut dire du monde est limité par le langage et la logique, systèmes humains inscrits dans le monde | Chercher le sens du monde = vouloir enfermer l'infini dans les limites finies du langage | Citation : «Ce dont on ne peut parler, il faut le taire» | La quête du sens ultime doit être abandonnée au profit d'une reconnaissance des limites de l'action humaine"],["Philosophie","Esthétique","Arthur Eddington — Désenchantement scientifique du monde","La nature du monde physique (1929) | La science désenchante le monde en le réduisant à des paramètres mesurables | Exemple de l'éléphant sur la pente gazonnée : l'approche scientifique remplace l'animal par une masse de 2 tonnes, la pente par un angle de 60°, le gazon par un coefficient de frottement | La science transforme les faits en paramètres, puis produit des relations entre ces paramètres pour former des lois | Citation : «Toute idée poétique s'évade du problème et, au moment où commence la science exacte, nous restons avec nos lectures seules» | La science retire au monde sa poésie"],["Philosophie","Esthétique","Gaston Bachelard — L'imagination ouvre des mondes","La Poétique de l'espace (1957) ; L'Air et les songes (1934) | L'imagination n'est pas une simple reproduction des images mais une puissance de transformation et de création | L'imagination est un processus ontologique qui modifie notre relation au monde | Citation : «Imaginer c'est hausser le réel d'un ton» | Elle permet de transcender les limites de la perception habituelle et de révéler des aspects cachés de la réalité | Offre une vision poétique et créatrice du monde | L'imagination ouvre des mondes : elle offre de nouvelles possibilités à la réalité"],["Philosophie","Philosophie contemporaine","Hans Jonas — Principe de responsabilité et heuristique de la peur","Le Principe de Responsabilité (1979) | Les nouvelles formes de l'«agir humain» font peser des menaces extrêmes sur l'environnement et l'humanité | L'éthique doit se refonder autour de la responsabilité : obligations envers les êtres qui n'existent pas encore | Nouvel impératif catégorique : «Agis de telle façon que les effets de ton action ne soient pas destructeurs pour la possibilité future d'une telle vie» | «Heuristique de la peur» : anticiper les menaces potentielles pour élaborer des principes éthiques préventifs | Citation : «Le Prométhée définitivement déchaîné réclame une éthique qui, par des entraves librement consenties, empêche le pouvoir de l'homme de devenir une malédiction pour lui»"],["Littérature","Grandes oeuvres","Victor Hugo — Sublime et grotesque, tout être est un monde","Les Misérables (1862) ; Les Contemplations (1856) | Thèse : tout être peut se révéler un monde riche et complexe, résultante de la coexistence du sublime et du grotesque | L'être humain est un microcosme à l'image du macrocosme | Les Misérables : monde d'un bagnard (Jean Valjean), d'une prostituée (Fantine), d'une enfant des rues (Cosette) → les marges de la société comme mondes riches | Poème «La vie aux champs» (Contemplations, 1856) : «Et tout homme est un livre où Dieu lui-même écrit» | Chez Hugo : tout le monde est un monde"]].map(r=>({domaine:r[0],theme:r[1],titre:r[2],contenu:r[3]}));

// ===== PIXEL ART DRAWING =====
function px(ctx, x, y, color, size=4) {
  ctx.fillStyle = color;
  ctx.fillRect(x*size, y*size, size, size);
}

function drawHermes(canvas, state) {
  const ctx = canvas.getContext('2d');
  const s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const D = (x, y, c) => { ctx.fillStyle=c; ctx.fillRect(x*s, y*s, s, s); };
  const R = (x1,y1,x2,y2,c) => { ctx.fillStyle=c; ctx.fillRect(x1*s,y1*s,(x2-x1+1)*s,(y2-y1+1)*s); };

  // PALETTE
  const SKIN='#d4aa80', SKIN2='#c49060', GOLD='#e8c050', GOLD2='#c8a030', GOLD3='#f0d060';
  const WING_L='#f0f0ff', WING_D='#c0c0e0', TOGA='#ece4d4', TOGA_S='#ccc4a4';
  const SNAKE_G='#50b840', SNAKE_D='#308820', STAFF='#b09040', STAFF2='#907020';
  const EYE='#1a1020', MOUTH_N='#a06040', MOUTH_H='#d06040', MOUTH_S='#804020';
  const HAIR='#c89040', SANDAL='#d4a030', SANDAL2='#b08020', SHIN='#c09060';
  const TOGAS='#a8a090', BELT='#c8a040', RED='#c03020';
  const SHADOW='rgba(0,0,0,0.3)';

  // ===== CADUCEUS (left side, x=1..4) =====
  // Staff
  for(let y=8;y<=48;y++) D(2, y, y%2===0?STAFF:STAFF2);
  // Tip (spear point)
  D(2,6,GOLD); D(2,5,GOLD2); D(1,7,GOLD2); D(3,7,GOLD2);
  // Wings on caduceus top
  D(0,9,WING_L); D(0,8,WING_L); D(-1,8,WING_D);
  D(4,9,WING_L); D(4,8,WING_L); D(5,8,WING_D);
  D(0,10,WING_D); D(4,10,WING_D);
  // Snakes winding around staff
  // Snake 1 (green)
  D(3,12,SNAKE_G); D(4,13,SNAKE_G); D(4,14,SNAKE_G); D(3,15,SNAKE_G);
  D(1,16,SNAKE_G); D(0,17,SNAKE_G); D(0,18,SNAKE_G); D(1,19,SNAKE_G);
  D(3,20,SNAKE_G); D(4,21,SNAKE_G); D(4,22,SNAKE_G); D(3,23,SNAKE_G);
  D(1,24,SNAKE_G); D(0,25,SNAKE_G); D(0,26,SNAKE_G); D(1,27,SNAKE_G);
  // Snake heads
  D(4,11,SNAKE_D); D(5,11,SNAKE_D); D(4,10,SNAKE_D);
  D(0,28,SNAKE_D); D(-1,28,SNAKE_D); D(0,29,SNAKE_D);
  // Snake eyes (tiny)
  D(5,10,EYE); D(-1,27,EYE);

  // ===== PÉTASE / HELMET (floating, detailed) =====
  // Wide brim
  R(4,1, 18,2, GOLD2);
  D(3,2,GOLD2); D(19,2,GOLD2);
  // Dome
  R(6,0, 16,1, GOLD);
  D(5,1,GOLD); D(17,1,GOLD);
  // Interior shadow
  R(7,2, 15,2, GOLD2);
  // Helmet crest decoration
  D(11,0,RED); D(12,0,RED);
  // Large wings on sides of helmet
  // Left wing
  D(2,2,WING_L); D(1,1,WING_L); D(0,2,WING_L); D(1,3,WING_L);
  D(2,3,WING_L); D(0,3,WING_D); D(-1,2,WING_D); D(1,0,WING_D);
  D(2,1,WING_D); D(0,1,WING_D);
  // Right wing  
  D(20,2,WING_L); D(21,1,WING_L); D(22,2,WING_L); D(21,3,WING_L);
  D(20,3,WING_L); D(22,3,WING_D); D(23,2,WING_D); D(21,0,WING_D);
  D(20,1,WING_D); D(22,1,WING_D);

  // ===== FACE =====
  // Head shape
  R(7,3, 15,9, SKIN);
  D(6,4,SKIN); D(6,5,SKIN); D(6,6,SKIN); D(6,7,SKIN);
  D(16,4,SKIN); D(16,5,SKIN); D(16,6,SKIN); D(16,7,SKIN);
  D(7,10,SKIN); D(8,10,SKIN); D(9,10,SKIN); D(10,10,SKIN);
  D(11,10,SKIN); D(12,10,SKIN); D(13,10,SKIN); D(14,10,SKIN); D(15,10,SKIN);
  // Ear
  D(6,6,SKIN2); D(5,6,SKIN2); D(5,7,SKIN2); D(6,7,SKIN2);
  D(16,6,SKIN2); D(17,6,SKIN2); D(17,7,SKIN2); D(16,7,SKIN2);
  // Chin
  D(8,11,SKIN); D(9,11,SKIN); D(10,11,SKIN); D(11,11,SKIN); D(12,11,SKIN); D(13,11,SKIN); D(14,11,SKIN);
  D(9,12,SKIN); D(10,12,SKIN); D(11,12,SKIN); D(12,12,SKIN); D(13,12,SKIN);
  // Hair locks at side
  D(7,3,HAIR); D(6,3,HAIR); D(8,3,HAIR);
  D(15,3,HAIR); D(16,3,HAIR); D(14,3,HAIR);
  // EYES
  const eyeState = state==='sad'?1:0;
  D(9,6+eyeState,EYE); D(10,6+eyeState,EYE);
  D(13,6+eyeState,EYE); D(14,6+eyeState,EYE);
  // Eyebrow
  D(9,5,HAIR); D(10,5,HAIR); D(11,5,HAIR);
  D(12,5,HAIR); D(13,5,HAIR); D(14,5,HAIR);
  if(state==='sad'){D(9,5,SKIN2); D(13,5,SKIN2);}
  // Eye whites
  D(9,6,WING_L); D(10,6,WING_L); D(13,6,WING_L); D(14,6,WING_L);
  D(9,6+eyeState,EYE); D(10,6+eyeState,EYE); D(13,6+eyeState,EYE); D(14,6+eyeState,EYE);
  // Nose
  D(11,8,SKIN2); D(12,8,SKIN2); D(10,9,SKIN2); D(13,9,SKIN2);
  // MOUTH
  if(state==='happy'){
    D(9,10,MOUTH_H); D(10,10,MOUTH_H); D(11,10,MOUTH_H); D(12,10,MOUTH_H); D(13,10,MOUTH_H);
    D(8,9,MOUTH_H); D(14,9,MOUTH_H);
    D(9,11,SKIN); D(13,11,SKIN); // dimples
    // teeth
    D(10,10,WING_L); D(11,10,WING_L); D(12,10,WING_L);
  } else if(state==='sad'){
    D(9,11,MOUTH_S); D(10,11,MOUTH_S); D(11,11,MOUTH_S); D(12,11,MOUTH_S); D(13,11,MOUTH_S);
    D(8,10,MOUTH_S); D(14,10,MOUTH_S);
    D(9,12,SKIN2); D(13,12,SKIN2);
  } else {
    D(9,10,MOUTH_N); D(10,10,MOUTH_N); D(11,10,MOUTH_N); D(12,10,MOUTH_N); D(13,10,MOUTH_N);
    D(8,10,SKIN2); D(14,10,SKIN2);
  }

  // ===== TOGA / BODY =====
  // Neck
  D(10,13,SKIN); D(11,13,SKIN); D(12,13,SKIN);
  D(10,14,SKIN); D(11,14,SKIN); D(12,14,SKIN);
  // Shoulders
  R(7,15, 15,15, TOGA);
  D(6,15,TOGA_S); D(16,15,TOGA_S);
  // Toga collar/drape detail
  D(9,14,TOGA); D(13,14,TOGA);
  D(8,15,TOGAS); D(14,15,TOGAS);
  // Body toga
  R(7,16, 15,26, TOGA);
  D(6,16,TOGA_S); D(6,17,TOGA_S); D(6,18,TOGA_S);
  D(16,16,TOGA_S); D(16,17,TOGA_S); D(16,18,TOGA_S);
  // Toga folds (darker lines for detail)
  for(let y=16;y<=26;y+=3){
    D(9,y,TOGA_S); D(12,y,TOGA_S);
  }
  // Toga drape left
  D(5,17,TOGA); D(4,18,TOGA); D(5,18,TOGA);
  D(5,19,TOGA); D(4,19,TOGA_S);
  // Toga drape right
  D(17,17,TOGA); D(18,18,TOGA); D(17,18,TOGA);
  D(17,19,TOGA); D(18,19,TOGA_S);
  // Belt
  R(7,24, 15,25, BELT);
  D(11,24,GOLD3); D(11,25,GOLD3); // buckle
  // Lower toga / skirt
  R(6,26, 16,32, TOGA);
  D(5,26,TOGA_S); D(17,26,TOGA_S);
  D(5,27,TOGA_S); D(17,27,TOGA_S);
  // Toga hem detail
  for(let x=6;x<=16;x++) D(x,32,TOGAS);

  // ===== ARMS =====
  // Left arm (holding caduceus)
  D(5,16,SKIN); D(4,17,SKIN); D(3,18,SKIN); D(3,19,SKIN);
  D(3,20,SKIN); D(4,21,SKIN); D(4,22,SKIN);
  D(5,16,TOGA_S); // sleeve start
  // Left hand
  D(3,23,SKIN); D(4,23,SKIN); D(3,24,SKIN); D(4,24,SKIN);
  D(2,23,SKIN); // thumb

  // Right arm
  if(state==='happy'){
    // Arm raised for thumb up
    D(17,16,SKIN); D(18,15,SKIN); D(19,14,SKIN); D(19,13,SKIN);
    D(19,12,SKIN); D(19,11,SKIN);
    // Fist
    D(19,15,SKIN); D(20,15,SKIN); D(20,16,SKIN); D(19,16,SKIN);
    // THUMB UP (golden!)
    D(20,11,GOLD3); D(20,10,GOLD3); D(20,9,GOLD3); D(20,8,GOLD3);
    D(21,10,GOLD3); D(21,9,GOLD3);
    D(20,12,SKIN); // knuckle
    // Glow
    ctx.shadowColor='#f0c030'; ctx.shadowBlur=8;
    D(20,9,GOLD3);
    ctx.shadowBlur=0;
  } else if(state==='sad'){
    // Both hands on head/face
    D(17,16,SKIN); D(18,15,SKIN); D(19,14,SKIN); D(19,13,SKIN);
    D(18,12,SKIN); D(17,11,SKIN); D(16,10,SKIN); D(15,9,SKIN);
    D(18,13,SKIN); D(17,12,SKIN); D(16,11,SKIN);
    // fingers splayed on face
    D(15,8,SKIN); D(16,8,SKIN); D(14,8,SKIN);
  } else {
    D(17,16,SKIN); D(18,17,SKIN); D(18,18,SKIN);
    D(18,19,SKIN); D(17,20,SKIN); D(17,21,SKIN);
    D(17,22,SKIN);
  }

  // ===== LEGS =====
  // Leg left
  D(8,33,SHIN); D(9,33,SHIN); D(8,34,SHIN); D(9,34,SHIN);
  D(8,35,SHIN); D(9,35,SHIN); D(8,36,SHIN); D(9,36,SHIN);
  D(8,37,SHIN); D(9,37,SHIN); D(8,38,SHIN); D(9,38,SHIN);
  // Leg right
  D(12,33,SHIN); D(13,33,SHIN); D(12,34,SHIN); D(13,34,SHIN);
  D(12,35,SHIN); D(13,35,SHIN); D(12,36,SHIN); D(13,36,SHIN);
  D(12,37,SHIN); D(13,37,SHIN); D(12,38,SHIN); D(13,38,SHIN);
  // Knee detail
  D(8,36,SKIN2); D(9,36,SKIN2); D(12,36,SKIN2); D(13,36,SKIN2);

  // ===== WINGED SANDALS =====
  // Left foot + sandal
  R(6,39, 11,40, SANDAL);
  D(5,39,SANDAL2); D(5,40,SANDAL2);
  D(12,39,SANDAL2);
  // Sandal straps
  D(7,39,SANDAL2); D(9,39,SANDAL2);
  D(8,38,SANDAL2); D(10,38,SANDAL2);
  // Left ankle wings
  D(4,38,WING_L); D(3,37,WING_L); D(3,38,WING_L); D(2,37,WING_D);
  D(4,37,WING_L); D(3,36,WING_D); D(2,38,WING_D);
  D(4,39,WING_D); D(3,39,WING_D);

  // Right foot + sandal
  R(11,39, 16,40, SANDAL);
  D(10,39,SANDAL2);
  D(17,39,SANDAL2); D(17,40,SANDAL2);
  // Sandal straps
  D(12,39,SANDAL2); D(14,39,SANDAL2);
  D(13,38,SANDAL2); D(15,38,SANDAL2);
  // Right ankle wings
  D(18,38,WING_L); D(19,37,WING_L); D(19,38,WING_L); D(20,37,WING_D);
  D(18,37,WING_L); D(19,36,WING_D); D(20,38,WING_D);
  D(18,39,WING_D); D(19,39,WING_D);

  // FLOATING GLOW effect on whole figure
  if(state==='idle' || state==='happy'){
    // Subtle golden outline glow
    ctx.shadowColor = state==='happy'?'#f0c030':'#c8a030';
    ctx.shadowBlur = state==='happy'?12:6;
    D(11,24,GOLD3); // re-draw belt buckle to apply glow
    ctx.shadowBlur=0;
  }
}

function drawPhilo(canvas, state) {
  const ctx = canvas.getContext('2d');
  const s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const D = (x, y, c) => { ctx.fillStyle=c; ctx.fillRect(x*s, y*s, s, s); };
  const R = (x1,y1,x2,y2,c) => { ctx.fillStyle=c; ctx.fillRect(x1*s,y1*s,(x2-x1+1)*s,(y2-y1+1)*s); };

  // PALETTE
  const SKIN='#d0b898', SKIN2='#b09070', SKIN3='#c0a888';
  const HAIR='#1a1010', COAT='#14141e', COAT_L='#1e1e2e', COAT_S='#0a0a12';
  const SHIRT='#f0ece0', SHIRT_S='#d0ccb8', PANTS='#10101a', PANTS_L='#181820';
  const GLASS='#6878c0', GLASS_L='#8898e0', GLASS_F='#c0c8f0';
  const BEARD='#2a2010', BEARD_L='#3a3020', MOUTH_N='#a08060', MOUTH_H='#c06040', MOUTH_S='#6a4020';
  const SHOE='#0a0810', SHOE_L='#1a1820', GOLD='#e8c050', EYE='#0a0818';
  const BUTTON='#8898c0', TIE='#4050a0';

  // ===== HAIR (detailed) =====
  R(7,1, 15,3, HAIR);
  D(6,2,HAIR); D(6,3,HAIR); D(16,2,HAIR); D(16,3,HAIR);
  D(5,3,HAIR); D(17,3,HAIR);
  // Hair texture
  D(8,1,BEARD_L); D(11,1,BEARD_L); D(14,1,BEARD_L);
  // Side hair over ears
  D(6,4,HAIR); D(6,5,HAIR); D(6,6,HAIR);
  D(16,4,HAIR); D(16,5,HAIR); D(16,6,HAIR);
  // Part / highlight
  D(11,2,BEARD_L); D(12,2,BEARD_L);

  // ===== FACE =====
  R(7,4, 15,12, SKIN);
  D(6,5,SKIN); D(6,6,SKIN); D(6,7,SKIN); D(6,8,SKIN); D(6,9,SKIN);
  D(16,5,SKIN); D(16,6,SKIN); D(16,7,SKIN); D(16,8,SKIN); D(16,9,SKIN);
  // Forehead
  R(8,4, 14,4, SKIN3);
  // Cheekbones
  D(7,9,SKIN3); D(15,9,SKIN3);
  // Ear left
  D(5,7,SKIN2); D(4,7,SKIN2); D(4,8,SKIN2); D(5,8,SKIN2); D(4,9,SKIN2); D(5,9,SKIN2);
  // Ear right
  D(17,7,SKIN2); D(18,7,SKIN2); D(18,8,SKIN2); D(17,8,SKIN2); D(18,9,SKIN2); D(17,9,SKIN2);
  // Inner ear
  D(4,8,SKIN3); D(18,8,SKIN3);

  // ===== GLASSES (thick rim, intellectual) =====
  // Left lens frame
  R(7,6, 10,8, GLASS);
  D(7,6,GLASS_L); D(7,7,GLASS_L); D(7,8,GLASS_L);
  D(10,6,GLASS_L); D(10,7,GLASS_L); D(10,8,GLASS_L);
  // Left lens fill
  D(8,7,GLASS_F); D(9,7,GLASS_F);
  // Bridge
  D(11,7,GLASS); D(12,7,GLASS);
  // Right lens frame
  R(12,6, 15,8, GLASS);
  D(12,6,GLASS_L); D(12,7,GLASS_L); D(12,8,GLASS_L);
  D(15,6,GLASS_L); D(15,7,GLASS_L); D(15,8,GLASS_L);
  // Right lens fill
  D(13,7,GLASS_F); D(14,7,GLASS_F);
  // Temple arms
  D(6,7,GLASS); D(5,7,GLASS); D(16,7,GLASS); D(17,7,GLASS);

  // Eyes behind glasses
  D(8,7,EYE); D(9,7,EYE); D(13,7,EYE); D(14,7,EYE);
  if(state==='sad'){
    D(8,7,SKIN); D(13,7,SKIN); // sad eyes: half closed
    D(8,8,EYE); D(13,8,EYE);
  }
  // Eyebrows
  D(8,5,HAIR); D(9,5,HAIR); D(10,5,HAIR);
  D(12,5,HAIR); D(13,5,HAIR); D(14,5,HAIR);
  if(state==='sad'){
    // furrowed brow
    D(8,5,BEARD); D(10,5,BEARD); D(12,5,BEARD); D(14,5,BEARD);
    D(9,4,BEARD); D(13,4,BEARD);
  }

  // Nose
  D(11,9,SKIN2); D(12,9,SKIN2);
  D(10,10,SKIN2); D(13,10,SKIN2);
  D(11,10,SKIN3); D(12,10,SKIN3);

  // ===== THICK BEARD =====
  // Beard grows from chin down
  for(let x=8;x<=14;x++) D(x,12,BEARD);
  for(let x=7;x<=15;x++) D(x,13,BEARD);
  for(let x=7;x<=15;x++) D(x,14,BEARD);
  for(let x=8;x<=14;x++) D(x,15,BEARD);
  for(let x=9;x<=13;x++) D(x,16,BEARD);
  for(let x=10;x<=12;x++) D(x,17,BEARD);
  // Beard texture / highlight
  D(9,13,BEARD_L); D(12,13,BEARD_L); D(10,15,BEARD_L);
  D(11,14,BEARD_L); D(13,15,BEARD_L);

  // Mustache (connects to beard)
  D(9,11,BEARD); D(10,11,BEARD); D(11,11,BEARD); D(12,11,BEARD); D(13,11,BEARD);
  D(8,11,BEARD_L); D(14,11,BEARD_L);

  // Mouth (barely visible under mustache)
  if(state==='happy'){
    D(10,12,MOUTH_H); D(11,12,MOUTH_H); D(12,12,MOUTH_H);
    D(9,11,MOUTH_H); D(13,11,MOUTH_H);
  } else if(state==='sad'){
    D(10,12,MOUTH_S); D(11,12,MOUTH_S); D(12,12,MOUTH_S);
    D(9,13,MOUTH_S); D(13,13,MOUTH_S);
  } else {
    D(10,12,MOUTH_N); D(11,12,MOUTH_N); D(12,12,MOUTH_N);
  }

  // Neck
  D(10,18,SKIN); D(11,18,SKIN); D(12,18,SKIN); D(10,19,SKIN); D(11,19,SKIN); D(12,19,SKIN);

  // ===== LONG BLACK COAT (detailed) =====
  // Collar / lapels
  D(9,19,SHIRT); D(10,19,SHIRT); D(11,19,SHIRT); D(12,19,SHIRT); D(13,19,SHIRT);
  D(9,20,SHIRT); D(13,20,SHIRT);
  D(8,21,SHIRT_S); D(14,21,SHIRT_S);
  // Tie
  D(11,20,TIE); D(11,21,TIE); D(11,22,TIE); D(11,23,TIE); D(12,22,TIE);
  D(10,24,TIE); D(11,24,TIE); D(12,24,TIE);
  // Coat body - left panel
  for(let y=20;y<=50;y++){
    D(7,y,COAT); D(8,y, y<30?COAT_L:COAT); D(9,y,COAT_L);
  }
  // Coat body - right panel
  for(let y=20;y<=50;y++){
    D(14,y,COAT_L); D(15,y, y<30?COAT_L:COAT); D(16,y,COAT);
  }
  // Coat center - shirt visible
  for(let y=20;y<=28;y++){
    D(10,y,SHIRT_S); D(11,y,SHIRT); D(12,y,SHIRT_S); D(13,y,SHIRT_S);
  }
  // Coat closes below
  for(let y=28;y<=50;y++){
    D(10,y,COAT_L); D(11,y,COAT_L); D(12,y,COAT_L); D(13,y,COAT_L);
  }
  // Coat buttons
  D(11,26,BUTTON); D(11,29,BUTTON); D(11,32,BUTTON); D(11,35,BUTTON);
  // Pocket flaps
  R(8,32, 10,33, COAT_L);
  D(7,32,COAT_S); D(7,33,COAT_S);
  R(13,32, 15,33, COAT_L);
  D(16,32,COAT_S); D(16,33,COAT_S);
  // Coat tails / lower detail
  for(let y=44;y<=50;y++){
    D(6,y,COAT_S); D(17,y,COAT_S);
  }
  // Coat hem
  for(let x=6;x<=17;x++) D(x,50,COAT_S);

  // ===== ARMS =====
  if(state==='happy'){
    // RIGHT ARM: thumb up, raised high
    D(17,22,COAT); D(18,21,COAT); D(19,20,COAT); D(19,19,SKIN);
    D(19,18,SKIN); D(19,17,SKIN); D(19,16,SKIN);
    // Fist
    D(19,20,SKIN); D(20,20,SKIN); D(20,21,SKIN); D(21,21,SKIN); D(21,22,SKIN);
    // Thumb UP golden
    D(21,17,GOLD); D(21,16,GOLD); D(21,15,GOLD); D(21,14,GOLD); D(22,15,GOLD); D(22,16,GOLD);
    D(20,17,GOLD); // knuckle base
    // Cuff
    D(17,21,SHIRT); D(18,20,SHIRT);
    // Glow
    ctx.shadowColor='#f0c030'; ctx.shadowBlur=10;
    D(21,15,GOLD);
    ctx.shadowBlur=0;
    // LEFT ARM: resting
    D(6,22,COAT); D(5,23,COAT); D(5,24,COAT); D(5,25,COAT);
    D(5,26,COAT); D(5,27,COAT); D(4,28,SKIN); D(5,28,SKIN); D(4,29,SKIN);
    D(6,21,SHIRT);
  } else if(state==='sad'){
    // BOTH HANDS ON HEAD
    // Left arm goes up
    D(6,21,COAT); D(5,20,COAT); D(4,19,SKIN); D(3,18,SKIN); D(3,17,SKIN);
    D(4,16,SKIN); D(5,15,SKIN); D(6,14,SKIN); D(7,13,SKIN);
    D(3,16,SKIN); D(4,15,SKIN); D(5,14,SKIN); D(6,13,SKIN);
    // Right arm goes up
    D(17,21,COAT); D(18,20,COAT); D(19,19,SKIN); D(20,18,SKIN); D(20,17,SKIN);
    D(19,16,SKIN); D(18,15,SKIN); D(17,14,SKIN); D(16,13,SKIN);
    D(20,16,SKIN); D(19,15,SKIN); D(18,14,SKIN); D(17,13,SKIN);
    // Hands cupping face / head
    D(6,12,SKIN); D(7,11,SKIN); D(7,12,SKIN);
    D(16,12,SKIN); D(15,11,SKIN); D(15,12,SKIN);
    // Cuffs
    D(6,20,SHIRT); D(18,19,SHIRT);
  } else {
    // Idle - arms at sides
    D(6,21,COAT); D(5,22,COAT); D(5,23,COAT); D(5,24,COAT);
    D(5,25,COAT); D(4,26,COAT); D(4,27,SKIN); D(5,28,SKIN);
    D(17,21,COAT); D(18,22,COAT); D(18,23,COAT); D(18,24,COAT);
    D(18,25,COAT); D(19,26,COAT); D(19,27,SKIN); D(18,28,SKIN);
    // Cuffs
    D(6,20,SHIRT); D(17,20,SHIRT);
  }

  // ===== TROUSERS =====
  // Left trouser
  R(8,51, 10,57, PANTS_L);
  D(7,51,PANTS); D(7,52,PANTS); D(7,53,PANTS);
  D(11,51,PANTS); D(11,52,PANTS); D(11,53,PANTS);
  // Crease
  D(9,52,PANTS); D(9,54,PANTS); D(9,56,PANTS);
  // Right trouser
  R(12,51, 14,57, PANTS_L);
  D(11,51,PANTS); D(11,52,PANTS); D(11,53,PANTS);
  D(15,51,PANTS); D(15,52,PANTS); D(15,53,PANTS);
  // Crease
  D(13,52,PANTS); D(13,54,PANTS); D(13,56,PANTS);

  // ===== SHOES (detailed Oxford style) =====
  // Left shoe
  R(6,58, 11,59, SHOE_L);
  D(5,58,SHOE); D(5,59,SHOE); D(12,58,SHOE);
  D(6,60,SHOE); D(7,60,SHOE); D(8,60,SHOE); D(9,60,SHOE); D(10,60,SHOE);
  // Toe cap

function p1updateThemes(){

function p1build(){
  const dv=sd.value,tv=st.value,f=document.getElementById('sf').value;
  let base=dv==='Tous les domaines'?ALL:ALL.filter(d=>d.domaine===dv);
  if(tv&&tv!=='Tous les thèmes')base=base.filter(d=>d.theme===tv);
  if(f==='todo')base=base.filter(d=>p1scores[d.titre]!==true);
  if(f==='ok')base=base.filter(d=>p1scores[d.titre]===true);
  p1deck=[...base];p1idx=0;p1flipped=false;p1updateStats();p1render();
}
function p1shuffle(){for(let i=p1deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p1deck[i],p1deck[j]]=[p1deck[j],p1deck[i]];}p1idx=0;p1flipped=false;p1render();}
function p1reset(){if(!confirm('Réinitialiser ?'))return;p1scores={};document.getElementById('si').textContent='';p1build();toast('Réinitialisé.');}

function p1render(){
  if(!p1deck.length){
    document.getElementById('fw').textContent='Aucune carte.';
    ['fd','ft','fh'].forEach(id=>document.getElementById(id).textContent='');
    document.getElementById('fa').style.display='none';document.getElementById('vr').style.display='none';
    document.getElementById('ni').textContent='0/0';document.getElementById('pb').style.width='0%';return;
  }
  const c=p1deck[p1idx];
  document.getElementById('fd').textContent=c.domaine;
  document.getElementById('ft').textContent=c.theme;
  document.getElementById('fw').textContent=c.titre;
  document.getElementById('fh').textContent=p1flipped?'':'— toucher pour révéler —';
  document.getElementById('fa').style.display=p1flipped?'block':'none';
  if(p1flipped){
    const facts=c.contenu.split(' | ');
    document.getElementById('fc2').innerHTML=facts.map(f=>'<div class="fact-line"><span class="fact-dot">▶</span><span>'+f+'</span></div>').join('');
  }
  document.getElementById('ni').textContent=(p1idx+1)+'/'+p1deck.length;
  document.getElementById('vr').style.display=p1flipped?'flex':'none';
  document.getElementById('pb').style.width=Math.round(((p1idx+1)/p1deck.length)*100)+'%';
}
function p1flip(){if(!p1deck.length)return;p1flipped=!p1flipped;p1render();}
function p1go(dir){if(!p1deck.length)return;p1idx=(p1idx+dir+p1deck.length)%p1deck.length;p1flipped=false;p1render();}
function p1vote(ok){
  if(!p1deck.length)return;
  p1scores[p1deck[p1idx].titre]=ok;p1updateStats();
  if(ok&&document.getElementById('sf').value==='todo'){p1deck.splice(p1idx,1);if(p1idx>=p1deck.length)p1idx=0;p1flipped=false;p1render();}
  else p1go(1);
}
function p1updateStats(){
  const dv=sd.value,tv=st.value;
  let base=dv==='Tous les domaines'?ALL:ALL.filter(d=>d.domaine===dv);
  if(tv&&tv!=='Tous les thèmes')base=base.filter(d=>d.theme===tv);
  const ok=base.filter(d=>p1scores[d.titre]===true).length;
  const ko=base.filter(d=>p1scores[d.titre]===false).length;
  document.getElementById('s-t').textContent=base.length;
  document.getElementById('s-o').textContent=ok;
  document.getElementById('s-k').textContent=ko;
  const r=ok+ko;document.getElementById('s-p').textContent=r>0?Math.round(ok/r*100)+'%':'—';
}
function p1save(){
  const ok=Object.values(p1scores).filter(v=>v===true).length;
  const ko=Object.values(p1scores).filter(v=>v===false).length;
  const blob=new Blob([JSON.stringify({version:1,prenom:PRENOM,date:new Date().toISOString(),scores:p1scores,defiRecord,summary:{total:ALL.length,sus:ok,arevoir:ko}},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='philo_'+PRENOM.toLowerCase().replace(/é/g,'e')+'_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);toast('Sauvegardé !');
}
function p1load(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const p=JSON.parse(e.target.result);if(!p.scores)throw new Error();
    p1scores=p.scores;
    if(p.defiRecord!==undefined){defiRecord=p.defiRecord;document.getElementById('record-num').textContent=defiRecord;}
    const d=p.date?new Date(p.date).toLocaleDateString('fr-FR'):'?';
    document.getElementById('si').textContent=d+' · '+p.summary.sus+' sus';
    p1build();toast('Chargé !');}catch{toast('Fichier invalide.');}
  };reader.readAsText(file);event.target.value='';
}

// Only use philo cards (have proper theses — not mythology which has no "author said")
const QSDC_POOL = ALL.filter(c => c.domaine === 'Philosophie' || c.domaine === 'Art' || c.domaine === 'Littérature');

let qsdcStreak=0, qsdcRecord=0, qsdcState='idle', qsdcCurrent=null, qsdcCorrectIdx=0, qsdcShuffled=[];

function qsdcBuildQuote(card) {
  // Extract the most "citation-like" or thesis-like fragment from contenu
  const facts = card.contenu.split(' | ');
  // Find a fact that looks like a quote (contains quote marks) or is the most substantial
  const quoted = facts.find(f => f.includes('«') || f.includes('"') || f.includes("'"));
  if(quoted) {
    // Extract just the quoted part
    const m = quoted.match(/[«"']([^»"']{15,})[»"']/);
    if(m) return m[1].trim();
  }
  // Otherwise use the 2nd or 3rd fact (usually the thesis/key idea, not just date)
  const substantive = facts.find((f,i) => i>0 && f.length > 30 && !f.match(/^d|^~d|^XIVe|^XVe|^XVIe|^XVIIe|^XVIIIe|^XIXe|^XXe|^XXIe/));
  return substantive || facts[1] || facts[0];
}

function qsdcExtractAuthor(card) {
  // Title often = "Auteur — Oeuvre" or just "Auteur — Concept"
  const title = card.titre;
  const dashIdx = title.indexOf(' — ');
  if(dashIdx > 0) return title.substring(0, dashIdx).trim();
  // Or extract from first fact
  const firstFact = card.contenu.split(' | ')[0];
  return title;
}

function qsdcStart() {
  qsdcStreak=0;
  document.getElementById('qsdc-streak').textContent='0';
  qsdcShuffled=[...QSDC_POOL].sort(()=>Math.random()-.5);
  qsdcState='question';
  document.getElementById('qsdc-btn-start').style.display='none';
  document.getElementById('qsdc-btn-restart').style.display='none';
  document.getElementById('qsdc-btn-next').style.display='none';
  document.getElementById('qsdc-fiche').classList.remove('show');
  qsdcShowNext();
}

function qsdcShowNext() {
  if(!qsdcShuffled.length) qsdcShuffled=[...QSDC_POOL].sort(()=>Math.random()-.5);
  qsdcCurrent = qsdcShuffled.pop();

  // Build the quote to display
  const quote = qsdcBuildQuote(qsdcCurrent);
  const correctAuthor = qsdcExtractAuthor(qsdcCurrent);

  // 3 wrong authors from same domaine/theme if possible, else any
  const pool = QSDC_POOL.filter(c => c.titre !== qsdcCurrent.titre);
  const sameTheme = pool.filter(c => c.theme === qsdcCurrent.theme);
  const wrongPool = sameTheme.length >= 3 ? sameTheme : pool;
  const wrongs = wrongPool.sort(()=>Math.random()-.5).slice(0,3).map(c => qsdcExtractAuthor(c));

  // Deduplicate in case same author appears twice
  const uniqueWrongs = [...new Set(wrongs)].filter(a => a !== correctAuthor).slice(0,3);
  while(uniqueWrongs.length < 3) uniqueWrongs.push('—');

  const allChoices = [correctAuthor, ...uniqueWrongs].sort(()=>Math.random()-.5);
  qsdcCorrectIdx = allChoices.indexOf(correctAuthor);

  // Render
  document.getElementById('qsdc-dom').textContent = qsdcCurrent.domaine + ' · ' + qsdcCurrent.theme;
  document.getElementById('qsdc-quote').textContent = quote;
  document.getElementById('qsdc-card').style.display='block';
  document.getElementById('qsdc-card').className='qsdc-quote-card';
  document.getElementById('qsdc-choices').style.display='grid';
  document.getElementById('qsdc-fiche').classList.remove('show');
  document.getElementById('qsdc-vulga').classList.remove('show');
  document.getElementById('qsdc-btn-next').style.display='none';

  for(let i=0;i<4;i++){
    const btn=document.getElementById('qc'+i);
    btn.textContent=allChoices[i];
    btn.className='qsdc-choice';
    btn.disabled=false;
  }
  qsdcState='question';
}
