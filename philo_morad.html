us » | Plaisir lié à la transgression : le blasphème assaisonne la jouissance ; sans interdit, le plaisir devient mécanique | Dimension guerrière et possessive : un plaisir partagé est moins savoureux car moins distinctif | S'oppose radicalement à Kant : l'humanité comme fin, jamais comme moyen | Baudelaire : « la volupté unique et suprême de l'amour gît dans la certitude de faire le mal »"],["Philosophie","Cours prépa","Cours 22 — Pasolini, Salò et la critique du consumérisme","Salò ou les 120 journées de Sodome (1974) | Transpose Sade dans l'Italie fasciste de 1943-1945 | Thèse : la libération sexuelle est une tromperie ; la sexualité est devenue marchandise à consommer | La société de consommation accomplit le vœu des régimes fascistes : calibrer un homme déculturé | Le spectateur ne ressent que du dégoût : Salò est une déclaration de guerre à l'industrie du sexe | Le prisonnier qui fait l'amour (vs sexualité mécanique) est le résistant qu'il faut éliminer | Pasolini marxiste et athée : paradoxalement devenu référence de la jeune génération écologiste et chrétienne (revue Limite)"],["Philosophie","Cours prépa","Cours 22 — Ionesco, Rhinocéros et la rhinocérite","Rhinocéros (1959), acte II | Jean à Bérenger : « Il faut dépasser la morale » ; la nature a ses lois, « la morale est antinaturelle » | Bérenger : « vous voulez remplacer la loi morale par la loi de la jungle ! » | Jean veut « retourner à l'intégrité primordiale » — écho direct de la philosophie de Sade et du naturalisme | « L'humanisme est périmé ! » — Jean se transforme en rhinocéros | Ionesco satirise le conformisme totalitaire : devenir rhinocéros = renoncer à penser par soi-même | Lien avec La Cantatrice chauve (1951) : les Smith et Martin « ne savent plus parler parce qu'ils ne savent plus penser »"],["Philosophie","Cours prépa","Cours 23 — Kant, Qu'est-ce que les Lumières ? (bilan)","Réponse à la question : Qu'est-ce que les Lumières ? (1784) | Sapere aude : ose penser ! — devise des Lumières reprise d'Horace | Les Lumières = sortie de l'homme de sa minorité dont il porte lui-même la responsabilité | Minorité = incapacité de se servir de son entendement sans la direction d'autrui | Causes : paresse et lâcheté ; il est confortable d'avoir un livre, un directeur de conscience, un médecin qui pensent à notre place | Les tuteurs enferment le bétail dans un parc et montrent les dangers du dehors | « Institutions et formules sont les fers qui enchaînent une minorité qui se prolonge »"],["Philosophie","Cours prépa","Cours 23 — Joseph de Maistre, critique contre-révolutionnaire","Considérations sur la France (1796) | Contre Rousseau : la souveraineté ne vient pas du peuple mais de Dieu ; sans souverain pas de peuple | « Il n'y a point d'homme dans le monde. J'ai vu des Français, des Italiens, des Russes ; quant à l'homme je déclare ne l'avoir rencontré de ma vie » | L'humanité se décline au pluriel : chaque nation a son génie (Volksgeist), son âme collective | « Une assemblée quelconque d'hommes ne peut constituer une nation » — contre le contractualisme | Réfute le Contrat social ET le Discours sur l'inégalité (négation du péché originel) | La tête (souverain) donne vie au corps social : pas de corps sans tête"],["Philosophie","Cours prépa","Cours 23 — Nation-génie vs nation-contrat","Deux conceptions du corps social (Finkielkraut, La Défaite de la pensée, 1987) | Nation-génie (romantique, allemande) : réalité organique liant terre, langue, morts, passé commun ; l'individu appartient à sa nation par naissance | Volksgeist : chaque nation a un génie irréductible ; l'humanisme universaliste n'est qu'une vue de l'esprit | Nation-contrat (révolutionnaire, française) : construction rationnelle et volontaire ; la nationalité est un fait de volonté, pas de nature | Sieyès : « un corps d'associés vivant sous une loi commune » | L'horizon de la nation-contrat est le cosmopolitisme et la paix perpétuelle | L'horizon de la nation-génie est le nationalisme et la guerre"],["Philosophie","Cours prépa","Cours 23 — Finkielkraut, La Défaite de la pensée","La Défaite de la pensée (1987) | 1re défaite : le romantisme oppose le Volksgeist à l'universalisme des Lumières → l'esprit s'enracine dans la nation | 2e défaite : les sciences humaines (Lévi-Strauss, Bourdieu) réhabilitent les cultures non-occidentales mais dissolvent l'universel dans le relativisme culturel | La générosité anticoloniale enferme paradoxalement les peuples dans leur identité culturelle : « ma culture » remplace « la culture » | 3e défaite : la postmodernité dissout la culture dans le « tout culturel » (une paire de bottes vaut Shakespeare) | Sa Majesté le Consommateur, zombie décérébré, risque de devenir le collaborateur passif des fanatismes de demain | Entre le zombie et le fanatique : quelle place pour la vie de l'esprit ?"],["Philosophie","Cours prépa","Cours 24 — Rousseau, Les Rêveries du promeneur solitaire","Les Rêveries du promeneur solitaire (1776-1778), Cinquième Promenade | Île de Saint-Pierre sur le lac de Bienne : première occurrence du mot romantique en français | Communion avec la nature dans le silence ; rêverie = accès à l'infini, sentiment océanique | L'imagination supplée au réel : en rêvant qu'on y est, on y est | Conflit entre le moi et la société : Rousseau fuit les hommes | Annonce le romantisme : place du moi, rôle de la nature, fonction créatrice de l'imagination"],["Philosophie","Cours prépa","Cours 24 — Chateaubriand, le vague des passions","Génie du christianisme (1802), Partie 2, Livre 3, Chapitre IX | Le vague des passions : facultés actives mais sans objet ; on est détrompé sans avoir joui | On habite avec un cœur plein un monde vide | Les Anciens ne connaissaient pas ce mal : la vie politique remplissait leurs jours | Le christianisme introduit la nostalgie d'un monde meilleur | La destruction des monastères laisse les âmes ardentes sans refuge | René puni : Chateaubriand dénonce l'amour outré de la solitude"],["Philosophie","Cours prépa","Cours 24 — Le sublime chez Kant et Schopenhauer","Kant (1764, 1790) et Schopenhauer (1818) | Le beau est gai ; le sublime éveille aussi de l'horreur (montagnes, orages) | Schopenhauer : face à l'océan déchaîné, double conscience — fragilité physique ET sérénité du sujet connaissant | Le sublime élève l'âme au-dessus de l'enlisement quotidien | Sans menace de la mort, pas de grandeur morale | La nature sublime = défier la mort pour reconnaître notre grandeur"],["Philosophie","Cours prépa","Cours 25 — La nature romantique et Friedrich","Chez Friedrich, le paysage est transfiguré en sens eschatologique | Paysage état d'âme : nature comme support de l'expression subjective | Nature Mère réactualisée : risque de régression panthéiste | Mme de Staël : les phénomènes de la nature ont un sens philosophique et un but religieux | Romantiques allemands rejettent la science mécaniste de Newton | Le tableau romantique prend valeur d'icône"],["Philosophie","Cours prépa","Cours 25 — Le mal du siècle (Musset)","Musset, La Confession d'un enfant du siècle (1836) | Génération post-napoléonienne : ardente, pâle, nerveuse, condamnée au repos | Après Waterloo : défaite de l'épopée, triomphe de l'intérêt bourgeois | La souffrance comme signe d'élection : les plus désespérés sont les chants les plus beaux | Le grief romantique : la morale bourgeoise désenchante le désir | Le bonheur apparaît au XIXe comme une idée bête | Le poète comme pélican nourrissant ses petits de son sang"],["Philosophie","Cours prépa","Cours 25 — Chatterton (Vigny) : poète vs bourgeois","Chatterton (Vigny, 1835), acte III scène 6 | Lord Beckford : à quoi sont bons vos maudits vers ? Un bon Anglais doit être utile | Métaphore du navire-Angleterre ; le poète lit dans les astres la route du Seigneur | Beckford : imagination ou folie, vous n'êtes bon à rien | Opposition utilité bourgeoise vs vision prophétique du poète | Le poète romantique = inutilité sociale mais nécessité spirituelle"],["Philosophie","Cours prépa","Cours 26 — Balzac, Le Père Goriot et Vautrin","Le Père Goriot (Balzac, 1834) : tirade de Vautrin à Rastignac | Il faut vous manger les uns les autres comme des araignées dans un pot | L'honnêteté ne sert à rien ; deux voies : génie ou corruption | Vautrin incarne le cynisme lucide face à la société de l'argent | Romantisme de l'ambition : Rastignac entre soif d'absolu et conquête sociale | La mort du père Goriot : effondrement de l'autorité"],["Philosophie","Cours prépa","Cours 26 — Flaubert, Madame Bovary et le bovarysme","Madame Bovary (Flaubert, 1857) | Le bovarysme : se concevoir autre qu'on n'est (Jules de Gaultier) | Trois phases : ennui → illusion → déception en spirale | Emma empoisonnée par la mauvaise littérature : cet affreux goût d'encre | Homais = positivisme scientiste ; dernière phrase : la croix d'honneur | J'appelle bourgeois quiconque pense bassement — la bêtise = absence de doute"],["Philosophie","Cours prépa","Cours 27 — Galilée et l'autonomie de la science","Lettre à Castelli (1613), Lettre à Christine de Lorraine (1615) | L'intention du Saint-Esprit : enseigner comment aller au Ciel, non comment va le Ciel | En cas de conflit science/Écriture : la science a raison | L'Univers est écrit dans la langue mathématique (L'Essayeur, 1623) | Renversement de l'autorité : la science l'emporte sur la théologie | Première humiliation narcissique (Freud)"],["Philosophie","Cours prépa","Cours 27 — Positivisme de Homais et naturalisme de Zola","Auguste Comte fonde le positivisme : seule la science mène au vrai | Zola, Le Roman expérimental (1880) : romancier = observateur + expérimentateur | Un même déterminisme doit régir la pierre et le cerveau de l'homme | Maupassant : les Réalistes de talent devraient s'appeler des Illusionnistes | Le naturalisme contre les mensonges romantiques | Proust : la vraie vie c'est la littérature"],["Philosophie","Cours prépa","Cours 27 — Vérité dans l'art : Hegel, Heidegger, Proust","Hegel : l'art ne copie pas la nature, il révèle les vérités enfouies | Heidegger : l'art est la mise en œuvre de la vérité ; les souliers de Van Gogh | Proust : les idées de l'intelligence n'ont qu'une vérité logique ; les vérités de l'art transforment | La fiction n'est pas l'ennemie de la vérité : c'est par l'illusion qu'on atteint la vérité | Contre Platon : l'art n'est pas mensonge mais dévoilement"],["Philosophie","Cours prépa","Cours 28 — Freud, le rêve et l'inconscient","Cinq leçons sur la psychanalyse (1908) | L'interprétation des rêves est la voie royale de la connaissance de l'inconscient | Contenu manifeste vs contenu latent : les désirs inconscients sont déguisés | Condensation (mots-valises) et déplacement (substitution) | Le rêve de l'adulte = réalisation déguisée de désirs refoulés | C'est l'enfant qui continue à vivre dans l'homme"],["Philosophie","Cours prépa","Cours 28 — Freud, la triple humiliation narcissique","Introduction à la psychanalyse (1915-1917), chap. 18 | 1re humiliation (Copernic) : la Terre n'est pas le centre | 2e humiliation (Darwin) : l'homme descend de l'animal | 3e humiliation (Freud) : le moi n'est pas maître chez lui | Deuxième topique : Ça / Surmoi / Moi | Sublimation : dériver l'énergie sexuelle vers des buts acceptables"],["Philosophie","Cours prépa","Cours 28 — Freud, la religion comme illusion","L'Avenir d'une illusion (1927) | La religion : fonctions théorique, psychologique et politique | Les représentations religieuses = accomplissements des souhaits les plus anciens | Illusion ≠ erreur : elle dérive de souhaits humains | Dieu comme père protecteur prolongeant le besoin d'aide de l'enfance | Il serait beau qu'il y eût un Dieu, mais c'est exactement ce que nous ne pouvons manquer de souhaiter"],["Philosophie","Cours prépa","Cours 28 — Freud, Malaise dans la civilisation","Das Unbehagen in der Kultur (1930) | La culture exige un renoncement pulsionnel croissant | L'homme n'est pas un être doux : pulsion agressive constitutive, homo homini lupus | Aime ton prochain prouve que rien n'est moins naturel | La liberté individuelle avant la culture était sans valeur car indéfendable | Le processus civilisateur repose sur la sublimation, pas la raison | On ne peut transformer la nature humaine en celle d'un termite"],["Philosophie","Cours prépa","Cours 30 — Sartre, Huis clos","Huis clos (1944) : Garcin, Estelle, Inès | Pas besoin de gril : l'enfer c'est les Autres | Les autres nous obligent à jouer la comédie sous leur regard | En société on cesse d'être soi pour devenir un masque | L'intersubjectivité comme nouveau ressort tragique | L'enfer = impossibilité d'échapper au regard d'autrui qui nous fige"],["Philosophie","Cours prépa","Cours 30 — Ionesco, La Cantatrice chauve","La Cantatrice chauve (1950) | Les personnages ne savent plus parler parce qu'ils ne savent plus penser | Personnages interchangeables, coquilles vides sans pensée propre | La communication est impossible ; le divertissement seul liant social | Scène finale : le langage déraille, la violence refoulée explose, le drame se répète | Les personnages comiques ce sont les gens qui n'existent pas"],["Philosophie","Cours prépa","Cours 30 — Beckett, En attendant Godot","En attendant Godot (1953) : Vladimir et Estragon attendent Godot qui ne vient jamais | Anouilh : les Pensées de Pascal jouées par les Fratellini | Temporalité en boucle : l'amnésie condamne à tourner en rond | Pozzo et Lucky : le maître est l'esclave de son valet (dialectique hégélienne) | Le bavardage = fuite du vide intérieur ; sans mémoire point de salut | Godot = ce qu'on attend : le sens, la mort, Dieu"],["Philosophie","Cours prépa","Cours 31 — Perec, Les Choses","Les Choses (Perec, 1965) : Jérôme et Sylvie rêvent de richesse | Incipit au conditionnel : décor kitsch d'un bonheur fantasmé | Paris perpétuelle tentation mais horizon des désirs impitoyablement bouché | Spirale bovaryste : ennui, fuite, retour, même insatisfaction | Le repas final en wagon-restaurant sera franchement insipide | Bovarysme moderne : vide pallié par la consommation d'images"],["Philosophie","Cours prépa","Cours 31 — Houellebecq, Les Particules élémentaires","Les Particules élémentaires (1998) | Les sentiments d'amour et de fraternité avaient dans une large mesure disparu | Mutations métaphysiques : christianisme → science → post-humanisme | Bruno sur Huxley : Brave New World est exactement le monde que nous essayons d'atteindre | Comment une société pourrait-elle subsister sans religion ? | Libération sexuelle → destruction des communautés → atomisation sociale"],["Philosophie","Cours prépa","Cours 31 — Houellebecq, Plateforme et l'ère du vide","Plateforme (2001) : mes rêves sont médiocres, je souhaite voyager | Le Nord vieux a l'argent, le Sud jeune a le corps — échange idéal | Les Occidentaux n'arrivent plus à coucher ensemble : narcissisme, performance | Ils passent trente ans dans un état de manque permanent | La souffrance des héros de Houellebecq naît de la violence du marché (Bernard Maris) | L'amour implique abandon et faiblesse — ce dont les Occidentaux sont incapables"]].map(r=>({domaine:r[0],theme:r[1],titre:r[2],contenu:r[3]}));

var CAROUSEL = [{"oeuvre":"L'Odyssée","auteur":"Homère","date":"VIIIe s. av. J.-C.","courant":"Épopée grecque","verso":"Ulysse met dix ans à rentrer chez lui après la guerre de Troie — dix ans d'errances forcées, de monstres, de séductions et de naufrages. Le Cyclope, les Sirènes, Circé qui transforme les hommes en porcs, Calypso qui lui offre l'immortalité : chaque épreuve est une tentation de renoncer à soi-même. Ulysse refuse toujours. Il refuse l'immortalité de Calypso parce qu'il préfère son île, sa femme mortelle, sa vie finie et réelle. L'Odyssée est le premier grand texte occidental sur l'identité : qui suis-je si je n'ai plus de patrie, plus de nom, plus de mémoire ? La mètis — la ruse, l'intelligence adaptable — y est posée comme la vertu suprême, supérieure à la force brute d'Achille. Fondatrice de toute la littérature d'aventure et de voyage, l'oeuvre traverse les siècles : Joyce en fait la trame d'Ulysse (1922), Cavafy lui consacre son poème le plus célèbre."},{"oeuvre":"L'Iliade","auteur":"Homère","date":"VIIIe s. av. J.-C.","courant":"Épopée grecque","verso":"Cinquante jours de la guerre de Troie, vus par le prisme de la colère d'Achille contre Agamemnon. Achille se retire, son ami Patrocle est tué par Hector, Achille se venge en tuant Hector — puis rend son corps à son père Priam, venu seul, de nuit, supplier l'ennemi qui a tué son fils. Cette dernière scène est peut-être la plus grande de toute la littérature mondiale : deux hommes que tout oppose pleurent ensemble. L'Iliade est une oeuvre profondément anti-guerre — elle montre la gloire militaire et simultanément l'horreur, le deuil, le gâchis. Simone Weil, dans son essai L'Iliade ou le poème de la force, a montré comment la violence transforme les hommes en choses. Aucun texte n'a mieux dit ce que la guerre fait à ceux qui la font."},{"oeuvre":"La Divine Comédie","auteur":"Dante Alighieri","date":"1308–1321","courant":"Poésie médiévale italienne","verso":"Dante, guidé par Virgile puis Béatrice, descend en Enfer, remonte par le Purgatoire, et s'élève jusqu'à la vision de Dieu en Paradis. L'Enfer compte neuf cercles où les damnés subissent des châtiments qui correspondent à leur péché — la forme de la punition révèle la nature de la faute. Le Purgatoire est la montagne de la purification progressive. Le Paradis, le plus difficile à lire, est une extase de lumière et d'harmonie. Dante y règle ses comptes politiques : ses ennemis florentins en Enfer, ses amis en Paradis. T.S. Eliot la considérait avec Shakespeare comme le sommet de la littérature occidentale. Borges y revenait toute sa vie. La terza rima — ABA BCB CDC — est une architecture sonore qui spirale vers le haut, mimant formellement l'ascension spirituelle. Fondement de la langue italienne littéraire."},{"oeuvre":"Don Quichotte","auteur":"Miguel de Cervantes","date":"1605–1615","courant":"Renaissance espagnole","verso":"Alonso Quijano a tellement lu de romans de chevalerie qu'il se prend pour le chevalier Don Quichotte. Il part en quête d'aventures, combat des moulins à vent qu'il prend pour des géants, se fait rouer de coups, libère des galériens, aime une paysanne imaginée en princesse. Sancho Pança, son écuyer terre-à-terre, le suit avec une loyauté touchante. Le tome II, plus mélancolique, voit don Quichotte devenir célèbre — les gens ont lu le tome I — et mourir lucide, ayant retrouvé la raison. Cervantes invente le roman moderne : mise en abyme, jeu sur la vérité et la fiction, personnages conscients d'être dans un livre. La question centrale est celle de l'illusion nécessaire : vaut-il mieux vivre dans le rêve généreux de Don Quichotte ou dans le pragmatisme de Sancho ? Dostoïevski le voyait comme le livre le plus triste jamais écrit — l'histoire du plus noble des hommes que le monde rend fou."},{"oeuvre":"Hamlet","auteur":"William Shakespeare","date":"vers 1601","courant":"Théâtre élisabéthain","verso":"Hamlet apprend de son père fantôme que son oncle Claudius l'a assassiné pour usurper le trône et épouser sa mère Gertrude. Il hésite, feint la folie, monte une pièce pour vérifier la culpabilité de Claudius, tue accidentellement Polonius, entraîne la folie et la mort d'Ophélie. Il mourra dans un duel empoisonné, emportant avec lui Laërte, sa mère et Claudius. Être ou ne pas être — la question n'est pas abstraite : Hamlet hésite à agir, à vivre, à mourir. Il est le premier grand personnage de la modernité : un homme paralysé par la pensée, incapable de passer à l'acte. Freud y voit le complexe d'Oedipe en action. Nietzsche y voit le danger de la connaissance — trop savoir empêche d'agir. Quatre siècles de lectures, d'adaptations, de réécritures, et Hamlet reste inépuisable parce qu'il pose une question sans réponse : comment agir dans un monde corrompu quand on pense trop ?"},{"oeuvre":"Faust","auteur":"Johann Wolfgang von Goethe","date":"1808 (I) — 1832 (II)","courant":"Romantisme allemand","verso":"Le savant Faust, épuisé par la science qui ne lui a pas donné le sens de la vie, conclut un pacte avec Méphistophélès : le diable le servira jusqu'à ce qu'il s'exclame 'Arrête-toi, tu es si beau'. Rajeuni, il séduit et perd Marguerite. La seconde partie, cosmique et symbolique, le voit bâtir une cité idéale — avant d'être sauvé in extremis. Goethe a travaillé soixante ans à cette oeuvre. Méphistophélès est l'un des personnages les plus séduisants de la littérature : 'Je suis l'esprit qui toujours nie — et à juste titre, car tout ce qui naît mérite de périr'. Faust est le grand mythe de la modernité : l'homme qui vend son âme non pour l'or mais pour l'expérience totale et la connaissance absolue. Thomas Mann en fera le cadre de Docteur Faustus en 1947, réécrivant le mythe au prisme du nazisme et de la chute de la civilisation allemande."},{"oeuvre":"Les Fleurs du Mal","auteur":"Charles Baudelaire","date":"1857","courant":"Symbolisme français","verso":"Cent vingt-six poèmes organisés en six sections : Spleen et Idéal, Tableaux parisiens, Le Vin, Fleurs du Mal, Révolte, La Mort. Baudelaire explore la tension entre l'aspiration à la beauté absolue et le dégoût du monde ordinaire — le spleen, la mélancolie moderne. Il invente la poésie de la ville, de la foule anonyme, du mal assumé. Poursuivi pour obscénité à sa publication, six poèmes condamnés, non levés en France avant 1949. 'Hypocrite lecteur, mon semblable, mon frère !' — le pacte baudelairien implique le lecteur dans la faute du poète. La théorie des Correspondances — 'Les parfums, les couleurs et les sons se répondent' — fonde toute l'esthétique symboliste que prolongeront Verlaine, Rimbaud, Mallarmé. Walter Benjamin a consacré une part majeure de son oeuvre à Baudelaire comme penseur de la modernité parisienne : le flâneur, le choc, la marchandise, la foule."},{"oeuvre":"Madame Bovary","auteur":"Gustave Flaubert","date":"1857","courant":"Réalisme français","verso":"Emma Bovary, fille de fermier normand élevée dans un couvent, épouse Charles Bovary, médecin médiocre. Elle attendait la vie des romans qu'elle a lus — la passion, le luxe, les voyages — et ne trouve que la province ennuyeuse. Elle prend deux amants, s'endette pour maintenir l'illusion du romanesque, et s'empoisonne quand ses créanciers la rattrapent. 'Madame Bovary c'est moi', aurait dit Flaubert. Le 'bovarysme' est entré dans la langue : se croire autre que l'on est, confondre la vie avec les livres. Flaubert invente le style indirect libre — technique qui fond la voix du narrateur et celle du personnage, rendant impossible de savoir qui parle, qui juge. Emma est à la fois victime d'une société qui interdit aux femmes l'aventure, et d'une incapacité radicale à habiter le réel. Sartre lui a consacré L'Idiot de la famille, trois mille pages, son ultime grande oeuvre philosophique."},{"oeuvre":"Guerre et Paix","auteur":"Léon Tolstoï","date":"1869","courant":"Roman réaliste russe","verso":"Fresque de la Russie de 1805 à 1812 — les guerres napoléoniennes, Austerlitz, la retraite de Moscou — à travers trois familles aristocratiques et cinq cents personnages. Pierre Bezoukhov cherche le sens de sa vie entre mariage raté, franc-maçonnerie et amour pour Natacha. Le prince Andreï Bolkonsky cherche la gloire militaire et trouve la paix seulement en mourant. Tolstoï brise la vision romantique du héros : Napoléon n'est pas un génie, il est dépassé par des événements qui le transcendent. L'histoire n'est pas faite par les grands hommes mais par le mouvement obscur de millions d'individus ordinaires. La scène d'Austerlitz — Andreï blessé, regardant le ciel infini et comprenant la vanité de tout — est une des plus grandes de la littérature mondiale. Isaiah Berlin a analysé Tolstoï comme un 'renard qui voudrait être un hérisson' : il perçoit la multiplicité du monde mais aspire désespérément à une vérité unique."},{"oeuvre":"Les Frères Karamazov","auteur":"Fiodor Dostoïevski","date":"1880","courant":"Roman russe","verso":"Trois frères : Dmitri (la passion), Ivan (la raison athée), Aliocha (la foi douce). Leur père Fiodor, débauché et avare, est assassiné. Au coeur du roman : la Légende du Grand Inquisiteur — Ivan imagine le Christ revenu à Séville, arrêté par le cardinal qui lui explique que les hommes préfèrent le pain à la liberté. 'Si Dieu n'existe pas, tout est permis' — c'est la question que Dostoïevski pose sans y répondre facilement. Il meurt quelques mois après la publication. Freud le voyait comme 'le plus grand roman jamais écrit'. Nietzsche l'avait dévoré en déclarant : 'le seul psychologue qui m'ait appris quelque chose'. Camus y puisera la problématique de L'Homme révolté. Le procès de Dmitri, probablement innocent, condamné par une foule qui a besoin d'un coupable, préfigure Kafka et l'absurde judiciaire du XXe siècle."},{"oeuvre":"À la recherche du temps perdu","auteur":"Marcel Proust","date":"1913–1927","courant":"Modernisme français","verso":"Sept volumes, trois mille pages, deux mille personnages. Le narrateur reconstruit sa vie à travers la mémoire involontaire — déclenchée par la madeleine trempée dans le thé, par un pavé inégal, par l'odeur d'un couloir. La mémoire volontaire donne des faits froids ; la mémoire involontaire ressuscite le passé vivant, avec toutes ses sensations. Proust explore l'amour comme jalousie — Swann avec Odette, le narrateur avec Albertine —, les salons de l'aristocratie en déclin, l'antisémitisme de l'affaire Dreyfus, le temps qui défigure les visages. Conclusion : seul l'art peut arracher les moments au temps qui les détruit. Sa phrase longue, sinueuse, qui digresse et revient, mime le travail même de la conscience. 'La vraie vie, la vie enfin découverte et éclaircie, la seule vie pleinement vécue, c'est la littérature.' Deleuze, Barthes, Beckett : tous lui ont consacré leur analyse la plus importante."},{"oeuvre":"Ulysse","auteur":"James Joyce","date":"1922","courant":"Modernisme irlandais","verso":"Le 16 juin 1904, à Dublin. Dix-huit heures dans la vie de Leopold Bloom — vendeur d'annonces, juif irlandais, mari trompé — et de Stephen Dedalus, jeune intellectuel. Chacun des dix-huit épisodes correspond à un chant de l'Odyssée et emploie un style narratif différent : monologue intérieur, parodie de journalisme, catéchisme, hallucinogenèse théâtrale. Le roman se clôt sur le monologue de Molly Bloom, quarante-cinq pages sans ponctuation, un torrent de conscience féminine qui finit par 'oui je dirai oui'. Joyce expérimente toutes les formes possibles du langage humain en un seul roman. Nabokov l'enseignait à Cornell en insistant : 'lisez-le comme un poème, pas comme un roman'. Difficile, souvent impénétrable, mais d'une beauté musicale absolue dans ses meilleurs passages. Le 16 juin est célébré dans le monde entier comme le Bloomsday, pèlerinage annuel à travers Dublin sur les traces de Bloom."},{"oeuvre":"La Métamorphose","auteur":"Franz Kafka","date":"1915","courant":"Expressionnisme","verso":"Gregor Samsa se réveille transformé en insecte monstrueux. La famille tente de s'adapter, puis se lasse, puis rejette Gregor. Il meurt de faim et de tristesse — et sa mort libère sa famille, qui repart vers l'avenir avec soulagement. Kafka n'explique jamais la métamorphose. Elle est là, comme un fait, sans étonnement narratif. C'est ce 'réalisme de l'impossible' qui crée l'effet kafkaïen : une logique implacable appliquée à une prémisse absurde. Gregor est l'employé aliéné qui réalise soudain ce que sa famille pense vraiment de lui — il valait uniquement par son salaire, pas par lui-même. La transformation rend visible ce qui était invisible. Kafka était juriste de formation, pas biologiste : ce qui compte n'est pas l'espèce de l'insecte mais l'indifférence de la société face à ce qui ne produit plus."},{"oeuvre":"Le Procès","auteur":"Franz Kafka","date":"1925 (posthume)","courant":"Expressionnisme","verso":"'Quelqu'un devait avoir calomnié Josef K., car, sans avoir rien fait de mal, il fut arrêté un beau matin.' Josef K., directeur de banque, est arrêté sans que personne ne lui explique son crime. Il tente de comprendre un tribunal invisible, logé dans des greniers et des chambres improbables, sans accès aux dossiers, sans avocat efficace. Il est exécuté 'comme un chien' sans avoir jamais su de quoi il était accusé. Kafka décrit la bureaucratie moderne comme une forme de terreur absolue : impersonnelle, inépuisable, sans appel. Publié par Max Brod contre la volonté de Kafka, qui avait demandé que ses manuscrits soient brûlés. Le roman est devenu une référence pour penser les États totalitaires, les procès staliniens, la déshumanisation administrative, l'individu broyé par le système."},{"oeuvre":"1984","auteur":"George Orwell","date":"1949","courant":"Dystopie politique","verso":"Océania, futur totalitaire. Winston Smith travaille au Ministère de la Vérité — qui réécrit l'histoire pour la conformer aux besoins du Parti. Il tient un journal secret, tombe amoureux de Julia, cherche une résistance qui n'existe peut-être pas. Il est trahi, torturé, et finit par aimer Big Brother — son dernier acte de liberté intérieure anéanti. Orwell écrit ce roman en mourant de tuberculose en 1948 — le titre inverse les deux derniers chiffres. Il invente des mots entrés dans toutes les langues : novlangue, doublepensée, Big Brother, Ministère de la Vérité. 'La liberté, c'est dire que deux et deux font quatre.' Le roman reste la référence absolue sur le totalitarisme et sur le contrôle de la pensée par le langage. Orwell avait compris avant tout le monde que la langue est le premier champ de bataille politique."},{"oeuvre":"L'Étranger","auteur":"Albert Camus","date":"1942","courant":"Absurde","verso":"'Aujourd'hui, maman est morte. Ou peut-être hier, je ne sais pas.' Meursault enterre sa mère sans pleurer, prend une maîtresse le lendemain, tue un Arabe sur une plage algéroise 'à cause du soleil', et est condamné à mort — moins pour le meurtre que pour ne pas avoir pleuré à l'enterrement de sa mère. En prison, il refuse l'aumônier et embrasse l'indifférence du monde comme une libération. Camus utilise un style du constat, neutre, sans affect, chaque phrase courte et close sur elle-même — la forme elle-même dit l'absurde, ce monde sans lien causal ni sens donné. Camus développe cette philosophie en parallèle dans Le Mythe de Sisyphe, paru la même année. Meursault est condamné parce qu'il refuse de jouer la comédie sociale du deuil — son crime est d'être honnête dans un monde qui vit de conventions mensongères."},{"oeuvre":"En attendant Godot","auteur":"Samuel Beckett","date":"1953","courant":"Théâtre de l'absurde","verso":"Vladimir et Estragon attendent Godot — qui n'arrive pas. Deux fois, chaque acte, un garçon annonce que Godot ne viendra pas aujourd'hui mais sûrement demain. Pozzo et Lucky traversent la scène. La pièce finit comme elle a commencé. 'On y va.' 'Oui, allons-y.' Ils ne bougent pas. Qui est Godot ? Beckett répondait qu'il ne savait pas. C'est le génie de la pièce : elle refuse le symbolisme facile. Godot n'est pas Dieu (même si l'étymologie le suggère), c'est ce qu'on attend — le sens, la mort, la reconnaissance, le salut. Beckett révolutionne le théâtre en supprimant l'intrigue, la psychologie, le décor, le temps dramatique. Il reste le langage — magnifique, drôle, désespéré. 'Rate encore. Rate mieux.' Cette formule est peut-être le plus beau programme de vie qu'un écrivain ait jamais formulé."},{"oeuvre":"Cent ans de solitude","auteur":"Gabriel García Márquez","date":"1967","courant":"Réalisme magique","verso":"Six générations de la famille Buendía dans la ville de Macondo, fondée en Colombie par José Arcadio. Les mêmes prénoms reviennent, les malédictions se répètent, les miracles côtoient le quotidien sans que personne ne s'en étonne : une femme monte au ciel en étendant son linge, des fleurs jaunes tombent à la mort d'un personnage. García Márquez a écrit l'ouverture d'une traite — 'Bien des années plus tard, face au peloton d'exécution, le colonel Aureliano Buendía devait se rappeler ce lointain après-midi...' — et s'est arrêté, sachant qu'il tenait son roman. Le réalisme magique n'est pas une technique : c'est une vision du monde héritée de la tradition orale caribéenne, où le merveilleux et l'ordinaire coexistent sans hiérarchie. Prix Nobel 1982. Toni Morrison, Salman Rushdie, Isabel Allende lui doivent quelque chose d'essentiel."},{"oeuvre":"Les Misérables","auteur":"Victor Hugo","date":"1862","courant":"Romantisme social","verso":"Jean Valjean, bagnard libéré après dix-neuf ans pour avoir volé un pain, est transformé par la générosité d'un évêque qui lui offre ses chandeliers alors qu'il venait de les voler. Il devient industriel, maire, protège Cosette, fuit l'inspecteur Javert sa vie entière. Sur les barricades de 1832, il sauve Marius. Javert, incapable d'admettre qu'un repris de justice puisse faire le bien, se suicide plutôt que de pardonner. Hugo construit une cathédrale romanesque avec des digressions entières sur Waterloo, les égouts de Paris, les couvents, l'argot. La thèse est simple et puissante : la misère fait les criminels, pas la nature humaine. Jean Valjean et Javert incarnent deux visions du monde — la grâce contre la loi — dans un affrontement sans vainqueur net. C'est probablement l'oeuvre romanesque française la plus connue dans le monde entier."},{"oeuvre":"Crime et Châtiment","auteur":"Fiodor Dostoïevski","date":"1866","courant":"Roman psychologique russe","verso":"Raskolnikov, étudiant pauvre à Saint-Pétersbourg, élabore une théorie : certains hommes supérieurs — Napoléon — ont le droit de transgresser la loi morale ordinaire au nom d'un bien supérieur. Il tue une prêteuse sur gages pour mettre sa théorie à l'épreuve. La culpabilité le ronge immédiatement. L'inspecteur Porfiry démonte intellectuellement sa théorie avant de le confondre. La prostituée Sonia, par sa foi simple et son amour, le conduit à la confession et à la rédemption. Dostoïevski dicte ce roman à sa future femme Anna pour payer ses dettes de jeu. C'est la première grande exploration psychologique d'un meurtre prémédité et de ses conséquences intérieures. La théorie de Raskolnikov — l'homme supérieur au-dessus de la morale — anticipe et critique Nietzsche de vingt ans. Dostoïevski ne condamne pas Raskolnikov de l'extérieur : il le laisse se condamner lui-même par la souffrance de sa conscience."},{"oeuvre":"Moby Dick","auteur":"Herman Melville","date":"1851","courant":"Romantisme américain","verso":"'Appelez-moi Ismaël.' Le narrateur s'embarque sur le Péquod, baleinier commandé par le capitaine Achab, obsédé par Moby Dick, la baleine blanche qui lui a arraché la jambe. Malgré les avertissements, Achab conduit son équipage vers la mort. Après trois jours de chasse, Moby Dick coule le navire. Seul Ismaël survit, flottant sur un cercueil. Melville insère des chapitres entiers de cétologie — biologie des baleines, techniques de chasse, anatomie du cachalot — faisant de son roman une encyclopédie de la chasse à la baleine au XIXe siècle. Achab est la démesure romantique portée à son paroxysme : il préfère sa vengeance à la vie de ses hommes. Moby Dick est simultanément un roman sur l'obsession, une méditation sur le mal absolu, et une métaphore de l'Amérique — sa grandeur, sa folie, sa violence. Échec commercial à sa publication, reconnu chef-d'oeuvre seulement au XXe siècle."},{"oeuvre":"Le Maître et Marguerite","auteur":"Mikhaïl Boulgakov","date":"1967 (écrit 1930–1940)","courant":"Fantastique soviétique","verso":"Le Diable (Woland) arrive à Moscou soviétique avec sa suite démoniaque et sème le chaos parmi les bureaucrates, les délateurs et les opportunistes. En parallèle : le roman-dans-le-roman sur Ponce Pilate et Yeshoua, et l'histoire d'amour de Marguerite avec le Maître, auteur d'un roman sur Pilate que les censeurs ont refusé. 'Les manuscrits ne brûlent pas' — cette phrase de Woland est le credo de l'oeuvre. Boulgakov écrit dans la terreur stalinienne, brûle un premier manuscrit, recommence, ne publie jamais de son vivant. Woland est le diable le plus séduisant de la littérature : il punit les hypocrites et protège les artistes, plus humain que les humains qui l'entourent. Pilate est condamné à errer jusqu'à ce qu'on lui pardonne sa lâcheté face à Jésus — le roman est une méditation sur la lâcheté comme péché suprême."},{"oeuvre":"Le Deuxième Sexe","auteur":"Simone de Beauvoir","date":"1949","courant":"Féminisme existentialiste","verso":"'On ne naît pas femme : on le devient.' En deux volumes, Beauvoir analyse la condition féminine : l'histoire, la biologie, la psychanalyse, le marxisme sont passés en revue pour montrer que la femme a toujours été définie comme l'Autre absolu — l'altérité par rapport au référent masculin universel. Elle explore ensuite les situations concrètes : l'enfance, l'initiation, la maternité, la vieillesse. Beauvoir distingue le sexe biologique du genre comme construction sociale, anticipant de quarante ans les gender studies et Judith Butler. Mis à l'Index par le Vatican dès sa publication. Des milliers de femmes ont écrit à Beauvoir pour lui dire que ce livre leur avait sauvé la vie. Betty Friedan, Gloria Steinem, Judith Butler : le féminisme contemporain part de Beauvoir, même quand il la critique."},{"oeuvre":"Germinal","auteur":"Émile Zola","date":"1885","courant":"Naturalisme français","verso":"Étienne Lantier arrive dans le Borinage minier du nord de la France, descend à la fosse Voreux, découvre la misère des mineurs, lit le socialisme, organise une grève. La grève est brisée, sabotée par l'anarchiste Souvarine qui noie la mine, les mineurs meurent ou fuient, la défaite est totale. Étienne part, convaincu que la germination souterraine continue. Zola descend lui-même dans les mines du Nord et prend des notes avec une précision documentaire. Germinal est l'oeuvre la plus puissante sur la lutte des classes dans la littérature française. La scène de la foule — 'une vision rouge de la révolution' — est d'une violence prophétique. Mais Zola ne simplifie pas : Souvarine l'anarchiste détruit ce que les grévistes ont construit, le collectif se fragmente en individualisme. La fin — ambiguë, lumineuse et désespérée — est peut-être la plus grande de tout le XIXe siècle français."},{"oeuvre":"Essai sur le don","auteur":"Marcel Mauss","date":"1925","courant":"Anthropologie — sociologie","verso":"En étudiant les sociétés archaïques — le potlatch des Indiens de la côte nord-ouest américaine, le kula mélanésien, les échanges germaniques et hindous — Mauss découvre que le don n'est jamais gratuit. Toute société humaine repose sur un cycle obligatoire : donner, recevoir, rendre. Refuser de donner, c'est déclarer la guerre. Refuser de recevoir, c'est humilier. Refuser de rendre, c'est perdre sa face et son honneur. Ce triple mouvement fonde le lien social bien avant l'économie marchande. Mauss en tire une critique de l'économie capitaliste moderne — qui a isolé l'échange marchand, neutre et impersonnel, du tissu de relations sociales dans lequel tout échange était autrefois enveloppé. Lévi-Strauss, Bataille, Derrida, Bourdieu : tous ont travaillé à partir de Mauss. L'Essai sur le don reste l'un des textes fondateurs des sciences sociales du XXe siècle."},{"oeuvre":"Surveiller et Punir","auteur":"Michel Foucault","date":"1975","courant":"Philosophie — histoire","verso":"Foucault part d'un supplice public de 1757 — le régicide Damiens écartelé vif sur la place publique — et arrive, soixante-dix ans plus tard, au règlement minutieux d'une maison de jeunes détenus : horaires, exercices, repas, prières. Le passage du supplice à la prison n'est pas un progrès humanitaire mais un changement de cible : on ne punit plus le corps, on dresse l'âme. Le Panoptique de Bentham — une tour centrale d'où un gardien peut surveiller toutes les cellules sans être vu — devient la métaphore de la société disciplinaire moderne : école, hôpital, caserne, usine. Le pouvoir n'est plus dans la souveraineté spectaculaire mais dans la surveillance permanente et invisible. 'Est-ce étonnant que les prisons ressemblent aux usines, aux écoles, aux casernes, aux hôpitaux, qui tous ressemblent aux prisons ?' Un des livres les plus influents de la seconde moitié du XXe siècle."},{"oeuvre":"La Condition humaine","auteur":"André Malraux","date":"1933","courant":"Roman d'engagement","verso":"Shanghai, 1927. L'insurrection communiste chinoise est trahie par Tchang Kaï-chek, qui retourne les armes contre ses anciens alliés. Kyo Gisors, Katow, Tchen, May : des révolutionnaires confrontés à la mort imminente, à la torture, à la trahison. Malraux explore ce qui donne sens à la vie — et à la mort. Katow partage son cyanure avec deux camarades qui ont peur et n'en aura plus pour lui-même : la fraternité comme réponse à l'absurde. Comment vivre en sachant qu'on va mourir ? La réponse de Malraux n'est ni religieuse ni marxiste au sens doctrinal : c'est l'action et la fraternité dans le combat qui donnent un sens à l'existence. Prix Goncourt 1933. L'un des romans les plus importants de l'entre-deux-guerres."},{"oeuvre":"La Comédie humaine","auteur":"Honoré de Balzac","date":"1829–1850","courant":"Réalisme français","verso":"Quatre-vingt-dix romans et nouvelles reliés par le retour de plus de deux mille personnages. Balzac ambitionne de faire concurrence à l'état civil en dressant le tableau complet de la société française sous la Restauration et la monarchie de Juillet. Rastignac passe du Père Goriot aux Illusions perdues, Vautrin traverse plusieurs volumes en changeant d'identité. L'ensemble est organisé en Études de mœurs, Études philosophiques et Études analytiques. Balzac peint les mécanismes de l'argent, de l'ambition et du désir avec une précision sociologique que Marx admirait. Chaque roman est une coupe dans un organisme vivant, la société, dont Balzac observe les organes avec l'œil d'un anatomiste. Zola, Proust, Dostoïevski lui doivent quelque chose d'essentiel."},{"oeuvre":"Illusions perdues","auteur":"Honoré de Balzac","date":"1837–1843","courant":"Réalisme français","verso":"Lucien de Rubempré, jeune poète ambitieux d'Angoulême, monte à Paris pour conquérir la gloire littéraire. Il découvre que le talent ne suffit pas : le journalisme est vénal, l'édition corrompue, et la société parisienne un théâtre de faux-semblants. Lucien trahit ses idéaux, se compromet, échoue et retourne en province ruiné. Le roman est la plus féroce anatomie du monde littéraire et médiatique jamais écrite. Balzac y montre comment le capitalisme transforme la littérature en marchandise et le journaliste en mercenaire. La presse fabrique et détruit les réputations selon les intérêts du moment. Un roman prophétique sur la société du spectacle."},{"oeuvre":"Splendeurs et misères des courtisanes","auteur":"Honoré de Balzac","date":"1838–1847","courant":"Réalisme français","verso":"Suite d'Illusions perdues. Lucien de Rubempré revient à Paris sous la protection occulte de Vautrin, ancien forçat devenu l'abbé Carlos Herrera. Vautrin manipule Lucien comme une marionnette pour conquérir le pouvoir par procuration. Esther Gobseck, courtisane rachetée par l'amour, est sacrifiée dans cette machination. Vautrin est l'un des personnages les plus fascinants de la littérature : génie du mal, homosexuel à peine voilé, il finit par devenir chef de la police — le criminel suprême se mue en gardien de l'ordre. Le roman explore les bas-fonds de Paris, le bagne, la prostitution, et montre que le pouvoir repose sur les mêmes mécanismes que le crime."},{"oeuvre":"Bel-Ami","auteur":"Guy de Maupassant","date":"1885","courant":"Naturalisme français","verso":"Georges Duroy, ancien sous-officier sans le sou, conquiert Paris par la séduction et l'opportunisme. Beau, cynique, dépourvu de scrupules, il utilise les femmes comme des échelons : chacune lui ouvre une porte vers le pouvoir, l'argent, la respectabilité. De journaliste médiocre, il devient directeur de journal et époux d'une riche héritière. Maupassant peint avec une ironie glaciale l'arrivisme dans la presse et la politique de la Troisième République. Le roman est un manuel de la réussite par la médiocrité : Duroy n'a aucun talent, aucune culture, mais un instinct infaillible pour exploiter la vanité des autres. La scène finale — Duroy à l'église de la Madeleine, contemplant son triomphe — est un sommet de cynisme narratif."},{"oeuvre":"Boule de suif","auteur":"Guy de Maupassant","date":"1880","courant":"Naturalisme français","verso":"Pendant la guerre de 1870, une diligence quitte Rouen occupé par les Prussiens. Parmi les passagers : des bourgeois, des religieuses, un démocrate, et Élisabeth Rousset, une prostituée surnommée Boule de suif. Quand un officier prussien exige ses faveurs pour laisser passer la diligence, les bourgeois qui la méprisaient la poussent à céder — puis la méprisent davantage pour avoir cédé. Chef-d'œuvre de la nouvelle, le texte dénonce l'hypocrisie de la morale bourgeoise avec une concision impitoyable. Flaubert, maître de Maupassant, déclara à sa lecture que c'était un chef-d'œuvre. La guerre révèle la lâcheté des bien-pensants et la dignité des humiliés."},{"oeuvre":"Le Capital","auteur":"Karl Marx","date":"1867 (tome I)","courant":"Économie politique","verso":"Analyse du mode de production capitaliste. Marx décortique le mécanisme de la plus-value : le travailleur produit plus de valeur qu'il n'en reçoit en salaire, et la différence alimente le profit du capitaliste. La marchandise est analysée comme rapport social déguisé en chose — c'est le fétichisme de la marchandise. Le Capital montre comment le système tend vers la concentration du capital, la prolétarisation des travailleurs et les crises périodiques de surproduction. Marx emprunte sa dialectique à Hegel mais la retourne : ce ne sont pas les idées qui font l'histoire, ce sont les rapports matériels de production. L'œuvre reste le texte fondateur de la critique du capitalisme, que l'on y adhère ou non."},{"oeuvre":"La Distinction","auteur":"Pierre Bourdieu","date":"1979","courant":"Sociologie critique","verso":"Enquête monumentale sur les goûts culturels des Français. Bourdieu démontre que le goût n'est pas naturel ni innocent : il est le produit de la position sociale. Les classes dominantes imposent leur culture comme légitime et universelle, transformant un arbitraire social en évidence naturelle. Le concept d'habitus — ensemble de dispositions incorporées inconsciemment — explique pourquoi les individus reproduisent les structures sociales sans en avoir conscience. Le capital culturel fonctionne comme le capital économique : il se transmet, s'accumule et produit des profits de distinction. La violence symbolique consiste à faire accepter comme naturelles des hiérarchies qui sont construites. Ouvrage essentiel pour comprendre les mécanismes de reproduction sociale."},{"oeuvre":"Les Métamorphoses","auteur":"Ovide","date":"8 apr. J.-C.","courant":"Poésie latine","verso":"Quinze livres, deux cent quarante-six récits de transformations, de la création du monde à l'apothéose de César. Daphné changée en laurier pour fuir Apollon, Narcisse en fleur, Arachné en araignée par Athéna, Actéon en cerf dévoré par ses propres chiens. Ovide tisse un poème continu où chaque métamorphose s'enchaîne à la suivante. L'œuvre est une encyclopédie vivante de la mythologie gréco-romaine et la source principale de presque tous les artistes et écrivains occidentaux. Dante, Shakespeare, Titien, Bernin, Picasso : tous y ont puisé. La métamorphose dit quelque chose d'essentiel sur la condition humaine — rien n'est stable, tout change, et la forme est à la fois prison et libération."},{"oeuvre":"Les Confessions","auteur":"Jean-Jacques Rousseau","date":"1782–1789","courant":"Autobiographie","verso":"Première grande autobiographie moderne. Rousseau entreprend de se montrer tel qu'il est, sans masque, dans toute sa vérité — y compris les épisodes honteux : le vol du ruban, l'abandon de ses cinq enfants aux Enfants-Trouvés, ses mensonges. Le projet est inédit et radical : aucun homme avant lui n'a osé se peindre avec cette sincérité brutale. Les Confessions fondent le genre autobiographique et influencent toute la littérature du moi. Rousseau y développe aussi sa philosophie de la nature humaine : l'homme naît bon, c'est la société qui le corrompt. Le récit de l'enfance, avec ses bonheurs sensoriels et ses blessures, annonce Proust. L'écriture de soi devient un acte de vérité et de justification devant le tribunal de la postérité."},{"oeuvre":"Le Loup des steppes","auteur":"Hermann Hesse","date":"1927","courant":"Modernisme allemand","verso":"Harry Haller, intellectuel solitaire, se vit comme écartelé entre deux natures : l'homme cultivé et le loup sauvage. Il méprise le monde bourgeois mais en dépend. Une nuit, il découvre le Théâtre magique — réservé aux fous — où il apprend que le moi n'est pas double mais multiple, un jeu infini de personnalités. Le roman est une crise existentielle mise en musique : jazz, Mozart et désespoir se mêlent. Hesse y explore la tension entre vie spirituelle et vie instinctive, entre solitude et communion. Le Loup des steppes est devenu un livre-culte pour les générations en révolte contre le conformisme — des beatniks aux hippies. Prix Nobel de littérature en 1946."},{"oeuvre":"Cyrano de Bergerac","auteur":"Edmond Rostand","date":"1897","courant":"Néo-romantisme","verso":"Cyrano, bretteur et poète au nez monstrueux, aime sa cousine Roxane en silence. Trop laid pour oser se déclarer, il prête sa voix et ses lettres au beau mais médiocre Christian. La scène du balcon — où Cyrano souffle à Christian les mots d'amour que Roxane reçoit dans l'ombre — est l'une des plus célèbres du théâtre français. Christian meurt au siège d'Arras, et ce n'est que quinze ans plus tard, à l'agonie de Cyrano, que Roxane comprend la vérité. La pièce, créée en pleine crise du naturalisme, fut un triomphe populaire immédiat. Cyrano incarne l'héroïsme chevaleresque, le panache, la générosité — et la tragédie de celui qui a les mots mais pas le visage."},{"oeuvre":"Le Tartuffe","auteur":"Molière","date":"1664–1669","courant":"Classicisme français","verso":"Orgon accueille chez lui Tartuffe, faux dévot qui se fait passer pour un saint homme. Sous couvert de piété, Tartuffe convoite la femme d'Orgon, son bien et sa fille. Seule la servante Dorine et le beau-frère Cléante voient clair dans son jeu. Il faut l'intervention du Roi pour démasquer l'imposteur. La pièce fut interdite pendant cinq ans par la cabale des dévots. Molière y attaque non pas la religion mais l'hypocrisie qui s'en sert comme masque. Tartuffe est le type universel du manipulateur qui exploite la crédulité des honnêtes gens. La scène où Tartuffe tente de séduire Elmire tandis qu'Orgon est caché sous la table est un sommet de comédie dramatique."},{"oeuvre":"Dom Juan","auteur":"Molière","date":"1665","courant":"Classicisme français","verso":"Dom Juan, séducteur impénitent et athée, défie toutes les lois — morales, sociales, divines. Son valet Sganarelle, lâche mais lucide, tente en vain de le ramener à la raison. Dom Juan séduit et abandonne, promet et trahit, blasphème et provoque. Il invite à dîner la statue du Commandeur qu'il a tué — et la statue l'entraîne en enfer. Molière crée un personnage qui fascine par sa liberté absolue et inquiète par son néant moral. Dom Juan est le premier grand athée du théâtre — non pas un philosophe mais un jouisseur qui refuse toute autorité. La pièce fut retirée après quinze représentations et ne fut reprise qu'au XIXe siècle. Mozart en fera le plus grand opéra du répertoire."},{"oeuvre":"Phèdre","auteur":"Jean Racine","date":"1677","courant":"Classicisme français","verso":"Phèdre, épouse de Thésée, brûle d'un amour coupable pour son beau-fils Hippolyte. Elle lutte contre cette passion mais finit par l'avouer. Quand Thésée revient, la nourrice Œnone accuse faussement Hippolyte. Thésée maudit son fils qui meurt. Phèdre s'empoisonne après avoir révélé la vérité. Racine atteint ici le sommet de la tragédie classique. La fatalité de la passion — Vénus tout entière à sa proie attachée — écrase des personnages qui se débattent en vain contre leur propre nature. L'alexandrin racinien, d'une musicalité absolue, fait entendre à la fois la fureur et la plainte. Le jansénisme sous-jacent montre un monde sans grâce où la volonté humaine est impuissante face au désir."},{"oeuvre":"Le Cid","auteur":"Pierre Corneille","date":"1637","courant":"Classicisme français","verso":"Rodrigue aime Chimène, mais le père de Rodrigue est giflé par le père de Chimène. L'honneur exige que Rodrigue venge son père — en tuant celui de la femme qu'il aime. Chimène, déchirée, réclame justice tout en aimant encore Rodrigue. Le dilemme cornélien est né : choisir entre l'amour et le devoir. Rodrigue devient héros national en repoussant les Maures et gagne le surnom de Cid. La pièce provoqua la Querelle du Cid — les rivaux de Corneille l'accusant de ne pas respecter les règles. Mais le public triompha : on dit encore beau comme le Cid. Corneille invente le héros qui se grandit par le sacrifice et dont la volonté domine les passions — l'exact inverse de Racine."},{"oeuvre":"Les Essais","auteur":"Michel de Montaigne","date":"1580–1592","courant":"Humanisme","verso":"Trois livres, cent sept chapitres, une vie entière de réflexion. Montaigne invente l'essai — un genre libre où la pensée se cherche au lieu de se démontrer. Il parle de tout : la mort, l'amitié, les cannibales, l'éducation, la vanité, les coches. Mais son vrai sujet c'est lui-même : que suis-je ? Que sais-je ? Le scepticisme de Montaigne n'est pas un nihilisme — c'est une hygiène de l'esprit qui refuse les certitudes pour mieux accueillir la complexité du réel. Parce que c'était lui, parce que c'était moi : cette phrase sur l'amitié avec La Boétie est devenue la formule de l'amitié absolue. Les Essais sont le livre de chevet de Pascal, Nietzsche, Emerson et de tous ceux qui pensent que la sagesse commence par la connaissance de soi."},{"oeuvre":"Pensées pour moi-même","auteur":"Marc Aurèle","date":"170–180","courant":"Stoïcisme romain","verso":"Journal intime d'un empereur romain écrit en grec, pendant ses campagnes militaires sur le Danube. Marc Aurèle ne destinait pas ces notes à la publication. Il s'y exhorte à la discipline intérieure, à la maîtrise des passions, à l'acceptation du destin. Tout passe, tout est éphémère — gloire, plaisir, pouvoir. La seule chose qui dépend de nous est notre jugement. Le texte est un exercice spirituel au sens des stoïciens : se rappeler chaque jour ce qui compte vraiment. La beauté de ces Pensées tient à leur humanité — un homme de pouvoir absolu qui se rappelle sans cesse sa fragilité. Livre fondateur de la sagesse pratique, relu par Descartes, Montaigne, et aujourd'hui par tous ceux qui cherchent une philosophie pour vivre."},{"oeuvre":"Lettres à un jeune poète","auteur":"Rainer Maria Rilke","date":"1929","courant":"Modernisme allemand","verso":"Dix lettres écrites entre 1903 et 1908 par Rilke à Franz Xaver Kappus, jeune officier aspirant poète. Rilke y parle de la solitude comme condition de la création, de la patience nécessaire pour laisser mûrir les questions sans forcer les réponses, de l'amour comme épreuve et non comme refuge. Il faut que quelque chose vous soit indispensable pour écrire — si vous pouvez vivre sans écrire, n'écrivez pas. Ces lettres sont devenues un bréviaire pour tous les artistes. Rilke y développe une éthique de la vie intérieure : accueillir la difficulté, habiter ses contradictions, transformer la souffrance en œuvre. Un petit livre qui change la vie de ceux qui le lisent au bon moment."},{"oeuvre":"La Princesse de Clèves","auteur":"Madame de La Fayette","date":"1678","courant":"Classicisme français","verso":"Premier grand roman psychologique français. La Princesse de Clèves, mariée à un homme qu'elle estime sans l'aimer, tombe amoureuse du duc de Nemours. Elle fait l'aveu inouï de sa passion à son mari — scène qui stupéfia les lecteurs du XVIIe siècle. Après la mort du prince de Clèves, rongé par la jalousie, elle refuse d'épouser Nemours et se retire du monde. Ce renoncement fascine et scandalise depuis trois siècles. Madame de La Fayette montre que la passion est incompatible avec le repos de l'âme. Le roman analyse avec une précision chirurgicale les mouvements du cœur et le conflit entre désir et devoir. L'écriture est d'une limpidité absolue — chaque phrase est un scalpel."},{"oeuvre":"Mort à crédit","auteur":"Louis-Ferdinand Céline","date":"1936","courant":"Modernisme français","verso":"Récit d'enfance et d'adolescence de Ferdinand, dans le Paris misérable du début du XXe siècle. Père furieux, mère épuisée, logements sordides, apprentissages ratés. Céline pousse plus loin encore que dans Voyage au bout de la nuit la révolution stylistique : les trois points de suspension hachent le texte, la langue parlée envahit l'écrit, l'argot explose les conventions. Le titre dit tout : on vit à crédit, on meurt avant d'avoir payé. L'humour noir et la fureur verbale transforment la misère en épopée grotesque. Céline est un cas unique dans la littérature : un génie du style doublé d'un être moralement abject — ses pamphlets antisémites restent une tache indélébile. Mais Mort à crédit a changé définitivement la langue littéraire française."},{"oeuvre":"Aurélien","auteur":"Louis Aragon","date":"1944","courant":"Réalisme poétique","verso":"Aurélien Leurtillois, ancien combattant de la Grande Guerre, traîne dans le Paris des années vingt sans parvenir à se réinsérer dans la vie civile. Il rencontre Bérénice, provinciale en visite, et tombe amoureux. Mais cet amour est impossible — non par obstacle extérieur, mais par incapacité intérieure. Aurélien ne sait pas aimer, paralysé par une sorte de torpeur existentielle héritée des tranchées. Le roman s'ouvre par une phrase devenue célèbre sur la laideur de Bérénice perçue au premier regard. Aragon peint la génération perdue de l'entre-deux-guerres avec une mélancolie somptueuse. La fin, pendant la Seconde Guerre mondiale, est d'une beauté tragique. C'est peut-être le plus grand roman d'amour français du XXe siècle."},{"oeuvre":"Le Rouge et le Noir","auteur":"Stendhal","date":"1830","courant":"Réalisme romantique","verso":"Julien Sorel, fils de charpentier, ambitieux et hypocrite par nécessité, veut conquérir une place dans la société de la Restauration. Il séduit Madame de Rênal, épouse du maire de Verrières, puis Mathilde de La Mole, fille d'un marquis parisien. Le rouge est la carrière militaire fermée depuis Napoléon, le noir celle de l'Église — les deux voies d'ascension sociale. Julien finit par tirer sur Madame de Rênal dans une église et est guillotiné. Stendhal invente le réalisme psychologique : la cristallisation amoureuse, l'analyse des mobiles secrets, le conflit permanent entre sincérité et calcul. Le roman est une chronique de 1830, un portrait de la société française et l'histoire d'une âme qui se cherche entre énergie et hypocrisie."},{"oeuvre":"Au Bonheur des Dames","auteur":"Émile Zola","date":"1883","courant":"Naturalisme français","verso":"Denise Baudu arrive à Paris et entre comme vendeuse au Bonheur des Dames, grand magasin en pleine expansion qui écrase les petits commerces du quartier. Octave Mouret, le directeur, est un génie du commerce moderne : il a compris que pour vendre il faut créer le désir, organiser la circulation, séduire la cliente. Zola décrit avec fascination et effroi la naissance de la société de consommation. Le grand magasin est un temple du capitalisme où les femmes sont à la fois clientes et proies. Denise résiste à Mouret et finit par le conquérir — mais le roman est moins une histoire d'amour qu'une fresque sur la destruction créatrice du commerce moderne. Les descriptions des étalages sont des morceaux de bravoure."},{"oeuvre":"Mémoires d'outre-tombe","auteur":"François-René de Chateaubriand","date":"1849–1850","courant":"Romantisme français","verso":"Autobiographie monumentale commencée en 1809 et publiée après la mort de l'auteur. Chateaubriand traverse l'Ancien Régime, la Révolution, l'Empire et la Restauration. Il rencontre Washington, assiste à la prise de la Bastille, connaît l'exil en Angleterre, devient ambassadeur et ministre. Mais le vrai sujet est le passage du temps et la mélancolie de celui qui a tout vu s'effondrer. L'écriture est d'une splendeur musicale inégalée. Le récit de l'enfance à Combourg — le vent dans les couloirs du château, le père silencieux, la sœur Lucile — a inventé la prose poétique française. Proust le considérait comme le plus grand prosateur de la langue française. Les Mémoires sont le tombeau magnifique d'un monde disparu."},{"oeuvre":"Le Monde d'hier","auteur":"Stefan Zweig","date":"1942","courant":"Mémoires","verso":"Autobiographie de la civilisation européenne vue par un Viennois cosmopolite. Zweig raconte la Vienne de la Belle Époque — ses cafés, ses théâtres, sa tolérance —, puis l'effondrement de ce monde dans la Première Guerre mondiale, la montée du nazisme et l'exil. Le livre est un adieu déchirant à l'Europe de la culture, de la raison et de l'humanisme. Zweig l'achève au Brésil en 1942, peu avant de se suicider avec sa femme. Le Monde d'hier est le témoignage le plus émouvant de la catastrophe européenne du XXe siècle : comment une civilisation qui semblait indestructible a pu s'autodétruire en une génération. Zweig y est à la fois témoin et victime — et son suicide est le point final de ce qu'il raconte."}];

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});document.getElementById(id).classList.add('active');var m={'p-flash':'nb-flash','p-defi':'nb-defi','p-biblio':'nb-biblio'};document.getElementById(m[id]).classList.add('active');}
function switchSubtab(pageId,targetId,btn){var page=document.getElementById(pageId);page.querySelectorAll('.subtab-content').forEach(function(c){c.classList.remove('active');});page.querySelectorAll('.subtab-btn').forEach(function(b){b.classList.remove('active');});document.getElementById(targetId).classList.add('active');btn.classList.add('active');}
function populateSelects(){var doms=[];ALL.forEach(function(c){if(doms.indexOf(c.domaine)<0)doms.push(c.domaine);});doms.sort();['f1-dom','d-dom','q-dom','r-dom'].forEach(function(id){var sel=document.getElementById(id);sel.innerHTML='<option value="">Tous les domaines</option>';doms.forEach(function(d){sel.innerHTML+='<option value="'+d+'">'+d+'</option>';});});updateThemeSelects();}
function getThemes(dom){var t=[];ALL.forEach(function(c){if((!dom||c.domaine===dom)&&t.indexOf(c.theme)<0)t.push(c.theme);});return t.sort();}
function updateThemeSelects(){[['f1-dom','f1-the'],['d-dom','d-the'],['q-dom','q-the'],['r-dom','r-the']].forEach(function(pair){var dom=document.getElementById(pair[0]).value;var sel=document.getElementById(pair[1]);var cur=sel.value;var themes=getThemes(dom);sel.innerHTML='<option value="">Tous les themes</option>';themes.forEach(function(t){sel.innerHTML+='<option value="'+t+'"'+(t===cur?' selected':'')+'>'+t+'</option>';});});}
document.getElementById('f1-dom').addEventListener('change',function(){updateThemeSelects();p1filter();});
document.getElementById('f1-the').addEventListener('change',p1filter);
document.getElementById('d-dom').addEventListener('change',updateThemeSelects);
document.getElementById('q-dom').addEventListener('change',updateThemeSelects);
document.getElementById('r-dom').addEventListener('change',function(){updateThemeSelects();revRender();});
document.getElementById('r-the').addEventListener('change',revRender);

var p1cards=[],p1idx=0,p1scores={};
function p1getCards(){var dom=document.getElementById('f1-dom').value,the=document.getElementById('f1-the').value;return ALL.filter(function(c){return(!dom||c.domaine===dom)&&(!the||c.theme===the);});}
function p1filter(){p1cards=p1getCards().slice();p1idx=0;document.getElementById('fc').classList.remove('flipped');p1render();}
function p1render(){if(!p1cards.length){document.getElementById('fc-titre').textContent='Aucune carte';document.getElementById('fc-contenu').innerHTML='';document.getElementById('ni').textContent='0/0';document.getElementById('p1-total').textContent=0;return;}var c=p1cards[p1idx];document.getElementById('fc-theme').textContent=c.domaine+' · '+c.theme;document.getElementById('fc-titre').textContent=c.titre;document.getElementById('fc-back-titre').textContent=c.titre;var pts=c.contenu.split(' | ').filter(function(p){return p.trim().length>2;});document.getElementById('fc-contenu').innerHTML=pts.map(function(p){return '<div class="fc-point">'+escH(p)+'</div>';}).join('');document.getElementById('ni').textContent=(p1idx+1)+'/'+p1cards.length;document.getElementById('p1-counter').textContent=c.domaine+' · '+c.theme;var ok=0,ko=0;Object.keys(p1scores).forEach(function(k){if(p1scores[k])ok++;else ko++;});document.getElementById('p1-ok').textContent=ok;document.getElementById('p1-ko').textContent=ko;document.getElementById('p1-total').textContent=p1cards.length;document.getElementById('fc').classList.remove('flipped');}
function p1flip(){document.getElementById('fc').classList.toggle('flipped');}
function p1go(dir){p1idx=(p1idx+dir+p1cards.length)%p1cards.length;p1render();}
function p1shuffle(){shuffle(p1cards);p1idx=0;p1render();toast('Cartes melangees !');}
function p1reset(){p1scores={};p1render();toast('Scores remis a zero');}
function p1filterKO(){p1cards=p1getCards().filter(function(c){return p1scores[c.titre]===false;});p1idx=0;p1render();toast(p1cards.length+' cartes a revoir');}
function p1vote(ok){var c=p1cards[p1idx];p1scores[c.titre]=ok;p1go(1);}
function p1save(){var ok=0,ko=0;Object.keys(p1scores).forEach(function(k){if(p1scores[k])ok++;else ko++;});var data={version:2,prenom:'Morad',date:new Date().toISOString(),scores:p1scores,summary:{total:p1cards.length,sus:ok,arevoir:ko}};var a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(data,null,2));a.download='philo_morad_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Sauvegarde !');}
function p1load(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);p1scores=d.scores||{};p1render();toast('Charge !');}catch(err){toast('Erreur de fichier');}};r.readAsText(f);}

var defiPool=[],defiShuffled=[],defiIdx=0,defiStreak=0,defiRecord=0,defiGuardsInited=false;
function defiStart(){var dom=document.getElementById('d-dom').value,the=document.getElementById('d-the').value;defiPool=ALL.filter(function(c){return(!dom||c.domaine===dom)&&(!the||c.theme===the);});if(defiPool.length<4){toast('Il faut au moins 4 cartes !');return;}defiShuffled=shuffle(defiPool.slice());defiIdx=0;defiStreak=0;if(!defiGuardsInited){initGuards();defiGuardsInited=true;}document.getElementById('defi-btn-start').style.display='none';document.getElementById('defi-btn-restart').style.display='none';document.getElementById('defi-btn-next').style.display='none';document.getElementById('defi-qwrap').style.display='flex';document.getElementById('defi-choices').style.display='grid';document.getElementById('g-hermes').style.display='block';document.getElementById('g-philo').style.display='block';document.getElementById('defi-streak').style.display='block';document.getElementById('defi-streak-label').style.display='block';defiRender();}
function defiRender(){if(defiIdx>=defiShuffled.length){defiShuffled=shuffle(defiPool.slice());defiIdx=0;}var c=defiShuffled[defiIdx];document.getElementById('defi-question').textContent=c.titre;document.getElementById('defi-meta').textContent=c.domaine+' · '+c.theme;document.getElementById('defi-streak').textContent=defiStreak;var pts=c.contenu.split(' | ').filter(function(p){return p.trim().length>5;});var correct=pts[0]||c.contenu;var correctLen=correct.length;var sameTheme=[],sameDom=[],other=[];ALL.forEach(function(x){if(x.titre!==c.titre){var p=x.contenu.split(' | ')[0];if(p&&p.trim().length>5){var pLen=p.trim().length;if(pLen>correctLen*0.3&&pLen<correctLen*2.5){if(x.theme===c.theme)sameTheme.push(p);else if(x.domaine===c.domaine)sameDom.push(p);else other.push(p);}}}});shuffle(sameTheme);shuffle(sameDom);shuffle(other);var wrongPool=[].concat(sameTheme,sameDom,other);var wrong=wrongPool.slice(0,3);while(wrong.length<3)wrong.push('?');var choices=[correct,wrong[0],wrong[1],wrong[2]];shuffle(choices);for(var i=0;i<4;i++){var btn=document.getElementById('ch'+i);btn.textContent=choices[i].trim();btn.dataset.correct=(choices[i]===correct)?'1':'0';btn.className='choice-btn';btn.disabled=false;}document.getElementById('defi-fiche').className='qsdc-fiche';drawHermes(document.getElementById('g-hermes'),'idle');drawPhilo(document.getElementById('g-philo'),'idle');}
function defiAnswer(i){var btn=document.getElementById('ch'+i),correct=btn.dataset.correct==='1';for(var j=0;j<4;j++){var b=document.getElementById('ch'+j);b.disabled=true;if(b.dataset.correct==='1')b.classList.add('reveal-correct');else if(j===i&&!correct)b.classList.add('wrong-choice');}var c=defiShuffled[defiIdx];var dashI=c.titre.indexOf(' — ');document.getElementById('defi-fiche-author').textContent=dashI>0?c.titre.substring(0,dashI).trim():c.titre;document.getElementById('defi-fiche-oeuvre').textContent=dashI>0?c.titre.substring(dashI+3).trim():'';document.getElementById('defi-fiche-tag').textContent=c.domaine+' · '+c.theme;document.getElementById('defi-fiche-prose').innerHTML=buildProse(c);var vd=findVulgaDef(c);if(vd){document.getElementById('defi-vulga-concept').textContent=vd.concept;document.getElementById('defi-vulga-def').textContent=vd.def;document.getElementById('defi-vulga').classList.add('show');}else{document.getElementById('defi-vulga').classList.remove('show');}document.getElementById('defi-fiche').classList.add('show');if(correct){defiStreak++;if(defiStreak>defiRecord)defiRecord=defiStreak;drawHermes(document.getElementById('g-hermes'),'happy');drawPhilo(document.getElementById('g-philo'),'happy');document.getElementById('defi-btn-next').style.display='block';setTimeout(function(){document.getElementById('defi-btn-next').scrollIntoView({behavior:'smooth',block:'center'});},180);}else{drawHermes(document.getElementById('g-hermes'),'sad');drawPhilo(document.getElementById('g-philo'),'sad');document.getElementById('defi-btn-restart').style.display='block';document.getElementById('defi-streak').textContent=defiStreak;document.getElementById('defi-meta').textContent='Série terminée ! Record : '+defiRecord;setTimeout(function(){document.getElementById('defi-btn-restart').scrollIntoView({behavior:'smooth',block:'center'});},180);}}
function defiNext(){defiIdx++;document.getElementById('defi-btn-next').style.display='none';document.getElementById('defi-fiche').className='qsdc-fiche';defiRender();setTimeout(function(){document.getElementById('defi-qwrap').scrollIntoView({behavior:'smooth',block:'start'});},100);}

var qsdcPool=[],qsdcShuffled=[],qsdcIdx=0,qsdcStreak=0,qsdcRecord=0,qsdcCurrent=null,qsdcGuardsInited=false;
var EM='—';
function isRealAuthor(titre){var dashI=titre.indexOf(' — ');if(dashI<0)return false;var a=titre.substring(0,dashI).trim();return !/^Cours\s/i.test(a);}
function qsdcStart(){var dom=document.getElementById('q-dom').value,the=document.getElementById('q-the').value;qsdcPool=ALL.filter(function(c){return(!dom||c.domaine===dom)&&(!the||c.theme===the)&&isRealAuthor(c.titre);});if(qsdcPool.length<4){toast('Il faut au moins 4 cartes avec auteur !');return;}qsdcShuffled=shuffle(qsdcPool.slice());qsdcIdx=0;qsdcStreak=0;if(!qsdcGuardsInited){drawHermes(document.getElementById('g-hermes2'),'idle');drawPhilo(document.getElementById('g-philo2'),'idle');qsdcGuardsInited=true;}['qsdc-btn-start','qsdc-btn-restart','qsdc-btn-next'].forEach(function(id){document.getElementById(id).style.display='none';});document.getElementById('qsdc-prompt').style.display='block';document.getElementById('qsdc-choices').style.display='grid';document.getElementById('g-hermes2').style.display='block';document.getElementById('g-philo2').style.display='block';document.getElementById('qsdc-streak').style.display='block';document.getElementById('qsdc-streak-label').style.display='block';document.getElementById('qsdc-fiche').className='qsdc-fiche';qsdcRender();}
function qsdcRender(){if(qsdcIdx>=qsdcShuffled.length){qsdcShuffled=shuffle(qsdcPool.slice());qsdcIdx=0;}qsdcCurrent=qsdcShuffled[qsdcIdx];var c=qsdcCurrent,dashI=c.titre.indexOf(' '+EM+' ');var author=dashI>0?c.titre.substring(0,dashI).trim():c.titre;var pts=c.contenu.split(' | ').filter(function(p){return p.length>5&&!/^[~\d]/.test(p.trim());});var citation=pts[Math.floor(Math.random()*Math.min(pts.length,3))]||pts[0]||c.contenu;document.getElementById('qsdc-tag').textContent=c.domaine+' · '+c.theme;document.getElementById('qsdc-citation').textContent=citation;document.getElementById('qsdc-streak').textContent=qsdcStreak;var sameThemeA=[],sameDomA=[],otherA=[];ALL.forEach(function(x){if(x.titre!==c.titre&&isRealAuthor(x.titre)){var d=x.titre.indexOf(' '+EM+' ');var a=x.titre.substring(0,d).trim();if(a&&a!==author){if(x.theme===c.theme){if(sameThemeA.indexOf(a)<0)sameThemeA.push(a);}else if(x.domaine===c.domaine){if(sameDomA.indexOf(a)<0)sameDomA.push(a);}else{if(otherA.indexOf(a)<0)otherA.push(a);}}}});shuffle(sameThemeA);shuffle(sameDomA);shuffle(otherA);var wrongPool=[].concat(sameThemeA,sameDomA,otherA);var wrongAuthors=wrongPool.slice(0,3);while(wrongAuthors.length<3)wrongAuthors.push('?');var choices=[author,wrongAuthors[0],wrongAuthors[1],wrongAuthors[2]];shuffle(choices);for(var i=0;i<4;i++){var btn=document.getElementById('qc'+i);btn.textContent=choices[i];btn.dataset.correct=(choices[i]===author)?'1':'0';btn.className='qsdc-choice';btn.disabled=false;}document.getElementById('qsdc-fiche').className='qsdc-fiche';drawHermes(document.getElementById('g-hermes2'),'idle');drawPhilo(document.getElementById('g-philo2'),'idle');}
function qsdcAnswer(i){var btn=document.getElementById('qc'+i),correct=btn.dataset.correct==='1';for(var j=0;j<4;j++){var b=document.getElementById('qc'+j);b.disabled=true;if(b.dataset.correct==='1')b.classList.add('reveal-correct');else if(j===i&&!correct)b.classList.add('wrong-choice');}var c=qsdcCurrent,dashI=c.titre.indexOf(' '+EM+' ');document.getElementById('qsdc-fiche-author').textContent=dashI>0?c.titre.substring(0,dashI).trim():c.titre;document.getElementById('qsdc-fiche-oeuvre').textContent=dashI>0?c.titre.substring(dashI+3).trim():'';document.getElementById('qsdc-fiche-tag').textContent=c.domaine+' · '+c.theme;document.getElementById('qsdc-fiche-prose').innerHTML=buildProse(c);var vd=findVulgaDef(c);if(vd){document.getElementById('qsdc-vulga-concept').textContent=vd.concept;document.getElementById('qsdc-vulga-def').textContent=vd.def;document.getElementById('qsdc-vulga').classList.add('show');}else{document.getElementById('qsdc-vulga').classList.remove('show');}document.getElementById('qsdc-fiche').classList.add('show');if(correct){qsdcStreak++;if(qsdcStreak>qsdcRecord)qsdcRecord=qsdcStreak;drawHermes(document.getElementById('g-hermes2'),'happy');drawPhilo(document.getElementById('g-philo2'),'happy');document.getElementById('qsdc-btn-next').style.display='block';setTimeout(function(){document.getElementById('qsdc-btn-next').scrollIntoView({behavior:'smooth',block:'center'});},180);}else{drawHermes(document.getElementById('g-hermes2'),'sad');drawPhilo(document.getElementById('g-philo2'),'sad');document.getElementById('qsdc-btn-restart').style.display='block';document.getElementById('qsdc-meta').textContent='Serie terminee ! Record : '+qsdcRecord;setTimeout(function(){document.getElementById('qsdc-btn-restart').scrollIntoView({behavior:'smooth',block:'center'});},180);}}
function qsdcNext(){qsdcIdx++;document.getElementById('qsdc-btn-next').style.display='none';qsdcRender();setTimeout(function(){document.getElementById('qsdc-prompt').scrollIntoView({behavior:'smooth',block:'start'});},100);}

function revRender(){var q=(document.getElementById('rev-search').value||'').toLowerCase();var dom=document.getElementById('r-dom').value,the=document.getElementById('r-the').value;var cards=ALL.filter(function(c){return(!dom||c.domaine===dom)&&(!the||c.theme===the);});if(q)cards=cards.filter(function(c){return(c.titre+' '+c.contenu+' '+c.theme).toLowerCase().indexOf(q)>=0;});var list=document.getElementById('rev-list'),html='';var shown=cards.slice(0,80);shown.forEach(function(c,i){var pts=c.contenu.split(' | ').filter(function(p){return p.trim().length>2;});html+='<div class="rev-card" id="rv'+i+'"><div class="rev-card-head" onclick="revToggle('+i+')">'+'<div><div class="rev-card-tag">'+escH(c.domaine)+'</div><div class="rev-card-title">'+escH(c.titre)+'</div></div>'+'<div class="rev-card-arrow">&#9660;</div></div>'+'<div class="rev-card-body">'+pts.map(function(p){return '<div class="rev-point">'+escH(p)+'</div>';}).join('')+'</div></div>';});list.innerHTML=html;document.getElementById('rev-count').textContent=cards.length>80?'Affichage de 80 / '+cards.length:cards.length+' carte(s)';}
function revToggle(i){document.getElementById('rv'+i).classList.toggle('open');}

var carBuilt = false;
function carBuild() {
  if (carBuilt) return;
  carBuilt = true;
  var list = document.getElementById('car-list');
  var html = '';
  CAROUSEL.forEach(function(c, i) {
    var card = '<div class="car-card" id="car-' + i + '">';
    card += '<div class="car-recto">';
    card += '<div class="car-index">' + (i + 1) + ' / 52 &mdash; ' + escH(c.courant) + '</div>';
    card += '<div class="car-oeuvre">' + escH(c.oeuvre) + '</div>';
    card += '<div class="car-auteur">' + escH(c.auteur) + '</div>';
    card += '<div class="car-date">' + escH(c.date) + '</div>';
    card += '<button class="car-toggle-btn" onclick="carToggle(' + i + ')">Lire la fiche <span class="arrow">&#9660;</span></button>';
    card += '</div>';
    card += '<div class="car-verso"><div class="car-verso-inner">';
    card += '<div class="car-verso-label">Résumé &amp; enjeux</div>';
    card += '<div class="car-verso-text">' + escH(c.verso) + '</div>';
    card += '</div></div></div>';
    html += card;
  });
  list.innerHTML = html;
}
function carToggle(i) {
  var card = document.getElementById('car-' + i);
  if (!card) return;
  var opening = !card.classList.contains('open');
  card.classList.toggle('open');
  if (opening) {
    setTimeout(function() { card.scrollIntoView({behavior: 'smooth', block: 'start'}); }, 120);
  }
}


function px(ctx, x, y, color, size=4) {
  ctx.fillStyle = color;
  ctx.fillRect(x*size, y*size, size, size);
}


function drawHermes(canvas, state) {
  const ctx = canvas.getContext('2d');
  const s = 5;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const D = (x, y, c) => { ctx.fillStyle=c; ctx.fillRect(x*s, y*s, s, s); };
  const R = (x1,y1,x2,y2,c) => { ctx.fillStyle=c; ctx.fillRect(x1*s,y1*s,(x2-x1+1)*s,(y2-y1+1)*s); };

  // PALETTE
  const SKIN='#d4aa80', SKIN2='#c49060', GOLD='#e8c050', GOLD2='#c8a030', GOLD3='#f0d060';
  const WING_L='#f0f0ff', WING_D='#c0c0e0', TOGA='#ece4d4', TOGA_S='#ccc4a4';
  const SNAKE_G='#50b840', SNAKE_D='#308820', STAFF='#b09040', STAFF2='#907020';
