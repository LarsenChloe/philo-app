<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Philo — Morad</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

:root {
  /* Palette neutre froide */
  --bg:    #0e0f11;
  --bg2:   #141618;
  --bg3:   #1a1c1f;
  --bg4:   #23262b;
  --bg5:   #2e3138;

  /* Accents */
  --stone: #b0a898;   /* beige stone — accent principal doux */
  --stone2:#d4cec6;   /* plus clair */
  --muted: #6b7280;   /* gris neutre */
  --dim:   #3d4148;   /* séparateurs */

  /* Status */
  --green: #4ade80;
  --red:   #f87171;
  --blue:  #60a5fa;

  /* Typo */
  --txt:  #e8e6e1;
  --txt2: #9a9690;
  --txt3: #545250;

  --serif: 'Outfit', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif;
  --sans: 'Outfit', 'Avenir Next', 'Avenir', 'Trebuchet MS', sans-serif;
  --nav-h: 58px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.nav-bar {
  display: flex;
  background: rgba(14,15,17,.96);
  border-bottom: 1px solid var(--dim);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-btn {
  flex: 1;
  padding: 0 4px;
  height: 52px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--txt3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .2s;
  font-family: var(--sans);
}
.nav-btn.active { color: var(--stone2); }
.nav-label { font-size: 11px; letter-spacing: .06em; font-weight: 500; }

/* SUBTABS */
.subtab-bar {
  display: flex;
  border-bottom: 1px solid var(--dim);
  margin-bottom: 20px;
  background: var(--bg2);
  border-radius: 10px 10px 0 0;
  overflow: hidden;
}
.subtab-btn {
  flex: 1;
  padding: 11px 6px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--txt3);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  font-family: var(--sans);
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all .2s;
}
.subtab-btn.active {
  color: var(--stone2);
  border-bottom-color: var(--stone);
  background: var(--bg3);
}
.subtab-content { display: none; }
.subtab-content.active { display: block; }

/* PAGES */
.page { display: none; padding: 18px 16px; min-height: calc(100vh - var(--nav-h)); position: relative; z-index: 1; }
.page.active { display: block; }
.page-title { font-family: var(--serif); font-size: 26px; font-weight: 400; color: var(--txt); margin-bottom: 4px; letter-spacing: -.01em; }
.page-subtitle { font-size: 12px; color: var(--txt3); margin-bottom: 18px; }

/* FILTERS */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-btn {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 10px;
  cursor: pointer;
  border: 1px solid var(--dim);
  background: var(--bg3);
  color: var(--txt3);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .08em;
  transition: all .15s;
  font-family: var(--sans);
  font-weight: 400;
}
.filter-btn:hover { border-color: var(--stone); color: var(--stone2); }
.filter-select {
  background: var(--bg3);
  border: 1px solid var(--dim);
  color: var(--txt2);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 12px;
  font-family: var(--sans);
  font-weight: 300;
  flex: 1;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
}
.filter-select:focus { border-color: var(--stone); }

/* IO ROW */
.io-row { display: flex; gap: 8px; margin-bottom: 14px; }
.btn-save, .btn-load {
  flex: 1;
  height: 36px;
  border-radius: 8px;
  font-size: 11px;
  font-family: var(--sans);
  font-weight: 400;
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
  border: 1px solid var(--dim);
  background: var(--bg3);
  color: var(--txt2);
}
.btn-save:hover, .btn-load:hover { border-color: var(--stone); color: var(--stone2); }

/* SCORE BAR */
.score-bar { display: flex; gap: 14px; justify-content: center; font-size: 11px; color: var(--txt3); margin-bottom: 14px; }
.score-ok { color: var(--green); }
.score-ko { color: var(--red); }

/* FLASHCARD */
.flashcard-wrap { perspective: 1400px; margin-bottom: 14px; }
.flashcard {
  width: 100%;
  min-height: 230px;
  border-radius: 14px;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.flashcard.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 28px 22px;
  text-align: center;
}
.fc-front {
  background: var(--bg3);
  border: 1px solid var(--dim);
}
.fc-back {
  background: var(--bg2);
  border: 1px solid var(--bg5);
  transform: rotateY(180deg);
}
.fc-theme { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--stone); margin-bottom: 14px; font-weight: 500; }
.fc-titre { font-family: var(--serif); font-size: 21px; font-weight: 400; color: var(--txt); line-height: 1.3; }
.fc-hint { font-size: 10px; color: var(--txt3); margin-top: 14px; }
.fc-back-titre { font-family: var(--serif); font-size: 14px; color: var(--stone2); font-style: italic; margin-bottom: 14px; font-weight: 400; }
.fc-contenu { font-size: 13px; color: var(--txt2); line-height: 1.8; text-align: left; font-weight: 300; }
.fc-point { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; }
.fc-point::before { content: '—'; font-size: 11px; color: var(--stone); flex-shrink: 0; }
.card-nav { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 12px; }
.card-nav-i { font-size: 11px; color: var(--txt3); min-width: 80px; text-align: center; }
.card-nav button {
  font-size: 14px;
  padding: 0 20px;
  height: 38px;
  border: 1px solid var(--dim);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--txt2);
  cursor: pointer;
  font-family: var(--sans);
  transition: all .15s;
}
.card-nav button:hover { border-color: var(--stone); color: var(--stone2); }
.vote-row { display: flex; gap: 8px; margin-bottom: 12px; }
.btn-ok {
  flex: 1;
  background: rgba(74,222,128,.08);
  color: var(--green);
  border: 1px solid rgba(74,222,128,.2);
  border-radius: 8px;
  padding: 11px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--sans);
  font-weight: 400;
  transition: all .15s;
}
.btn-ko {
  flex: 1;
  background: rgba(248,113,113,.08);
  color: var(--red);
  border: 1px solid rgba(248,113,113,.2);
  border-radius: 8px;
  padding: 11px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--sans);
  font-weight: 400;
  transition: all .15s;
}

/* DÉFI */
.defi-meta { text-align: center; font-size: 11px; color: var(--txt3); margin-bottom: 10px; }
.defi-question-wrap {
  background: var(--bg3);
  border: 1px solid var(--dim);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
  min-height: 90px;
  display: flex;
  align-items: center;
}
.defi-question { font-family: var(--serif); font-size: 17px; font-weight: 400; line-height: 1.5; text-align: center; width: 100%; }
.choices-grid, .qsdc-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.choice-btn, .qsdc-choice {
  padding: 12px 10px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--dim);
  background: var(--bg3);
  color: var(--txt2);
  text-align: center;
  line-height: 1.45;
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  font-family: var(--sans);
  font-weight: 300;
}
.choice-btn:active, .qsdc-choice:active { transform: scale(.98); }
.choice-btn.reveal-correct, .qsdc-choice.reveal-correct { background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.4); color: var(--green); }
.choice-btn.wrong-choice, .qsdc-choice.wrong-choice { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red); }
.defi-streak { text-align: center; font-size: 38px; font-family: var(--serif); color: var(--stone2); font-weight: 400; margin: 14px 0 4px; }
.defi-streak-label { text-align: center; font-size: 9px; color: var(--txt3); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 16px; }
.ctrl-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid;
  margin-bottom: 8px;
  font-family: var(--sans);
  font-weight: 400;
  letter-spacing: .04em;
  transition: opacity .15s;
}
.ctrl-btn:active { opacity: .8; }
.btn-start { background: var(--stone); color: #0e0f11; border-color: var(--stone2); font-weight: 500; }
.btn-next { background: var(--bg4); color: var(--txt); border-color: var(--bg5); }
.btn-restart { background: rgba(248,113,113,.1); color: var(--red); border-color: rgba(248,113,113,.25); }

/* QUI A DIT CA */
.qsdc-prompt { background: var(--bg3); border: 1px solid var(--dim); border-radius: 12px; padding: 18px; margin-bottom: 14px; text-align: center; }
.qsdc-citation { font-family: var(--serif); font-size: 15px; color: var(--txt); line-height: 1.7; font-style: italic; font-weight: 400; }
.qsdc-theme-tag { display: inline-block; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--stone); background: rgba(176,168,152,.08); border: 1px solid rgba(176,168,152,.15); border-radius: 10px; padding: 3px 9px; margin-bottom: 10px; font-weight: 500; }
.qsdc-fiche { display: none; background: var(--bg3); border: 1px solid var(--bg5); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.qsdc-fiche.show { display: block; }
.qsdc-fiche-author { font-family: var(--serif); font-size: 16px; color: var(--stone2); font-weight: 400; margin-bottom: 2px; }
.qsdc-fiche-oeuvre { font-size: 11px; color: var(--txt3); font-style: italic; margin-bottom: 12px; }
.qsdc-fiche-prose { font-size: 13px; color: var(--txt2); line-height: 1.9; font-weight: 300; }
.qsdc-fiche-prose p { margin-bottom: 10px; }
.qsdc-vulga { display: none; background: rgba(176,168,152,.06); border: 1px solid rgba(176,168,152,.12); border-radius: 8px; padding: 12px; margin-top: 10px; }
.qsdc-vulga.show { display: block; }
.qsdc-vulga-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--stone); margin-bottom: 6px; font-weight: 500; }
.qsdc-vulga-concept { font-size: 14px; color: var(--stone2); margin-bottom: 4px; font-family: var(--serif); font-weight: 400; }
.qsdc-vulga-def { font-size: 12px; color: var(--txt2); line-height: 1.65; font-weight: 300; }
.guard-pair { display: flex; justify-content: center; gap: 20px; margin: 10px 0 6px; }

/* RÉVISION */
.rev-search {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--dim);
  color: var(--txt);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 300;
  margin-bottom: 14px;
  outline: none;
  transition: border-color .15s;
}
.rev-search:focus { border-color: var(--stone); }
.rev-card { background: var(--bg2); border: 1px solid var(--dim); border-radius: 10px; margin-bottom: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
.rev-card:hover { border-color: var(--bg5); }
.rev-card-head { padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.rev-card-title { font-family: var(--serif); font-size: 14px; font-weight: 400; color: var(--txt); line-height: 1.35; }
.rev-card-tag { font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--stone); background: rgba(176,168,152,.08); border: 1px solid rgba(176,168,152,.15); border-radius: 6px; padding: 2px 7px; white-space: nowrap; font-weight: 500; }
.rev-card-arrow { font-size: 9px; color: var(--txt3); transition: transform .2s; flex-shrink: 0; }
.rev-card.open .rev-card-arrow { transform: rotate(180deg); }
.rev-card-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--dim); padding-top: 14px; }
.rev-card.open .rev-card-body { display: block; }
.rev-point { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; font-size: 13px; color: var(--txt2); line-height: 1.65; font-weight: 300; }
.rev-point::before { content: '—'; font-size: 11px; color: var(--stone); flex-shrink: 0; }
.rev-count { font-size: 11px; color: var(--txt3); text-align: center; padding: 8px; }

/* CARROUSEL */
.car-header { font-size: 10px; color: var(--txt3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
.car-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--stone); opacity: .4; animation: blink 3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.2}50%{opacity:.6} }

.car-card {
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid var(--dim);
  background: var(--bg2);
  transition: border-color .2s;
}
.car-card.open { border-color: var(--bg5); }

.car-recto { padding: 36px 24px 28px; text-align: center; background: var(--bg3); }
.car-index { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--txt3); margin-bottom: 20px; font-weight: 400; }
.car-oeuvre { font-family: var(--serif); font-size: 26px; font-weight: 400; color: var(--txt); line-height: 1.2; margin-bottom: 10px; letter-spacing: -.01em; }
.car-auteur { font-family: var(--serif); font-size: 16px; color: var(--stone2); font-style: italic; margin-bottom: 4px; font-weight: 400; }
.car-date { font-size: 11px; color: var(--txt3); margin-bottom: 0; }

.car-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 22px auto 0;
  background: rgba(176,168,152,.08);
  border: 1px solid rgba(176,168,152,.15);
  border-radius: 20px;
  padding: 9px 20px;
  font-size: 10px;
  color: var(--stone);
  cursor: pointer;
  letter-spacing: .1em;
  text-transform: uppercase;
  font-family: var(--sans);
  font-weight: 500;
  width: fit-content;
  transition: all .2s;
}
.car-toggle-btn:hover { background: rgba(176,168,152,.14); color: var(--stone2); }
.car-toggle-btn .arrow { transition: transform .3s cubic-bezier(.4,0,.2,1); font-size: 8px; }
.car-card.open .car-toggle-btn .arrow { transform: rotate(180deg); }

.car-verso { max-height: 0; overflow: hidden; transition: max-height .45s cubic-bezier(.4,0,.2,1); }
.car-card.open .car-verso { max-height: 1400px; }
.car-verso-inner { border-top: 1px solid var(--dim); padding: 24px 22px 30px; background: var(--bg2); }
.car-verso-label { font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: var(--stone); opacity: .7; margin-bottom: 14px; font-weight: 500; }
.car-verso-text { font-size: 14px; color: var(--txt2); line-height: 2; font-family: var(--sans); font-weight: 300; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg4);
  color: var(--txt2);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 12px;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  z-index: 300;
  border: 1px solid var(--dim);
  font-family: var(--sans);
}
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>
<body>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="showPage('p-flash')" id="nb-flash"><span class="nav-label">Flashcards</span></button>
  <button class="nav-btn" onclick="showPage('p-defi')" id="nb-defi"><span class="nav-label">Le Défi</span></button>
  <button class="nav-btn" onclick="showPage('p-biblio')" id="nb-biblio"><span class="nav-label">Librairie</span></button>
</nav>

<!-- FLASHCARDS -->
<div class="page active" id="p-flash">
  <div class="page-title">Flashcards</div>
  <div class="page-subtitle">Tourne la carte pour révéler le contenu</div>
  <div class="io-row">
    <button class="btn-save" onclick="p1save()">Sauvegarder</button>
    <button class="btn-load" onclick="document.getElementById('fi').click()">Charger</button>
    <input type="file" id="fi" accept=".json" onchange="p1load(event)" style="display:none">
  </div>
  <div class="filter-row">
    <select id="f1-dom" class="filter-select"><option value="">Tous les domaines</option></select>
    <select id="f1-the" class="filter-select"><option value="">Tous les themes</option></select>
  </div>
  <div class="score-bar">
    <span> <span id="p1-total">0</span></span>
    <span class="score-ok"><span id="p1-ok">0</span></span>
    <span class="score-ko"><span id="p1-ko">0</span></span>
  </div>
  <div style="font-size:11px;color:var(--txt2);text-align:center;margin-bottom:8px;font-style:italic" id="p1-counter">—</div>
  <div class="flashcard-wrap">
    <div class="flashcard" id="fc" onclick="p1flip()">
      <div class="fc-face fc-front">
        <div class="fc-theme" id="fc-theme"></div>
        <div class="fc-titre" id="fc-titre"></div>
        <div class="fc-hint">Touche pour révéler</div>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-back-titre" id="fc-back-titre"></div>
        <div class="fc-contenu" id="fc-contenu"></div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button onclick="p1go(-1)">&#9664;</button>
    <span class="card-nav-i" id="ni">—</span>
    <button onclick="p1go(1)">&#9654;</button>
  </div>
  <div class="vote-row">
    <button class="btn-ko" onclick="p1vote(false)">Je ne savais pas</button>
    <button class="btn-ok" onclick="p1vote(true)">Je savais !</button>
  </div>
  <div class="filter-row" style="margin-top:6px">
    <button class="filter-btn" onclick="p1shuffle()">Mélanger</button>
    <button class="filter-btn" onclick="p1reset()">Reset</button>
    <button class="filter-btn" onclick="p1filterKO()">A revoir</button>
  </div>
</div>

<!-- LE DEFI -->
<div class="page" id="p-defi">
  <div class="page-title">Le Défi</div>
  <div class="page-subtitle">Deux épreuves pour tester ta maîtrise</div>
  <div class="subtab-bar">
    <button class="subtab-btn active" onclick="switchSubtab('p-defi','defi-sages',this)">Défi des Sages</button>
    <button class="subtab-btn" onclick="switchSubtab('p-defi','defi-qsdc',this)">Qui a dit ça ?</button>
  </div>
  <div class="subtab-content active" id="defi-sages">
    <div class="filter-row">
      <select id="d-dom" class="filter-select"><option value="">Tous les domaines</option></select>
      <select id="d-the" class="filter-select"><option value="">Tous les themes</option></select>
    </div>
    <div class="defi-meta" id="defi-meta">Une erreur et c'est fini !</div>
    <div class="guard-pair">
      <canvas id="g-hermes" width="120" height="280" style="display:none"></canvas>
      <canvas id="g-philo" width="120" height="280" style="display:none"></canvas>
    </div>
    <div class="defi-streak" id="defi-streak" style="display:none">0</div>
    <div class="defi-streak-label" id="defi-streak-label" style="display:none">Serie</div>
    <div class="defi-question-wrap" id="defi-qwrap" style="display:none"><div class="defi-question" id="defi-question"></div></div>
    <div class="choices-grid" id="defi-choices" style="display:none">
      <button class="choice-btn" id="ch0" onclick="defiAnswer(0)"></button>
      <button class="choice-btn" id="ch1" onclick="defiAnswer(1)"></button>
      <button class="choice-btn" id="ch2" onclick="defiAnswer(2)"></button>
      <button class="choice-btn" id="ch3" onclick="defiAnswer(3)"></button>
    </div>
    <div class="qsdc-fiche" id="defi-fiche">

rmès","Dieu des voyageurs, messagers, voleurs, commerce | Casque ailé (pétase) ; sandales ailées (talonnières) ; caducée (bâton ailé entouré de serpents) | Psychopompe : guide les âmes aux Enfers | Fils de Zeus et Maïa | Équivalent romain : Mercure"],["Mythologie","Olympe","Dionysos","Dieu du vin, de l'extase, du théâtre | Né de Zeus et Sémélé | Thyrse (bâton de lierre) ; panthère ; grappe | Bacchantes (Ménades) | Équivalent romain : Bacchus"],["Mythologie","Olympe","Hestia","Déesse du foyer et de la famille | Vierge éternelle | Feu sacré du foyer | Peu de mythes mais culte central | Équivalent romain : Vesta"],["Mythologie","Olympe","Hadès","Dieu des Enfers | Frère de Zeus et Poséidon | Ravit Perséphone | Casque d'invisibilité | Équivalent romain : Pluton"],["Mythologie","Olympe","Perséphone","Fille de Déméter ; reine des Enfers | Enlevée par Hadès | Pomme de grenade : 6 mois aux Enfers = automne/hiver | Mystères d'Éleusis | Équivalent romain : Proserpine"],["Mythologie","Créatures grecques","Cyclopes","Géants à un seul œil | Forgent la foudre de Zeus | Polyphème : fils de Poséidon aveuglé par Ulysse | Hésiode : 3 Cyclopes primordiaux (Brontès, Stéropès, Argès) | Symbolisent la brutalité sans civilisation"],["Mythologie","Créatures grecques","Méduse","Gorgone aux serpents pour cheveux | Regard pétrifiant | Persée la décapite grâce au bouclier de bronze | De son sang naît Pégase | Athéna place sa tête sur l'égide"],["Mythologie","Créatures grecques","Minotaure","Corps humain, tête de taureau | Fils de Pasiphaé et d'un taureau crétois | Enfermé dans le Labyrinthe de Dédale | Thésée le tue avec l'aide d'Ariane (fil d'Ariane) | Symbolise l'animalité enfouie"],["Mythologie","Créatures grecques","Sphinx","Lion ailé à tête de femme | Garde les portes de Thèbes | Énigme : 'Qu'est-ce qui marche à 4 pattes, puis 2, puis 3 ?' | Réponse d'Œdipe : l'homme | Se jette dans le vide"],["Mythologie","Créatures grecques","Hydre de Lerne","Serpent à 9 têtes qui repoussent si on les coupe | 2e travail d'Héraclès | Détruite en cautérisant les moignons | Sang venimeux utilisé pour les flèches d'Héraclès | Symbolise les problèmes qui se multiplient"],["Mythologie","Créatures grecques","Chimère","Lion + chèvre + serpent | Crache du feu | Tuée par Bellérophon sur Pégase | Lycie (Turquie actuelle) | Métaphore : chimère = idée impossible"],["Mythologie","Créatures grecques","Sirènes","Femmes-oiseaux (puis femmes-poissons à la Renaissance) | Chant envoûtant qui attire les marins vers la mort | Ulysse : attaché au mât, oreilles des marins bouchées | Les Argonautes : Orphée chante plus fort | Symbole de la tentation"],["Mythologie","Créatures grecques","Cerbère","Chien à 3 têtes gardant les Enfers | Queue de serpent | 12e travail d'Héraclès : le capturer vivant | Orphée l'endort avec sa lyre | Psyché lui donne du miel"],["Mythologie","Créatures grecques","Pégase","Cheval ailé né du sang de Méduse | Monture de Bellérophon | Source Hippocrène : frappe du sabot → eau jaillit | Devient constellation | Symbole de l'inspiration poétique"],["Mythologie","Créatures grecques","Centaures","Moitié homme, moitié cheval | Chiron : sage précepteur d'Achille | Centauromachie : bataille Lapithes vs Centaures | Symbolisent l'instinct vs la raison | Nessos : cause la mort d'Héraclès"],["Mythologie","Créatures grecques","Satyres et faunes","Compagnons de Dionysos | Moitié homme, moitié bouc (ou cheval) | Pan : dieu des pâturages, flûte de Pan | Lubricité et fête | Équivalent romain : faunes"],["Mythologie","Héros grecs","Héraclès (Hercule)","Plus grand héros grec | 12 travaux imposés par Eurysthée | Lion de Némée, Hydre, Cerbère, Pommes des Hespérides... | Demi-dieu (Zeus + Alcmène) | Apothéose : devient dieu après sa mort"],["Mythologie","Héros grecs","Achille","Héros de l'Iliade | Fils de Pélée et Thétis | Talon d'Achille : seul point vulnérable | Tue Hector ; tué par Pâris (flèche guidée par Apollon) | Choix : courte vie glorieuse vs longue vie obscure"],["Mythologie","Héros grecs","Ulysse (Odyssée)","Roi d'Ithaque ; héros de l'Odyssée | 10 ans de retour de Troie | Cyclope, Circé, Sirènes, Scylla et Charybde, Calypso | 'L'homme aux mille ruses' | Fidèle Pénélope qui tisse et détisse"],["Mythologie","Héros grecs","Thésée","Héros athénien | Tue le Minotaure (fil d'Ariane) | Oublie de changer les voiles → mort d'Égée | Fondateur légendaire d'Athènes | Combat les Amazones"],["Mythologie","Héros grecs","Persée","Tue Méduse avec le bouclier de bronze | Délivre Andromède du monstre | Casque d'Hadès (invisibilité), sandales ailées d'Hermès | Fils de Zeus et Danaé | Fonde Mycènes"],["Mythologie","Héros grecs","Jason et les Argonautes","Quête de la Toison d'Or | 50 héros dont Héraclès, Orphée, Castor et Pollux | Aide de Médée (magicienne) | Colchide (Géorgie actuelle) | Trahison de Médée après abandon"],["Mythologie","Héros grecs","Orphée","Poète et musicien divin | Lyre : charme humains, animaux, pierres | Descend aux Enfers pour Eurydice | Se retourne : la perd à jamais | Déchiqueté par les Bacchantes"],["Mythologie","Héros grecs","Œdipe","Roi de Thèbes | Tue son père (Laïos) sans le savoir | Épouse sa mère (Jocaste) | Résout l'énigme du Sphinx | Se crève les yeux ; exil avec Antigone"],["Mythologie","Héros grecs","Antigone","Fille d'Œdipe | Enterre son frère Polynice contre l'édit de Créon | Condamnée à mort | Symbole de la loi divine vs loi humaine | Tragédie de Sophocle"],["Mythologie","Mythes grecs","Prométhée","Titan qui vole le feu aux dieux pour le donner aux hommes | Puni par Zeus : enchaîné, aigle dévore son foie chaque jour | Libéré par Héraclès | Symbole du progrès, de la désobéissance créatrice | Prométhée = prévoyant"],["Mythologie","Mythes grecs","Pandore","Première femme créée par Héphaïstos | Boîte (jarre) de Pandore : tous les maux + l'Espérance | Épiméthée (= réfléchit après) l'épouse malgré l'avertissement | Mythe de la chute | 'Boîte de Pandore' : problèmes sans fin"],["Mythologie","Mythes grecs","Narcisse","Beau jeune homme qui tombe amoureux de son reflet | Écho : nymphe qui ne peut que répéter | Meurt en contemplant son image | Narcissisme (Freud) | Métamorphose en fleur"],["Mythologie","Mythes grecs","Icare","Fils de Dédale | S'échappe du Labyrinthe avec des ailes de cire et plumes | Vole trop près du soleil → cire fond → chute | Symbole de l'hubris (démesure) | Dédale réussit à s'enfuir"],["Mythologie","Mythes grecs","Sisyphe","Roi corinthien ; trompeur des dieux | Condamné à rouler un rocher jusqu'en haut d'une colline pour l'éternité | Camus : 'Il faut imaginer Sisyphe heureux' | Symbole de la condition humaine absurde | Sisyphean task"],["Mythologie","Mythes grecs","Midas","Roi qui obtient le don de transformer tout en or | Ne peut plus manger ni toucher ses proches | Oreilles d'âne (jugement musical) | 'Effet Midas' | Dionysos lui retire le don"],["Mythologie","Mythes grecs","Éros et Psyché","Psyché : mortelle si belle qu'Aphrodite est jalouse | Éros l'aime en secret, visite la nuit | Psyché allume la lampe → Éros fuit | Épreuves imposées par Aphrodite | Amour surmonté ; Psyché devient immortelle"],["Mythologie","Mythes grecs","Dédale et le Labyrinthe","Architecte inventeur d'Athènes | Construit le Labyrinthe pour le Minotaure en Crète | Emprisonné par Minos | Fabrique des ailes de cire et plumes | Père d'Icare"],["Mythologie","Mythes grecs","Tantale","Fils de Zeus qui coupe et sert son fils aux dieux | Puni aux Enfers : eau et fruits s'éloignent quand il tend la main | 'Supplice de Tantale' ; 'tantaliser' | Lien punition-crime (talion) | Transmet la malédiction des Atrides"],["Mythologie","Mythes grecs","Œdipe — malédiction des Atrides","Malédiction familiale sur la maison d'Atrée | Thyeste mange ses enfants | Agamemnon sacrifie Iphigénie | Clytemnestre tue Agamemnon | Oreste tue sa mère → Érinyes | Tragédies d'Eschyle (Orestie)"],["Mythologie","Mythes grecs","Les Ages du monde — Hésiode","Hésiode (Travaux et les Jours) | Âge d'or (Cronos) : bonheur et paix | Âge d'argent : déclin | Âge de bronze : guerres | Âge des héros | Âge de fer (notre époque) : souffrance"],["Mythologie","Mythes grecs","Prométhée — Théogonie d'Hésiode","Hésiode : deux grandes épopées | Théogonie : généalogie des dieux | Travaux et les Jours : éthique, agriculture, mythes | Chaos → Gaïa → Ouranos → Titans → Olympiens | Base de la cosmogonie grecque"],["Mythologie","Mythes grecs","Guerre de Troie","Pomme d'or 'à la plus belle' → Héra, Athéna, Aphrodite | Pâris choisit Aphrodite ; reçoit Hélène | 10 ans de siège | Cheval de Troie (Ulysse) | Iliade d'Homère ; fondement de la culture occidentale"],["Mythologie","Mythologie romaine","Romulus et Rémus","Fondateurs légendaires de Rome (753 av. J.-C.) | Fils de Mars et Rhéa Silvia | Allaités par une louve | Romulus tue Rémus lors de la querelle des auspices | Fondation de Rome le 21 avril"],["Mythologie","Mythologie romaine","Énée","Héros troyen ; fils d'Anchise et Vénus | Fuit Troie en flammes avec son père et son fils Ascagne | Voyage en Méditerranée (Didon à Carthage) | Fonde le peuple latin | Virgile : Énéide (épopée nationale romaine)"],["Mythologie","Mythologie romaine","Janus","Dieu des commencements, des portes, des passages | Deux visages (passé et futur) | Mois de janvier | Temple de Janus à Rome : portes ouvertes en temps de guerre | Janus = bifrons"],["Mythologie","Mythologie romaine","Vesta et les Vestales","Déesse du foyer sacré de Rome | Vestales : 6 prêtresses vierges | Gardent le feu sacré 30 ans | Chasteté obligatoire ; privilèges et sanctions sévères | Forum de Rome : temple de Vesta"],["Mythologie","Mythologie romaine","Quirinus","Romulus divinisé | Dieu de l'État romain | Triade archaïque : Jupiter-Mars-Quirinus | Citoyens romains = Quirites | Fêtes : Quirinales"],["Mythologie","Mythologie romaine","Fortuna","Déesse du hasard et du destin | Roue de Fortune (toujours tournante) | Corne d'abondance et gouvernail | 'Fortuna audaces iuvat' : la Fortune favorise les audacieux | Machiavel : Fortuna vs V ère-fond"],["Art","Musique-philosophie","John Cage — silence","1912–1992 | 4'33 (1952) : 4 minutes 33 secondes de silence | 'Tout son peut être musique' | Aléatoire ; I Ching | 'Le silence n'existe pas' (chambre anéchoïque) | Fondateur de la musique expérimentale"],["Art","Musique-philosophie","Schoenberg — révolution atonale","1874–1951 | Abandon de la tonalité (~1908) | Dodécaphonisme : série de 12 sons | Moses und Aron (opéra) | 'Je n'ai fait qu'obéir à une nécessité intérieure' | Berg et Webern : École de Vienne"],["Philosophie","Philosophie contemporaine","Francis Wolff — Utopie cosmopolitique","Trois Utopies Contemporaines (2017) | 3 utopies : posthumanisme, animalisme, cosmopolitisme | Les deux premières franchissent des barrières naturelles ; le cosmopolitisme franchit une barrière artificielle : les frontières | Thèse : la construction d'un monde commun passe par l'utopie cosmopolitique | Citation : «L'utopie cosmopolitique est révolutionnaire, elle absolutise les principes de l'humanisme pour en réaliser l'idée»"],["Philosophie","Philosophie contemporaine","Francis Wolff — L'étranger et la frontière","Trois Utopies Contemporaines (2017) | Les nations sont une communauté politique imaginaire alimentant la dialectique du «eux» et du «nous» | L'extranéité (le fait d'être étranger) est produite par la frontière, non par la nature ou l'histoire | Citation : «L'étranger n'est pas l'effet de la nature ni même de l'histoire, il est le produit de la frontière» | Dépasse le cosmopolitisme kantien : vise la suppression des États et une citoyenneté mondiale"],["Philosophie","Philosophie contemporaine","Myriam Revault d'Allonnes — Institution et monde commun","Le Pouvoir des commencements (2006) | Thèse : l'intersubjectivité seule ne suffit pas à élaborer un monde commun ; l'institution est nécessaire | L'institution «structure un monde qui préexiste et survit à chaque génération» | S'appuie sur Merleau-Ponty (cours 1954-1955) : l'institution dépose en nous un sens «comme appel à une suite, exigence d'un avenir» | L'école et la famille : institutions par excellence permettant à l'enfant de s'insérer dans un monde qui le précède"],["Littérature","Grandes oeuvres","Balzac — La Comédie Humaine comme monde total","La Comédie Humaine (1829-1850) | 90+ œuvres ; 2000+ personnages récurrents | Rastignac du Père Goriot (1834) réapparaît dans Illusions perdues (1837) et Splendeurs et misères (1838) | Strates sociales : noblesse du Faubourg Saint-Germain, bourgeoisie, demi-monde (artistes, prostitués) | Unité géographique : Paris + province (Alençon, Sancerre…) | Citation : «Mon ouvrage a sa géographie, sa généalogie, ses familles, ses lieux, ses personnages et ses faits»"],["Philosophie","Philosophie contemporaine","Hartmut Rosa — Indisponibilité et résonance","Rendre le monde indisponible (2018) | Thèse paradoxale : à trop vouloir rendre le monde disponible (connaissable, accessible, maîtrisable, utilisable), on le rend indisponible | La résonance : expérience en 4 étapes — contact, efficacité personnelle, assimilation, indisponibilité | La résonance échappe à tout contrôle | Exemple du chat : il a de la valeur car il peut aussi griffer ; un robot ronronnant perdrait toute résonance | La résonance est une solution contre notre rapport d'agression sur le monde"],["Philosophie","Esthétique","Gilles Lipovetsky — Capitalisme artiste et esthétisation du monde","L'esthétisation du monde (2013), avec Jean Serroy | «Capitalisme artiste transesthétique» : création de valeur économique à partir de la valeur esthétique et expérientielle | Design et relooking comme habitudes sociétales : «L'amour de la décoration est devenu une passion individualiste de masse» | Société de l'hyperspectacle : théâtralisation des centres commerciaux | Citation : «Partout le réel se construit comme une image en y intégrant une dimension esthétique-émotionnelle» | Le monde construit autour de nous n'est que la projection de l'image que nous nous faisons de nous-mêmes"],["Philosophie","Philosophie contemporaine","Fethi Benslama — Révocation subjective et Kulturarbeit","La psychanalyse à l'épreuve de l'islam (2002) | Distinction modernité (rupture longue en Occident, accompagnée de productions artistiques) vs modernisme (rupture brève dans le monde arabo-musulman, sans travail culturel) | Le modernisme entraîne une révocation subjective : «formes de destitutions massives lorsque les conditions du monde ne se laissent plus appréhender par les repères de vérité de la subjectivité» | Kulturarbeit (travail culturel) manquant → perte du monde → entrée dans l'immonde | La radicalisation islamiste : «cri de révolte» face aux mutations du monde | L'art peut pallier cette révocation subjective"],["Philosophie","Philosophie contemporaine","Jean-Luc Nancy — Mondialisation et immonde","La création du monde ou la mondialisation (2002) | Paradoxe : la mondialisation, censée faire monde, incarne une désintégration du monde | Citation : «Le monde a perdu sa capacité de faire monde : il semble avoir gagné seulement celle de multiplier à la puissance de ses moyens une prolifération de l'immonde» | Les populations entrent dans une logique de ségrégation plutôt que d'homogénéisation"],["Philosophie","Philosophie contemporaine","Jean-Luc Nancy — Praxis et sens du monde","Le sens du monde (1993) | Face à la perte du monde, reprend la formule marxiste : «Il ne s'agit plus d'interpréter le monde, mais de le transformer» | Cette transformation passe par la praxis (action réflexive) et non la poiesis (production technique) | Travailler à l'idée de sens du monde = se transformer soi-même en tant qu'individu et collectif | Solution : réfléchir à nos pratiques pour trouver un sens de l'existence capable de faire bouger les choses"],["Philosophie","Philosophie contemporaine","Christopher Lasch — Narcissisme et moi assiégé","Le Moi assiégé (1984) ; La Culture du Narcissisme (1979) | L'individu moderne ressemble à Narcisse : non celui d'Ovide, mais un Narcisse vide en constante recherche d'approbation cherchant à «survire» dans un monde hostile | Banalisation du langage extrémiste (massacre, génocide) → «identification par procuration» aux victimes | Le Moi forme un noyau défensif face au monde | La bureaucratie moderne : lieu de développement du narcissisme, où l'autorité disparaît et le Surmoi est livré à lui-même → forte anxiété | Conséquence : rétractation du monde subjectif"],["Philosophie","Philosophie contemporaine","Camus — Le Mythe de Sisyphe (version cours)","Le Mythe de Sisyphe (1942) | Citation : «L'absurde naît de cette confrontation entre l'appel humain et le silence déraisonnable du monde» | Sisyphe : condamné à rouler un rocher indéfiniment, symbole de l'absurdité | 3 réponses possibles : Dieu, suicide, révolte → Camus récuse les deux premières | La révolte : lucidité face à l'absurdité, accepter le non-sens sans le fuir | Citation : «La lutte elle-même vers les sommets suffit à remplir le cœur d'un homme, il faut imaginer Sisyphe heureux»"],["Philosophie","Philosophie contemporaine","Markus Gabriel — Pourquoi le monde n'existe pas","Pourquoi le monde n'existe pas (2013) | Thèse : le monde n'existe pas car il serait «le champ de sens de tous les champs de sens» — or une chose n'existe que si elle apparaît dans une entité totale, ce que le monde ne peut faire en son propre sein | Champ de sens : lieu où quelque chose apparaît | Il y a une scission entre la pensée des faits (conceptions) et les faits en soi | La religion nous déresponsabilise en répondant à toutes nos questions ; la philosophie invite à comprendre par la réflexion | Ne pas chercher de «structure fondamentale englobante» mais comprendre les champs de sens qui se présentent"],["Littérature","Grandes oeuvres","Zola — Germinal et la transformation collective du monde","Germinal (1885) | Étienne Lantier : conscience de l'exploitation → grèves massives → sortir de la résignation | Citation Marx/Engels (Manifeste, 1848) : «Les prolétaires n'ont à perdre que leurs chaînes ; ils ont un monde à gagner» | La grève radicalise le mouvement : réformistes → révolutionnaires | Propagation aux mines voisines ; dimension internationale (Pluchart) | Limite du collectif : se transforme en masse + individualisme anarchiste de Souvarine qui fait sauter la mine | Thèse : plusieurs manières de transformer collectivement le monde"],["Philosophie","Philosophie contemporaine","Hannah Arendt — Désert et oasis politiques","Qu'est-ce que la politique ? (1993, posthume) | L'activité politique suppose la participation active des citoyens dans la sphère publique pour façonner le monde commun | Métaphore : les oasis = espaces communs où la créativité est encore possible ; le désert = destruction des espaces communs | Danger principal : «que nous devenions de véritables habitants du désert et que nous nous sentions bien chez lui» | Le désintérêt pour la politique rend les hommes superflus | L'existence humaine sans la politique se réduit à la seule dimension naturelle du vivre"],["Philosophie","Philosophie contemporaine","Robert Harrison — Jardins comme maquettes de monde","Jardins, une histoire buissonnière (2008) | Les jardins sont des maquettes de monde qui expriment la vision du monde de leur créateur | Jardins de Versailles : volonté de domination de Louis XIV | Jardins de Roberto Rossi (Florence) : lieu des décisions politiques humanistes | Citation du peintre japonais Shonin : «L'œuvre d'un œil qui laissant les preuves de son génie en a emporté à jamais le secret» | Face à l'hostilité du monde : le jardin permet de «réenchanter le présent» | Académie de Platon : loin de la cité, près de la raison → planter les graines de la réflexion"],["Philosophie","Philosophie moderne","Nietzsche — Le Gai Savoir et les arrière-mondes","Le Gai Savoir (1882), aphorismes 344 et 372 | Critique du scientisme : «Voulons-nous vraiment abaisser l'existence à un exercice de calcul, à un petit pensum pour mathématiciens ?» | Chercher la vérité rationnelle, c'est rêver d'un «autre monde», négation du monde sensible | Critique des philosophes idéalistes (Platon) qui, attirés par «le froid royaume des idées», «niaient la musique de la vie» | Celui qui invente l'«autre monde» est dépressif, pas assez vital | Solution : appréhender le monde avec ses sens ; les hommes nouveaux se mettent en quête de la «grande santé»"],["Littérature","Grandes oeuvres","Baudelaire — Spleen et Idéal : le monde comme représentation subjective","Les Fleurs du Mal (1857), section «Spleen et Idéal» | Thèse : notre monde n'est que la représentation que nous nous en faisons | «La Vie antérieure» : monde beau et lumineux → Baudelaire heureux | «Spleen» : «Quand le ciel bas et lourd pèse comme un couvercle / Sur l'esprit gémissant en proie aux longs ennuis» → monde atroce | Même monde physique, représentation radicalement différente selon l'état intérieur | Les sensations et sentiments de l'individu influent sur sa vision du monde"],["Philosophie","Philosophie contemporaine","Heidegger — Bâtir, Habiter, Penser (1951)","Conférence de 1951 | «Buan» (vieil allemand : habiter) = «bin» (je suis) → habiter c'est être | Citation : «La façon dont tu es et dont je suis, la manière dont nous autres hommes sommes sur Terre est l'habitation. Être homme, c'est être sur Terre comme mortel» | Heimatlosigkeit : situation moderne où les hommes confondent logement et habitation | L'homme est Weltbildend (configurateur du monde) : il fait son monde | La crise du logement n'est pas un manque de logements mais une crise de l'habitation | Il faut d'abord penser la façon d'habiter, puis construire"],["Philosophie","Philosophie contemporaine","Merleau-Ponty — Intersubjectivité et chair du monde","Phénoménologie de la perception (1945) ; Le visible et l'invisible (1988, posthume) | L'intersubjectivité : subjectivité à «parts égales» qui prend acte de la subjectivité d'autrui | Dès qu'un signe est exprimé, la communication devient possible ; les consciences sont «inter-pénétrables» | Le corps n'est pas un objet parmi d'autres : il est la condition fondamentale de l'expérience du monde | «Foi perceptive» : l'existence du monde est éprouvée avant toute interrogation | «Chair du monde» : notre peau est aussi la peau du monde ; le corps est fait de la même texture que le monde"],["Philosophie","Philosophie moderne","Bergson — Langage, art et origine du monde","Le Rire (1900) ; La Pensée et le mouvant (1934) | Le langage est un système symbolique qui réduit notre perception à une représentation conventionnelle → prive d'accès à l'essence des choses | L'art offre une alternative : l'artiste saisit l'âme des objets par sensibilité et intuition, transcendant les limites du langage | Lien avec Proust : «la vraie vie, la vie pleinement vécue c'est la littérature» | La Pensée et le mouvant : les problèmes philosophiques de l'origine de l'être et de l'ordre sont des «fantômes de problèmes», des chimères | Citation : «Les deux problèmes de l'origine de l'ordre, de l'être s'évanouissent»"],["Philosophie","Philosophie contemporaine","Sartre — Double néantisation et conscience révolutionnaire","L'Être et le Néant (1943) | Pour changer le monde, il faut d'abord prendre conscience qu'il doit être changé : la double néantisation | 1re néantisation : trouver un référent extérieur (rencontre ou imagination) qui montre un état différent | 2e néantisation : concevoir que sa propre situation puisse être différente | La souffrance banalisée empêche la 2e néantisation : «Il souffre sans considérer sa souffrance et sans lui conférer de valeur : souffrir et être ne font qu'un pour lui» | Exemple : les canuts de Lyon | Changer le monde exige d'abord une attitude critique et réflexive face aux structures de domination"],["Philosophie","Philosophie contemporaine","Jakob von Uexküll — Umwelt et perception du monde","Mondes Animaux et Monde Humain (1956) | Chacun a une Weltanschauung (représentation du monde) différente | Umgebung : environnement extérieur à un organisme | Umwelt : monde propre dessiné par l'action et la perception de chaque être face à l'Umgebung | Exemple du chêne : pour le forestier = stères de bois ; pour la fillette = esprit malfaisant ; pour le renard = toit protecteur ; pour la fourmis = écorce ; pour la chouette = branches | Citation : «Dis-moi comment tu perçois le monde et je te dirai qui tu es» | Problème pour le monde commun : personne ne perçoit le monde de la même manière"],["Philosophie","Philosophie contemporaine","Wittgenstein — Tractatus : le sens du monde hors du monde","Tractatus Logico-philosophicus (1921) | Le véritable sens du monde se trouve hors de lui : «Dans le monde toutes choses sont comme elles sont et se produisent comme elles se produisent : il n'y a pas en lui de valeur» | Tout ce qu'on peut dire du monde est limité par le langage et la logique, systèmes humains inscrits dans le monde | Chercher le sens du monde = vouloir enfermer l'infini dans les limites finies du langage | Citation : «Ce dont on ne peut parler, il faut le taire» | La quête du sens ultime doit être abandonnée au profit d'une reconnaissance des limites de l'action humaine"],["Philosophie","Esthétique","Arthur Eddington — Désenchantement scientifique du monde","La nature du monde physique (1929) | La science désenchante le monde en le réduisant à des paramètres mesurables | Exemple de l'éléphant sur la pente gazonnée : l'approche scientifique remplace l'animal par une masse de 2 tonnes, la pente par un angle de 60°, le gazon par un coefficient de frottement | La science transforme les faits en paramètres, puis produit des relations entre ces paramètres pour former des lois | Citation : «Toute idée poétique s'évade du problème et, au moment où commence la science exacte, nous restons avec nos lectures seules» | La science retire au monde sa poésie"],["Philosophie","Esthétique","Gaston Bachelard — L'imagination ouvre des mondes","La Poétique de l'espace (1957) ; L'Air et les songes (1934) | L'imagination n'est pas une simple reproduction des images mais une puissance de transformation et de création | L'imagination est un processus ontologique qui modifie notre relation au monde | Citation : «Imaginer c'est hausser le réel d'un ton» | Elle permet de transcender les limites de la perception habituelle et de révéler des aspects cachés de la réalité | Offre une vision poétique et créatrice du monde | L'imagination ouvre des mondes : elle offre de nouvelles possibilités à la réalité"],["Philosophie","Philosophie contemporaine","Hans Jonas — Principe de responsabilité et heuristique de la peur","Le Principe de Responsabilité (1979) | Les nouvelles formes de l'«agir humain» font peser des menaces extrêmes sur l'environnement et l'humanité | L'éthique doit se refonder autour de la responsabilité : obligations envers les êtres qui n'existent pas encore | Nouvel impératif catégorique : «Agis de telle façon que les effets de ton action ne soient pas destructeurs pour la possibilité future d'une telle vie» | «Heuristique de la peur» : anticiper les menaces potentielles pour élaborer des principes éthiques préventifs | Citation : «Le Prométhée définitivement déchaîné réclame une éthique qui, par des entraves librement consenties, empêche le pouvoir de l'homme de devenir une malédiction pour lui»"],["Littérature","Grandes oeuvres","Victor Hugo — Sublime et grotesque, tout être est un monde","Les Misérables (1862) ; Les Contemplations (1856) | Thèse : tout être peut se révéler un monde riche et complexe, résultante de la coexistence du sublime et du grotesque | L'être humain est un microcosme à l'image du macrocosme | Les Misérables : monde d'un bagnard (Jean Valjean), d'une prostituée (Fantine), d'une enfant des rues (Cosette) → les marges de la société comme mondes riches | Poème «La vie aux champs» (Contemplations, 1856) : «Et tout homme est un livre où Dieu lui-même écrit» | Chez Hugo : tout le monde est un monde"],["Philosophie","Cours prépa","Cours 1 — Midas et le toucher d'or","Ovide, Métamorphoses XI | Midas obtient de Bacchus le pouvoir de tout transformer en or | Incapable de manger ni boire → supplie d'être délivré | Hybris : il dévitalise le vivant (organique → inorganique) | Pléonexie = vouloir toujours plus | Confusion entre avoir et être | Lecture écologiste : destruction de la nature par cupidité | Hervé Juvin, Le Gouvernement du désir (2016) : civilisation du désir sans limites | Év. Matthieu 19, 16-22 : le jeune homme riche — le manque comme condition de la vie spirituelle"],["Philosophie","Cours prépa","Cours 1 — Midas et les oreilles d'âne","Ovide, Métamorphoses XI | Midas préfère la flûte de Pan à la lyre d'Apollon | Apollon le punit : oreilles d'âne | Hybris de Pan : défier un dieu | Correspondance entre la faute et le châtiment | Choisir Pan = choisir le chaos, la sauvagerie ; choisir Apollon = choisir la civilisation, l'harmonie"],["Philosophie","Cours prépa","Cours 1 — Apollon","Fils de Zeus et d'une Titanide, frère jumeau d'Artémis | 2 sanctuaires : Délos et Delphes (« Connais-toi toi-même », « Rien de trop ») | 2 attributs : l'arc (purificateur, ordre) et la lyre (arts, vérité) | Phoibos = le Brillant, le Pur | Loxias = l'oblique (parole prophétique énigmatique) | Père d'Esculape (dieu guérisseur) | Principe apollinien (Nietzsche) : équilibre, harmonie, mesure, belle forme"],["Philosophie","Cours prépa","Cours 1 — Dionysos","Né de Zeus et Sémélé (mortelle), greffé à la cuisse de Zeus | Dieu du vin, du désordre, de la tragédie | Bacchanales : orgies, brouillage des frontières (masculin/féminin, humain/animal, grec/barbare) | Dieu de la virulence de la nature, menace pour l'ordre de la Cité | Nietzsche, La Naissance de la tragédie (1871) : principe dionysiaque = excès, violence, connaissance par le corps | Rimbaud : « dérèglement de tous les sens »"],["Philosophie","Cours prépa","Cours 1 — Apollon vs Dionysos (Nietzsche)","Nietzsche, La Naissance de la tragédie (1871) | Apollinien : équilibre, harmonie, norme, mesure | Dionysiaque : excès, violence naturelle, connaissance par le corps | La tragédie réconcilie les deux : représentation dionysiaque visant une fin apollinienne (catharsis) | Il faut intégrer Dionysos dans la Cité : sans chaos l'ordre se fige, sans cosmos le chaos dévaste | Apollon et Dionysos sont inséparables"],["Philosophie","Cours prépa","Cours 2 — Pomme de discorde et guerre de Troie","Éris (discorde, proche d'Éros) jette une pomme d'or « Pour la plus belle » | Héra, Athéna, Aphrodite se disputent | Jugement de Pâris : libido sentiendi > libido dominandi | Pâris = prince troyen déguisé en berger | Enlèvement d'Hélène → guerre de Troie | Zeus veut la guerre : surpopulation (Gaïa se plaint) + divertissement des dieux"],["Philosophie","Cours prépa","Cours 2 — Ulysse et les Lotophages","Odyssée, chant IX | Les compagnons mangent le lotos → oublient tout, amnésie totale | Ulysse les ramène de force | Tentation de l'oubli : renoncer à son identité pour un bonheur factice | Mémoire et identité sont inséparables | Société lotophage = utopie/dystopie : égalité par l'amnésie, mais perte de singularité | Critique du cosmopolitisme : accueil = renoncement à l'identité ? | Parallèle : cannabis, soma de Huxley, anxiolytiques"],["Philosophie","Cours prépa","Cours 2 — Ulysse et Calypso","Odyssée, chant V | Calypso (kaluptein = cacher) retient Ulysse 7 ans | Lui offre l'immortalité et la jeunesse éternelle → il refuse | Être immortel = cesser d'être soi, perdre son identité | Le sage accepte sa condition de mortel | Critique du transhumanisme contemporain | Francis Wolff, Trois utopies contemporaines (2017)"],["Philosophie","Cours prépa","Cours 2 — Ulysse et les Sirènes","Odyssée, chant XII | Sirènes = femmes-oiseaux au chant mortel | Ulysse se fait attacher au mât, bouche les oreilles de ses hommes | Incarnent la séduction, la libido sciendi et l'attirance érotique → mènent à la mort | Les liens qui libèrent : la loi sauve de la tentation | Parallèle avec le péché originel (Genèse 2-3) | Rousseau : « l'obéissance à la loi qu'on s'est prescrite est liberté »"],["Philosophie","Cours prépa","Cours 2 — Ulysse, héros du nostos","Nostos = retour en grec (nostalgie = douleur du retour) | Jankélévitch : « Ulysse est le héros du nostos », héros de l'enracinement | Goodhart : somewhere vs anywhere | Odyssée = parcours de chaos à cosmos | À chaque épreuve Ulysse perd une partie de lui-même pour renaître plus fort | Aléthéia (vérité) vs léthé (oubli) | Sagesse = accepter sa condition mortelle, trouver sa place dans le Cosmos | Du Bellay : « Heureux qui comme Ulysse a fait un beau voyage »"],["Philosophie","Cours prépa","Cours 2 — Trois utopies contemporaines (Wolff/Homère)","Francis Wolff, Trois utopies contemporaines (2017) | Cosmopolitisme (Lotophages) : effacement des frontières autochtone/étranger | Transhumanisme (Calypso) : effacement homme/divinité | Animalisme (Circé) : effacement homme/animal | Ces trois utopies brouillent les frontières → anomie, chaos | Apeiron (ἄπειρον) : l'illimité, l'indéterminé — détestable pour la pensée grecque"],["Philosophie","Cours prépa","Cours 3 — Les Bacchantes d'Euripide","Euripide, 405 av. J.-C. | Penthée refuse d'accueillir Dionysos à Thèbes → mis en pièces par les Bacchantes | « La puissance divine est infaillible. Elle demande des comptes à ceux qui pratiquent l'arrogance » | Dionysos rappelle l'existence du divin, met en garde contre l'Homme-Dieu | Vernant : ceux qui refusent l'altérité basculent dans le monstrueux | Foucault, Histoire de la folie (1961) : la norme produit la folie"],["Philosophie","Cours prépa","Cours 3 — Les Atrides et la malédiction héréditaire","Tantale → vol d'ambroisie + banquet cannibale → supplice éternel | Pélops → Atrée et Thyeste (fratricide, vengeance) | Agamemnon sacrifie Iphigénie (raison d'État vs famille) | Oreste tue Clytemnestre (vengeance du père) | Violence engendre violence : la faute est-elle héréditairement transmissible ?"],["Philosophie","Cours prépa","Cours 3 — Le bouc émissaire (Girard)","René Girard, La Violence et le Sacré | Le sacrifice du bouc émissaire = violence ponctuelle qui soude la communauté | Exutoire + solidarité dans le crime | Catharsis des pulsions mauvaises sur une victime innocente | Exemple : Iphigénie renforce l'unité des Grecs | Bouc émissaire dans la Bible (Lévitique) : animal portant les péchés chassé au désert"],["Philosophie","Cours prépa","Cours 3 — Les Érinyes et la naissance de la justice","Érinyes (Furies) : déesses vengeresses des crimes familiaux | Eschyle, Les Euménides : Athéna persuade les Érinyes de s'intégrer dans la Cité | Passage de la vengeance archaïque à la justice institutionnelle démocratique | Loi du Talion (Exode 21) : progrès moral → Jésus introduit le pardon (Luc 6, 27-29) | Muray : les Furies sont de retour (cancel culture, néo-féminisme vindicatif)"],["Philosophie","Cours prépa","Cours 3 — L'anneau de Gygès (Platon)","Platon, La République II | Un berger trouve un anneau d'invisibilité → séduit la reine, tue le roi | Glaucon : si impunité assurée, nul ne serait juste volontairement | Nul n'est juste que par contrainte, par « peur du gendarme » | Pléonexie = hybris (comme Midas) | Rousseau : liberté naturelle vs civile vs morale | Kant : puis-je savoir si mon acte est pleinement moral ?"],["Philosophie","Cours prépa","Cours 4 — Œdipe-Roi (Sophocle)","Sophocle, Œdipe-Roi | Œdipe tue son père Laïos, épouse sa mère Jocaste sans le savoir | Modèle de la tragédie pour Aristote : pitié + crainte → catharsis | Figure tragique : jouet des dieux, héritier des fautes passées | Légitimité charismatique (Weber) vs traditionnelle vs rationnelle | Freud : complexe d'Œdipe (L'Interprétation des rêves, 1900) + Totem et Tabou (1913) : meurtre du père primitif"],["Philosophie","Cours prépa","Cours 4 — La catharsis (Aristote/Brecht)","Aristote, Poétique : « la tragédie suscitant pitié et crainte opère la purgation propre à pareilles émotions » | Catharsis = purgation (décharge mécanique d'affects) ou purification (élévation morale) ? | Brecht : Verfremdungseffekt (distanciation) — méfiance envers l'identification spectateur/acteur | Nietzsche : la tragédie réconcilie dionysiaque et apollinien"],["Philosophie","Cours prépa","Cours 4 — Antigone (Sophocle)","Sophocle, Antigone | Antigone enterre Polynice malgré l'interdiction de Créon → condamnée à mort | Droit naturel (famille, divin) vs droit positif (loi de la Cité) | Conflit tragique de devoirs : pas de méchant ni de bon | Hegel : le tout doit l'emporter sur les volontés particulières | Anouilh (1944) : Antigone = adolescente éprise d'absolu, Créon = pragmatique | Durkheim : anomie = effacement des normes"],["Philosophie","Cours prépa","Cours 4 — Mythe d'Er le Pamphylien (Platon)","Platon, La République X | Er revient des morts : les âmes choisissent leur prochaine vie | « La responsabilité appartient à celui qui choisit, Dieu n'est point responsable » | Les conditions préexistent mais l'homme choisit → liberté et responsabilité | Ulysse choisit la vie la plus humble | Libre arbitre vs prédestination : Pélage/Augustin, catholiques/protestants, Jésuites/Jansénistes, islam"],["Philosophie","Cours prépa","Cours 5 — Prométhée (Platon, Protagoras)","Épiméthée distribue les qualités aux animaux, oublie l'homme | Prométhée vole le feu (technique) aux dieux → puni par Zeus | Hermès apporte aux hommes pudeur et justice (science politique/morale) | Deux dimensions de la raison humaine : technique (Prométhée) et morale (Hermès) | L'homme = être d'exception, indéterminé, libre | Sartre : « l'existence précède l'essence » | Pic de la Mirandole : l'homme est libre car sans archétype | Edgar Morin : « L'envers de l'humanisme c'est la déification de l'homme »"],["Philosophie","Cours prépa","Cours 5 — Narcisse (Ovide)","Ovide, Métamorphoses III | Narcisse repousse tous les amants (dont Écho) → tombe amoureux de son reflet → meurt | Incapacité à aimer l'autre, enfermement sur soi | Grimaldi : amour narcissique (chercher un double) vs amour de l'autre (fascination pour la différence) | Lipovetsky, L'Ère du vide (1983) : passage de Prométhée (individualisme moderne) à Narcisse (narcissisme postmoderne) | Freud : narcissisme primaire/secondaire"],["Philosophie","Cours prépa","Cours 5 — Icare et la Tour de Babel","Ovide, Métamorphoses VIII | Icare vole trop près du soleil avec des ailes de cire → chute et mort | Hybris technologique : les grandeurs finissent par s'écrouler | Parallèle avec Tour de Babel (Genèse 11) : Dieu embrouille les langues pour punir l'orgueil | Valéry (1919) : « Nous autres, civilisations, nous savons maintenant que nous sommes mortelles » | Brueghel, La Tour de Babel (1563) | Pentecôte (Actes 2) : réparation miraculeuse de Babel"],["Philosophie","Cours prépa","Cours 5 — Orphée et la poésie","Ovide, Métamorphoses X-XI | Orphée charme tout par son chant, descend aux Enfers pour Eurydice, la perd en se retournant | Figure du poète : chant universel, donner voix à ceux qui n'en ont pas | Poésie = gardienne de la civilisation (vs Sirènes = poésie esthétisante) | Arendt, La Crise de la culture : philistin cultivé vs industrie des loisirs | Valéry, Palme : patience comme condition de la création"],["Philosophie","Cours prépa","Cours 6 — Sagesse stoïcienne","Fondateurs : Zénon (335-264), Chrysippe (280-206) ; à Rome : Sénèque, Épictète, Marc-Aurèle | Règle d'or : distinguer ce qui dépend de nous (notre jugement) et ce qui n'en dépend pas | Épictète : « Il ne faut pas demander que les événements soient comme tu le veux, mais les vouloir comme ils arrivent » | Vertu = accorder ses désirs au réel (pas le réel à ses désirs) | Amor fati (amour du destin) ≠ fatalisme = consentement serein | « Vivre en accord avec la nature »"],["Philosophie","Cours prépa","Cours 6 — Sénèque, De la tranquillité de l'âme","Sénèque (4 av. J.-C. – 65 ap. J.-C.) | Le voyage n'est pas un remède aux souffrances de l'âme | Encourage la vie publique (vs repli épicurien) | Amitié : partage essentiel | Argent : ne doit pas devenir source d'anxiété | Otium = loisir philosophique (≠ oisiveté) | Ataraxie / euthumia : tranquillité de l'âme"],["Philosophie","Cours prépa","Cours 6 — Sénèque, De la providence","Sénèque | Les épreuves sont des exercices qui fortifient le sage | Dieu n'est pas cruel : il traite les hommes de bien comme un bon père | Le sage accueille le malheur comme une chance de croissance | Parallèle chrétien : Saint Jacques 1,2-4 : « Considérez comme une joie extrême de buter sur toute sorte d'épreuves » | La Fontaine, La Mort et le Mourant : le mourant = anti-stoïcien qui refuse d'accepter la mort"],["Philosophie","Cours prépa","Cours 7 — Sénèque, La Brièveté de la vie","Critique de l'occupatio : l'excès d'activité hypothèque le bonheur | Work addiction : l'homme affairé se fuit lui-même (cf. Pascal et le divertissement) | Faux loisirs : sport-spectacle, soin de l'apparence, collectionnisme | Vrai otium : loisir studieux, culture de l'âme (cultura animi) | « C'est n'être nulle part que d'être partout » (Lettres à Lucilius) | Schopenhauer : la richesse intérieure protège de l'ennui"],["Philosophie","Cours prépa","Cours 7 — Le Livre de Job","Ancien Testament | Job : homme intègre frappé par tous les malheurs (perte de biens, enfants, santé) | Ses amis : la souffrance = punition divine | Job refuse cette explication mais s'érige en juge de Dieu → hybris | Dieu répond du milieu de la tempête : « Où étais-tu quand j'ai fondé la terre ? » | Job 42,5 : « Par ouï-dire je te connaissais, mais maintenant mes yeux t'ont vu » | Claudel : « Dieu n'est pas venu supprimer la souffrance, mais la remplir de sa présence »"],["Philosophie","Cours prépa","Cours 7 — Qohélet (L'Ecclésiaste)","Ancien Testament (IIème s. av. J.-C.) | « Vanité des vanités, tout est vanité » | « Rien de nouveau sous le soleil » | « Beaucoup de sagesse, c'est beaucoup de chagrin » | MAIS : « manger et boire et trouver le bonheur dans son travail, c'est un don de Dieu » | Le plaisir est don de Dieu — vain sans Dieu, mais légitime s'il est rapporté au Créateur | Parallèle avec le soufisme d'Omar Khayyâm : hédonisme mystique"],["Philosophie","Cours prépa","Cours 7 — Le Cantique des cantiques","Ancien Testament | Le plus beau des cantiques : poème d'amour entre l'époux et l'épouse | Éros et agapè sont inséparables | Amour « fort comme la mort » (8,6) — alliance, unité | L'amour ne peut s'acheter (8,7) | Lecture allégorique : époux/épouse = Dieu/Israël = Christ/Église | Aimer suppose de se décentrer pour accueillir l'altérité | Contre le narcissisme : on ne peut aimer si l'on est auto-fondé"],["Philosophie","Cours prépa","Cours 8 — L'Humanisme de la Renaissance","Contexte : Grandes Découvertes (1440 imprimerie, 1492 Amérique, 1543 Copernic) | Réforme : Luther (1517), Calvin — contre le monopole de l'Église romaine | Humanitas = culture classique + impératifs moraux | Retour aux sources (textes antiques et bibliques) vs glose scolastique | Principe de l'autonomie de la raison | Humanistes : More, Pic de la Mirandole, Érasme, Machiavel, Rabelais, La Boétie, Montaigne | Fin de la Renaissance marquée par la violence (Saint-Barthélemy, 1572)"],["Philosophie","Cours prépa","Cours 8 — Rabelais, Gargantua : naissance et éducation","Gargantua (1534) | Naissance par l'oreille → parodie des naissances mythiques | Premiers mots : « À boire ! » = soif de savoir et soif spirituelle | Éducation scolastique (Thubal Holoferne) satirisée : formalisme, récitation, absence d'esprit critique | Éducation humaniste (Ponocrates) : lecture des textes, sport, diététique, éducation morale et spirituelle | « Science sans conscience n'est que ruine de l'âme » (Pantagruel) | Érasme : « On ne naît pas homme, on le devient »"],["Philosophie","Cours prépa","Cours 8 — Rabelais, Gargantua : la guerre picrocholine","Guerre picrocholine = conflit aux causes dérisoires (fouaces de Lerné) | Picrochole = hybris, tyran colérique, conquérant démesuré (parallèle Charles Quint) | Grandgousier/Gargantua = bon roi guidé par raison, clémence, pardon | « Les républiques seront heureuses quand les rois philosopheront » (cf. Platon, La République) | Frère Jean : parodie burlesque de la guerre et satire de l'institution religieuse"],["Philosophie","Cours prépa","Cours 8 — Rabelais, Thélème : « Fais ce que voudras »","Abbaye de Thélème : devise « Fais ce que voudras » | Saint Augustin : « Aime et fais ce que tu veux » — si tu aimes vraiment, tu ne peux vouloir que le bien | Thélème ≠ utopie libertaire mais communauté authentiquement chrétienne | Saint Paul (Romains 13, 8-10) : « Le plein accomplissement de la Loi, c'est l'amour » | Le roman raconte un parcours : de l'enfance (infans) à l'éducation puis à la conversion spirituelle à l'Amour"],["Philosophie","Cours prépa","Cours 9 — Allégorie de la caverne (Platon)","Platon, La République VII | 4 étapes : caverne (erreur/conditionnement) → conversion (arrachement douloureux) → ascension (vers les Idées et le Bien) → redescente (devoir d'éducation) | La caverne = doxa (opinion) vs connaissance intelligible | Vérité et liberté sont liées : Jean 8,32 « La vérité vous libérera » | Quelles cavernes contemporaines ? TV, réseaux sociaux, médias | Bradbury, Fahrenheit 451 : Mildred prisonnière des écrans"],["Philosophie","Cours prépa","Cours 9 — L'Utopie (Thomas More, 1516)","Thomas More, L'Utopie (1516) | U-topos = « nulle part » (Hythlodée = « habile à raconter des histoires ») | Critique de l'Angleterre du XVIe (inégalités, commerce de la laine) | Société utopienne : égalitaire, pas de propriété privée, 6h de travail/jour, otium | L'or sert de pot de chambre ! | Utopie = fiction qui affirme que l'homme peut influer sur son destin | Mais : les utopies politiques du XXe ont viré au totalitarisme → dystopies (Bradbury, Orwell, Huxley)"],["Philosophie","Cours prépa","Cours 9 — La Boétie, Discours de la servitude volontaire","La Boétie (1530-1563) | Le tyran n'a de pouvoir que celui que les sujets lui confèrent | « Soyez résolus à ne plus servir, et vous voilà libres » | Causes de la servitude : divertissement (jeux, spectacles = « appâts de la servitude »), chaîne pyramidale de complices | Pas de tyrannicide mais résistance passive | Kant : « l'homme est un animal qui a besoin d'un maître » | Formes modernes : addictions, GAFAM"],["Philosophie","Cours prépa","Cours 9 — Tocqueville, le despotisme démocratique","Tocqueville, De la démocratie en Amérique II (1840) | Despotisme antique : violent et restreint | Nouveau despotisme démocratique : « plus étendu et plus doux, dégrade les hommes sans les tourmenter » | Pouvoir « immense et tutélaire » qui fixe les hommes dans l'enfance | « Il aime que les citoyens se réjouissent, pourvu qu'ils ne songent qu'à se réjouir » | Réduit la nation à « un troupeau d'animaux timides et industrieux dont le gouvernement est le berger »"],["Philosophie","Cours prépa","Cours 10 — Montaigne, De l'amitié","Montaigne, Essais I, 28 | « Parce que c'était lui, parce que c'était moi » | Amitié avec La Boétie = fusion des âmes, au-delà de la raison | Distinction : amitiés ordinaires (accointances) vs Amitié absolue, indivisible | L'ami est unique — on n'a qu'un seul vrai ami | Les relations familiales, amoureuses, conjugales ≠ amitié véritable | La Fontaine, Les Deux Amis : « Qu'un ami véritable est une douce chose ! »"],["Philosophie","Cours prépa","Cours 10 — Le mythe des androgynes (Platon, Le Banquet)","Platon, Le Banquet — discours d'Aristophane | Êtres primitifs sphériques (3 genres : mâle, femelle, androgyne) | Zeus les coupe en deux pour punir leur hybris | Éros naît de cette blessure : nostalgie de la plénitude perdue | Chaque moitié cherche l'autre pour recomposer la totalité | La sexualité humaine ≠ animale : quête mystique de l'unité | Éros = maladie ET guérisseur | Éros (amour de concupiscence) vs Agapè (amour de don/bienveillance)"],["Philosophie","Cours prépa","Cours 10 — Schopenhauer, Métaphysique de l'amour","Schopenhauer, Le Monde comme volonté et comme représentation (1819) | L'amour = ruse de l'espèce pour assurer la reproduction | L'individu croit poursuivre son bonheur personnel mais travaille pour l'espèce | « L'amant se trouve leurré » après l'accomplissement | « Platon a eu raison de dire : il n'y a rien qui soit imposteur autant que le plaisir » | L'illusion voluptueuse abuse l'homme"],["Philosophie","Cours prépa","Cours 10 — Trois épistémès (Foucault)","Foucault : épistémè = façon de penser d'une époque | Antiquité : amitié (philia), philosophie, sagesse (devenir-sage) | Moyen Âge → âge classique : amour sacré, christianisme, don de soi (devenir-saint) | Modernité : rapports charnels/relations liquides (Bauman), science, épanouissement narcissique (devenir-egobody, Redeker)"],["Philosophie","Cours prépa","Cours 11 — Montaigne, Des cannibales","Montaigne, Essais I, 31 | Source : un homme ayant vécu 10-12 ans au Brésil (Tupinambas) | Les « sauvages » vivent selon la nature → supériorité de la nature sur la culture | Relativisme : « Chacun appelle barbarie ce qui n'est pas de son usage » | Anthropophagie relativisée : pas plus barbare que nos pratiques judiciaires | Critique de l'ethnocentrisme européen"],["Philosophie","Cours prépa","Cours 11 — Lévi-Strauss, Tristes Tropiques","Lévi-Strauss, Tristes Tropiques (1955) | Aucune société n'est parfaitement bonne ni absolument mauvaise | Anthropophagie (absorption) vs anthropémie (exclusion/prison) : deux solutions symétriques | Les Indiens des plaines : châtiment → réparation collective → réintégration | « L'analyse ethnologique rehausse les sociétés différentes et rabaisse celle de l'observateur » | Lévi-Strauss met aussi en garde contre le relativisme excessif"],["Philosophie","Cours prépa","Cours 11 — Le relativisme : bon et mauvais usage","Bon relativisme : les normes et valeurs varient selon les cultures → respect de l'Autre | Mauvais relativisme : les valeurs n'ont aucun fondement → déconstruction idéologique | 3 domaines : moral, cognitif (science = construction sociale), esthétique (Bourdieu) | Le relativisme devenu dogmatisme officiel | Lévi-Strauss : « Le barbare est celui qui croit à la barbarie » MAIS certaines choses restent intolérables | Chesterton : « Le monde moderne est plein d'anciennes vertus chrétiennes devenues folles »"],["Philosophie","Cours prépa","Cours 12 — Montaigne, De l'exercitation","Montaigne, Essais II, 6 | Peut-on s'exercer à mourir ? | Récit autobiographique : chute de cheval, perte de connaissance, retour progressif | La mort approche par « un nonchaloir plein de mollesse » → pas de terreur | L'agonie n'est pas à redouter | Parler de soi : entre vanité et connaissance de la condition humaine | « Je suis moi-même la matière de mon livre »"],["Philosophie","Cours prépa","Cours 12 — Robinson Crusoé (Defoe, 1719)","Daniel Defoe, Robinson Crusoé (1719) | Avatar du fils prodigue : erreurs → épreuves → conversion → rédemption | Éloge du travail, de la civilisation européenne, de la foi retrouvée | Robinson civilise Vendredi et l'instruit dans la foi | Descartes : « se rendre comme maîtres et possesseurs de la nature » | Réécritures au XXe : Golding (Sa Majesté des mouches, 1954), Tournier (Vendredi, 1967)"],["Philosophie","Cours prépa","Cours 12 — L'autobiographie (Thomas Clerc)","Thomas Clerc, « Pourquoi l'autobiographie ? » (Le Monde, 2002) | Expansion des textes autobiographiques : individualisme + déclin du prestige littéraire | Mort de l'auteur (années 1970) → retour du sujet | Faillite des utopies collectives → repli narcissique | Conditions de réussite : force supérieure (vérité), mémoire littéraire (style), finalité politique (désaliénation) | L'autobiographie réussie est « performative » : elle change le lecteur | Bruckner, La Tyrannie de la pénitence (2006) : auto-critique occidentale devenue auto-flagellation"],["Philosophie","Cours prépa","Cours 20 — Montesquieu, l'apologue des Troglodytes","Lettres Persanes (1721), lettres XI-XIV | 1er tableau : l'anarchie individualiste mène à la loi de la jungle ; la liberté sans loi détruit les faibles | 2e tableau : les bons Troglodytes fondent une société vertueuse sur la loi naturelle, le bien commun, la religion civile | Common decency (Orwell) : diké (justice) et aidos (pudeur) | 3e tableau : le vieillard élu roi pleure ; la vertu est un joug plus dur que les lois humaines | La croissance de la population exige la monarchie : passage de la société-famille à l'État politique | « Votre vertu commence à vous peser » : on sera vertueux malgré soi, par la loi"],["Philosophie","Cours prépa","Cours 20 — Mandeville, La Fable des abeilles","The Grumbling Hive (1705), republié en 1714 sous le titre Fable of the Bees: Private Vices, Publick Benefits | Thèse provocatrice : les vices des particuliers (vanité, luxe, avarice) contribuent à la prospérité publique | Jupiter exauce les abeilles qui réclament la probité → effondrement économique, désert des arts et métiers | « Le vice est aussi nécessaire dans un État florissant que la faim pour nous obliger à manger » | Préfigure Adam Smith (main invisible) et le libéralisme économique | Inverse la morale classique : le contentement est « cette peste de l'industrie » | S'oppose frontalement à Montesquieu (vertu comme fondement) et à Rousseau (critique du luxe)"],["Philosophie","Cours prépa","Cours 20 — Mme du Châtelet, Discours sur le bonheur","Émilie du Châtelet (1706-1749), maîtresse de Voltaire, publie posthume en 1779 | Rupture avec les moralistes classiques et les sagesses antiques : le bonheur passe par les passions satisfaites, non leur répression | « Nous n'avons rien à faire dans ce monde qu'à nous y procurer des sensations et des sentiments agréables » | Les malheureux sont visibles car ils cherchent du secours ; les heureux sont inconnus | Même si les passions font plus de malheureux que d'heureux, elles restent désirables car condition des grands plaisirs | Sensualisme et hédonisme du XVIIIe : le bonheur terrestre remplace le salut chrétien"],["Philosophie","Cours prépa","Cours 20 — Voltaire, Candide et l'optimisme","Candide ou l'Optimisme (1759), conte philosophique | Critique ironique de la théodicée de Leibniz : « tout est pour le mieux dans le meilleur des mondes possibles » | Pangloss incarne l'optimisme métaphysique ridicule ; Martin incarne le pessimisme | L'optimisme engendre fatalisme et résignation, entrave la recherche du bonheur ici-bas | El Dorado : dernière illusion d'un monde parfait, dimension parodique, miroir critique de l'Europe | Conclusion pragmatique : « Il faut cultiver notre jardin » — sagesse épicurienne contre métaphysique | Voltaire renvoie Leibniz à de la « métaphysico-théologo-NIGOlogie »"],["Philosophie","Cours prépa","Cours 20 — Voltaire élitiste, lettres à Damilaville","Lettres de Voltaire à Damilaville (mars-avril 1766) | « Il est à propos que le peuple soit guidé, et non pas qu'il soit instruit » | « Il me paraît essentiel qu'il y ait des gueux ignorants » — les travailleurs manuels n'ont ni temps ni capacité de philosopher | Il faut instruire le bourgeois, pas le manœuvre | « Quand la populace se mêle de raisonner, tout est perdu » | Confucius cité : nul n'est incapable de vertu, mais la science est réservée à certains | Voltaire défend les Lumières pour une élite éclairée, pas pour le peuple — tension interne aux Lumières"],["Philosophie","Cours prépa","Cours 21 — Rousseau, Discours sur les sciences et les arts","Premier Discours (1750), prix de l'Académie de Dijon | Les sciences et les arts naissent du vice (vanité, oisiveté) et y reconduisent | Nocivité civique : la réflexion philosophique relâche les liens patriotiques, le relativisme sape les coutumes | « Le philosophe n'est ni parent, ni citoyen, ni homme ; il est philosophe » (Préface de Narcisse) | Nocivité morale : les Lumières étouffent la voix naturelle de la pitié et du sacrifice | Le philosophe regarde paisiblement depuis sa fenêtre tandis que « la canaille » porte secours | Rousseau ne condamne pas la science en soi mais sa vulgarisation : seules « quelques âmes privilégiées » la pratiquent vertueusement"],["Philosophie","Cours prépa","Cours 21 — Rousseau, perfectibilité et état de nature","Discours sur l'origine de l'inégalité (1755) | La perfectibilité distingue l'homme de l'animal : l'animal est, l'homme devient | État de nature = fiction théorique, pas réalité historique : ni langage, ni pensée, ni société | L'homme naturel : solitude (donc indépendance), hébétude (donc innocence), robustesse (donc harmonie avec la nature) | « L'homme est naturellement bon » ne signifie pas inclination au bien moral mais innocence des mouvements naturels (amoralité) | La civilisation fait éclore nos vices mais est aussi condition de nos vertus | Voltaire à Rousseau : « il prend envie de marcher à quatre pattes quand on lit votre ouvrage »"],["Philosophie","Cours prépa","Cours 21 — Rousseau, amour de soi vs amour-propre","Discours sur l'inégalité (1755) | Amour de soi : passion naturelle, légitime ; veiller à sa propre conservation, aspirer au bonheur | Pitié : répugnance innée à voir souffrir autrui, modère l'amour de soi | Amour-propre : sentiment relatif, factice, né en société ; se comparer aux autres, vouloir être préféré | « L'amour-propre, qui se compare, n'est jamais content et ne saurait l'être » (Émile) | En société, le paraître se substitue à l'être ; l'homme perd son centre de gravité intérieur | L'homme sauvage après dîner est en paix ; l'homme civilisé poursuit le superflu, les richesses, les esclaves indéfiniment"],["Philosophie","Cours prépa","Cours 21 — Rousseau vs Voltaire sur le luxe","Opposition frontale sur les bienfaits du luxe | Rousseau : le luxe appauvrit le laboureur, dépeuple les campagnes, « le contentement est la peste de l'industrie » | Le luxe détourne de l'agriculture (art le moins lucratif car le plus nécessaire) et ruine les États | Voltaire (Le Mondain, 1736) : « J'aime le luxe, et même la mollesse » ; « Le superflu, chose très nécessaire » | Voltaire célèbre le commerce, l'abondance, les arts ; Rousseau y voit la source de l'inégalité et de la corruption | Rousseau est une figure atypique des Lumières, en opposition avec l'esprit de l'Encyclopédie"],["Philosophie","Cours prépa","Cours 22 — Schopenhauer, la fable des porcs-épics","Parerga und Paralipomena (1851) | Thèse : la sociabilité humaine ne procède pas d'un amour des autres (vs Aristote, zoon politikon) mais du besoin et de l'ennui | Les hommes se recherchent pour échapper au vide intérieur, pas par bienveillance | Les piquants des porcs-épics = méchanceté, vanité, fatuité d'autrui | Solution : la politesse (juste distance), mais elle rime avec hypocrisie et masque | « La supériorité de l'intelligence conduit à l'insociabilité » | Le sage se suffit à lui-même grâce à ses richesses intérieures | Philippe Muray : « l'homme est un chou pour l'homme » — plus de piquants car plus de personnalité"],["Philosophie","Cours prépa","Cours 22 — Sade, la nature comme code","La Philosophie dans le boudoir (1795) | Philosophie matérialiste : l'homme n'importe pas plus à la nature « qu'un singe ou qu'un éléphant » | La nature = énergie aveugle, violente, sans finalité, sans justice ; la destruction est condition de toute vie | Dolmancé : « la cruauté est le premier sentiment qu'imprime en nous la nature » ; l'enfant brise son hochet, étrangle son oiseau | La culture nuit aux effets sacrés de la nature comme la taille nuit aux arbres | Éthique fondée sur la physique : jouir égoïstement (vs christianisme) et être cruel (vs culture) | « L'homme puissant ne s'avisera jamais de dire qu'il ne faut pas faire aux autres ce qu'on ne voudrait pas qu'il nous fût fait »"],["Philosophie","Cours prépa","Cours 22 — Sade, le plaisir solitaire et despotique","La Philosophie dans le boudoir (1795) ; Les 120 Journées de Sodome (1785) | Le plaisir sadien est solitaire, exclut toute intersubjectivité : autrui est un instrument | « Que désire-t-on quand on jouit ? Que tout ce qui nous entoure ne s'occupe que de no
